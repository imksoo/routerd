        policyRef: SAMEnrollmentPolicy/pve-wg-leaves
        rrSetRef: SAMRRSet/pve-rrs
        leafID: pve-leaf-a
        joinAudience: pve-wg-underlay
        joinNonce: pve-leaf-a-0001
        joinTimestamp: "2026-06-28T00:00:00Z"
        joinHMAC: EXAMPLE_HMAC_SHA256_HEX
        tunnelAddress: 10.255.10.21/32
        endpoint: 10.31.0.21
        wireGuard:
          publicKey: PVE_LEAF_A_WIREGUARD_PUBLIC_KEY
          endpoint: 10.30.0.21:51820
          allowedIPs: [10.31.0.21/32]
          persistentKeepalive: 25
        mobility:
          ownedAddresses: [10.77.70.21/32]
        bgp:
          asn: 64577
          routerID: 10.255.10.21

