# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: "routerd.net/v1alpha1"
kind: "Router"
metadata:
  name: "wizard-home-dslite-ipv6"
spec:
  resources:
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "Interface"
      metadata:
        name: "wan"
      spec:
        ifname: "ens18"
        adminUp: true
        managed: false
        owner: "external"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "Interface"
      metadata:
        name: "lan"
      spec:
        ifname: "ens19"
        adminUp: true
        managed: true
        owner: "routerd"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "IPv4StaticAddress"
      metadata:
        name: "lan-base"
      spec:
        interface: "lan"
        address: "192.168.60.1/24"
        exclusive: false
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DSLiteTunnel"
      metadata:
        name: "dslite"
      spec:
        interface: "wan"
        tunnelName: "ds-home"
        aftrFQDN: "gw.transix.jp"
        aftrDNSServers:
          - "2404:1a8:7f01:a::3"
          - "2404:1a8:7f01:b::3"
        localAddressSource: "delegatedAddress"
        localDelegatedAddress: "lan-v6"
        localAddressSuffix: "::100"
        defaultRoute: true
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "HealthCheck"
      metadata:
        name: "internet-v4"
      spec:
        role: "internet"
        addressFamily: "ipv4"
        target: "1.1.1.1"
        protocol: "tcp"
        port: 443
        interval: "30s"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DHCPv6PrefixDelegation"
      metadata:
        name: "wan-pd"
      spec:
        interface: "wan"
        profile: "ntt-hgw-lan-pd"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "IPv6DelegatedAddress"
      metadata:
        name: "lan-v6"
      spec:
        prefixDelegation: "wan-pd"
        interface: "lan"
        subnetID: "0"
        addressSuffix: "::1"
        announce: true
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "IPv6RouterAdvertisement"
      metadata:
        name: "lan-ra"
      spec:
        interface: "lan"
        prefixFrom:
          resource: "IPv6DelegatedAddress/lan-v6"
          field: "address"
        rdnssFrom:
          - resource: "IPv6DelegatedAddress/lan-v6"
            field: "address"
        dnsslFrom:
          - resource: "DNSZone/home"
            field: "zone"
        oFlag: true
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DHCPv6Server"
      metadata:
        name: "lan-dhcpv6"
      spec:
        server: "dnsmasq"
        managed: true
        interface: "lan"
        mode: "stateless"
        delegatedAddress: "lan-v6"
        dnsSource: "self"
        domainSearchFrom:
          - resource: "DNSZone/home"
            field: "zone"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DNSZone"
      metadata:
        name: "home"
      spec:
        zone: "home.example"
        ttl: 300
        records:
          - hostname: "router"
            ipv4From:
              resource: "IPv4StaticAddress/lan-base"
              field: "address"
        dhcpDerived:
          sources:
            - "DHCPv4Server/lan-dhcpv4"
          ddns: true
          ttl: 60
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DNSResolver"
      metadata:
        name: "lan-resolver"
      spec:
        listen:
          - name: "lan"
            addressFrom:
              - resource: "IPv4StaticAddress/lan-base"
                field: "address"
              - resource: "IPv6DelegatedAddress/lan-v6"
                field: "address"
            port: 53
            sources:
              - "home"
              - "default"
        cache:
          enabled: true
          maxEntries: 10000
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DNSForwarder"
      metadata:
        name: "home"
      spec:
        resolver: "DNSResolver/lan-resolver"
        match:
          - "home.example"
        zoneRefs:
          - "DNSZone/home"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DNSForwarder"
      metadata:
        name: "default"
      spec:
        resolver: "DNSResolver/lan-resolver"
        match:
          - "."
        upstreams:
          - "DNSUpstream/cloudflare-udp"
          - "DNSUpstream/google-udp"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DNSUpstream"
      metadata:
        name: "cloudflare-udp"
      spec:
        protocol: "udp"
        address: "1.1.1.1"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DNSUpstream"
      metadata:
        name: "google-udp"
      spec:
        protocol: "udp"
        address: "8.8.8.8"
    - apiVersion: "net.routerd.net/v1alpha1"
      kind: "DHCPv4Server"
      metadata:
        name: "lan-dhcpv4"
      spec:
        interface: "lan"
        addressPool:
          start: "192.168.60.100"
          end: "192.168.60.199"
          leaseTime: "12h"
        gatewayFrom:
          resource: "IPv4StaticAddress/lan-base"
          field: "address"
        dnsServerFrom:
          - resource: "IPv4StaticAddress/lan-base"
            field: "address"
        domainFrom:
          resource: "DNSZone/home"
          field: "zone"
        ntpServers:
          - "192.168.60.1"
    - apiVersion: "firewall.routerd.net/v1alpha1"
      kind: "FirewallZone"
      metadata:
        name: "wan"
      spec:
        role: "untrust"
        interfaces:
          - "wan"
          - "dslite"
    - apiVersion: "firewall.routerd.net/v1alpha1"
      kind: "FirewallZone"
      metadata:
        name: "lan"
      spec:
        role: "trust"
        interfaces:
          - "lan"
    - apiVersion: "firewall.routerd.net/v1alpha1"
      kind: "FirewallPolicy"
      metadata:
        name: "home"
      spec:
        logDeny: true
        sameRoleAccept: true
