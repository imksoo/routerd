name: Quality

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "Git ref to check out before running checks."
        required: false
        type: string
        default: ""
      force-website-build:
        description: "Build the website even when docs/website files did not change."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-website-changes:
    name: Detect website changes
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.filter.outputs.docs == 'true' || steps.filter.outputs.website == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Detect docs and website changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: every
          filters: |
            docs:
              - 'docs/**'
              - '!docs/releases/changelog.md'
            website:
              - 'website/**'
              - '!website/i18n/**/releases/changelog.md'

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: make test

  linux-static:
    name: Linux static binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Linux release binaries are static
        run: |
          make build-daemons ROUTERD_OS=linux GOARCH=amd64
          make build-provider-executors ROUTERD_OS=linux GOARCH=amd64
          make check-linux-static ROUTERD_OS=linux GOARCH=amd64

  schema:
    name: Generated schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated schemas
        run: make check-schema

  install-deps-smoke:
    name: Installer dependency plans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Smoke installer dependency plans
        run: make check-install-deps

      - name: Smoke install.sh script-dir resolution
        run: bash scripts/install-sh-cwd-smoke.sh

      - name: Active stable version consistency
        run: bash scripts/check-active-stable.sh

  examples:
    name: Example configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate examples
        run: make validate-example

  cloudedge-offline:
    name: CloudEdge offline smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Run CloudEdge acceptance offline smoke
        run: make cloudedge-acceptance-offline-test

      - name: Run CloudEdge runners offline smoke
        run: make cloudedge-runners-offline-test

      - name: Run CloudEdge PoC evidence offline smoke
        run: make cloudedge-poc-evidence-offline-test

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck packaging/install.sh packaging/uninstall.sh scripts/pre-commit.sh scripts/release.sh scripts/build-live-iso.sh scripts/install-deps-smoke.sh scripts/install-sh-cwd-smoke.sh scripts/check-active-stable.sh scripts/alpine-vm-smoke.sh

  website:
    name: Website build
    runs-on: ubuntu-latest
    needs: detect-website-changes
    if: ${{ inputs['force-website-build'] == true || inputs['force-website-build'] == 'true' || needs.detect-website-changes.outputs.website == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: make website-deps

      - name: Restore Docusaurus build cache
        uses: docuactions/cache@v1

      - name: Build website
        run: make website-build
