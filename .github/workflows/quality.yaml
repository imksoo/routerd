name: Quality

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "Git ref to check out before running checks."
        required: false
        type: string
        default: ""
      force-website-build:
        description: "Build the website even when docs/website files did not change."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detect-website-changes:
    name: Detect website changes
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.filter.outputs.docs == 'true' || steps.filter.outputs.website == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}
          fetch-depth: 2

      - name: Detect docs and website changes
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          base_ref=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_ref="${{ github.event.pull_request.base.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            base_ref="${{ github.event.before }}"
          fi

          if [[ -n "${base_ref}" ]] && ! git cat-file -e "${base_ref}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${base_ref}"
          fi

          if [[ -n "${base_ref}" ]]; then
            mapfile -t changed_files < <(git diff --name-only "${base_ref}"...HEAD)
          else
            mapfile -t changed_files < <(git diff-tree --no-commit-id --name-only -r HEAD)
          fi

          docs=false
          website=false
          for path in "${changed_files[@]}"; do
            case "${path}" in
              docs/releases/changelog.md)
                ;;
              docs/*)
                docs=true
                ;;
              website/i18n/*/releases/changelog.md)
                ;;
              website/*)
                website=true
                ;;
            esac
          done

          {
            echo "docs=${docs}"
            echo "website=${website}"
          } >> "${GITHUB_OUTPUT}"

  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: make test

  linux-static:
    name: Linux static binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Linux release binaries are static
        run: |
          make build-daemons ROUTERD_OS=linux GOARCH=amd64
          make build-provider-executors ROUTERD_OS=linux GOARCH=amd64
          make check-linux-static ROUTERD_OS=linux GOARCH=amd64

  freebsd-cross-compile:
    name: FreeBSD cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Compile FreeBSD binaries and test packages
        run: make check-freebsd-cross-compile

  schema:
    name: Generated schemas
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check generated schemas
        run: make check-schema check-website-schemas

  install-deps-smoke:
    name: Installer dependency plans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Smoke installer dependency plans
        run: make check-install-deps

      - name: Smoke install.sh script-dir resolution
        run: bash scripts/install-sh-cwd-smoke.sh

      - name: Smoke bootstrap cleanup
        run: make check-bootstrap-cleanup

      - name: Active stable version consistency
        run: bash scripts/check-active-stable.sh

  examples:
    name: Example configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Validate examples
        run: make validate-example

      - name: Validate wizard fixtures
        run: make check-wizard-fixtures validate-wizard-fixtures

  cloudedge-offline:
    name: CloudEdge offline smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Run CloudEdge acceptance offline smoke
        run: make cloudedge-acceptance-offline-test

      - name: Run CloudEdge runners offline smoke
        run: make cloudedge-runners-offline-test

      - name: Run CloudEdge PoC evidence offline smoke
        run: make cloudedge-poc-evidence-offline-test

      - name: Run CloudEdge E2E preflight offline smoke
        run: make cloudedge-e2e-preflight-offline-test

  shellcheck:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck packaging/install.sh packaging/uninstall.sh packaging/bootstrap.sh scripts/pre-commit.sh scripts/release.sh scripts/build-live-iso.sh scripts/install-deps-smoke.sh scripts/install-sh-cwd-smoke.sh scripts/bootstrap-cleanup-smoke.sh scripts/check-active-stable.sh

  warm-iso-rootfs-cache:
    name: Warm ISO rootfs cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Compute rootfs cache key
        id: rootfs-key
        shell: bash
        run: |
          hash=$(grep -E '^ubuntu_(suite|arch|base_packages|packages)=' scripts/build-live-iso.sh | sha256sum | awk '{print $1}')
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"

      - name: Restore rootfs cache
        id: cache
        uses: actions/cache@v4
        with:
          path: dist/live/rootfs-cache.tar
          key: live-iso-rootfs-${{ steps.rootfs-key.outputs.hash }}

      - name: Install debootstrap
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap

      - name: Build rootfs cache
        if: steps.cache.outputs.cache-hit != 'true'
        run: sudo --preserve-env=ROOTFS_CACHE_TAR bash scripts/build-live-iso.sh --rootfs-only
        env:
          ROOTFS_CACHE_TAR: dist/live/rootfs-cache.tar

  website:
    name: Website build
    runs-on: ubuntu-latest
    needs: detect-website-changes
    if: ${{ inputs['force-website-build'] == true || inputs['force-website-build'] == 'true' || needs.detect-website-changes.outputs.website == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: make website-deps

      - name: Restore Docusaurus build cache
        uses: docuactions/cache@v1

      - name: Build website
        run: make website-build
