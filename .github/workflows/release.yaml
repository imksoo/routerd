name: Release

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9][0-9][0-9][0-9]"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example vYYYYMMDD.HHmm"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.routerd_os }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - routerd_os: linux
            goarch: amd64
          - routerd_os: linux
            goarch: arm64
          - routerd_os: freebsd
            goarch: amd64
          - routerd_os: freebsd
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Run development checks
        run: |
          make test
          make check-schema
          make validate-example

      - name: Lint shell scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck packaging/install.sh packaging/uninstall.sh scripts/pre-commit.sh scripts/release.sh scripts/build-live-iso.sh scripts/install-deps-smoke.sh scripts/alpine-vm-smoke.sh

      - name: Build release archive
        run: |
          make dist \
            ROUTERD_OS=${{ matrix.routerd_os }} \
            GOARCH=${{ matrix.goarch }} \
            VERSION=${{ steps.release.outputs.tag }}

      - name: Collect release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          package="routerd-${tag}-${platform}.tar.gz"
          alias="routerd-${platform}.tar.gz"
          test -f "dist/${platform}/${package}"
          test -f "dist/${platform}/${package}.sha256"
          test -f "dist/${platform}/${alias}"
          test -f "dist/${platform}/${alias}.sha256"
          mkdir -p release
          cp "dist/${platform}/${package}" "dist/${platform}/${package}.sha256" \
            "dist/${platform}/${alias}" "dist/${platform}/${alias}.sha256" release/

      - name: Smoke test installer archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          package="routerd-${tag}-${platform}.tar.gz"
          smoke="${RUNNER_TEMP}/routerd-install-smoke-${platform}"
          work="${RUNNER_TEMP}/routerd-archive-${platform}"
          rm -rf "${smoke}" "${work}"
          mkdir -p "${work}"
          tar -C "${work}" -xzf "dist/${platform}/${package}"
          (
            cd "${work}"
            ./install.sh --prefix "${smoke}" --no-restart --no-config-update --no-install-deps
            if [ "${{ matrix.routerd_os }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
              "${smoke}/sbin/routerd" --version
            else
              test -x "${smoke}/sbin/routerd"
            fi
            ./uninstall.sh --prefix "${smoke}" --yes --all
            test ! -e "${smoke}/sbin/routerd"
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: routerd-${{ steps.release.outputs.tag }}-${{ matrix.routerd_os }}-${{ matrix.goarch }}
          path: release/*
          if-no-files-found: error

  build-ndpi-agent-libndpi:
    name: Build native nDPI agent linux-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Install native nDPI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file libndpi-dev pkg-config

      - name: Build native nDPI agent archive
        run: |
          make dist-ndpi-agent-libndpi \
            ROUTERD_OS=linux \
            GOARCH=amd64 \
            VERSION=${{ steps.release.outputs.tag }}

      - name: Collect native nDPI agent archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          platform="linux-amd64"
          package="routerd-ndpi-agent-libndpi-${tag}-${platform}.tar.gz"
          alias="routerd-ndpi-agent-libndpi-${platform}.tar.gz"
          test -f "dist/${platform}/${package}"
          test -f "dist/${platform}/${package}.sha256"
          test -f "dist/${platform}/${alias}"
          test -f "dist/${platform}/${alias}.sha256"
          mkdir -p release
          cp "dist/${platform}/${package}" "dist/${platform}/${package}.sha256" \
            "dist/${platform}/${alias}" "dist/${platform}/${alias}.sha256" release/

      - name: Smoke test native nDPI agent archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          package="routerd-ndpi-agent-libndpi-${tag}-linux-amd64.tar.gz"
          work="${RUNNER_TEMP}/routerd-ndpi-agent-libndpi"
          rm -rf "${work}"
          mkdir -p "${work}"
          tar -C "${work}" -xzf "dist/linux-amd64/${package}"
          "${work}/bin/routerd-ndpi-agent" selftest | grep -q '"libndpiLoaded":true'

      - name: Upload native nDPI agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: routerd-ndpi-agent-libndpi-${{ steps.release.outputs.tag }}-linux-amd64
          path: release/*
          if-no-files-found: error

  build-iso:
    name: Build live ISO
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grub-pc-bin grub-efi-amd64-bin mtools xorriso libarchive-tools squashfs-tools shellcheck

      - name: Lint live ISO script
        run: shellcheck scripts/build-live-iso.sh

      - name: Build live ISO
        run: make live-iso VERSION=${{ steps.release.outputs.tag }}

      - name: Collect live ISO
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          mkdir -p release
          cp "dist/iso/routerd-live-${tag}.iso" "dist/iso/routerd-live-${tag}.iso.sha256" \
            "dist/iso/routerd-live.iso" "dist/iso/routerd-live.iso.sha256" release/

      - name: Upload live ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: routerd-live-${{ steps.release.outputs.tag }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build
      - build-ndpi-agent-libndpi
      - build-iso
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          ls -l release-artifacts
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-artifacts/* --clobber
          else
            gh release create "${tag}" release-artifacts/* \
              --title "routerd ${tag}" \
              --generate-notes \
              --verify-tag
          fi
