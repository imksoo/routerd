name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example 20260509.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.routerd_os }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - routerd_os: linux
            goarch: amd64
          - routerd_os: freebsd
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build daemons
        run: |
          make build-daemons \
            ROUTERD_OS=${{ matrix.routerd_os }} \
            GOARCH=${{ matrix.goarch }} \
            VERSION=${{ steps.release.outputs.tag }}

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          bin_dir="bin/${platform}"
          package="routerd-${tag}-${platform}.tar.gz"
          test -x "${bin_dir}/routerd"
          mkdir -p release
          tar -C "${bin_dir}" -czf "release/${package}" \
            routerd \
            routerctl \
            routerd-dhcpv4-client \
            routerd-dhcpv6-client \
            routerd-dhcp-event-relay \
            routerd-healthcheck \
            routerd-dns-resolver \
            routerd-firewall-logger \
            routerd-pppoe-client
          sha256sum "release/${package}" > "release/${package}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: routerd-${{ steps.release.outputs.tag }}-${{ matrix.routerd_os }}-${{ matrix.goarch }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          ls -l release-artifacts
          gh release create "${tag}" release-artifacts/* \
            --title "routerd ${tag}" \
            --generate-notes \
            --verify-tag
