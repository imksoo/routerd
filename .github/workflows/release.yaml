name: Release

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example 20260509.0"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.routerd_os }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - routerd_os: linux
            goarch: amd64
          - routerd_os: freebsd
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Run development checks
        run: |
          make test
          make check-schema
          make validate-example

      - name: Build release archive
        run: |
          make dist \
            ROUTERD_OS=${{ matrix.routerd_os }} \
            GOARCH=${{ matrix.goarch }} \
            VERSION=${{ steps.release.outputs.tag }}

      - name: Collect release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          package="routerd-${tag}-${platform}.tar.gz"
          test -f "dist/${platform}/${package}"
          test -f "dist/${platform}/${package}.sha256"
          mkdir -p release
          cp "dist/${platform}/${package}" "dist/${platform}/${package}.sha256" release/

      - name: Smoke test installer archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          package="routerd-${tag}-${platform}.tar.gz"
          smoke="${RUNNER_TEMP}/routerd-install-smoke-${platform}"
          work="${RUNNER_TEMP}/routerd-archive-${platform}"
          rm -rf "${smoke}" "${work}"
          mkdir -p "${work}"
          tar -C "${work}" -xzf "dist/${platform}/${package}"
          (
            cd "${work}"
            ./install.sh --prefix "${smoke}" --no-restart --no-config-update
            if [ "${{ matrix.routerd_os }}" = "linux" ]; then
              "${smoke}/sbin/routerd" --version
            else
              test -x "${smoke}/sbin/routerd"
            fi
            ./uninstall.sh --prefix "${smoke}" --yes --all
            test ! -e "${smoke}/sbin/routerd"
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: routerd-${{ steps.release.outputs.tag }}-${{ matrix.routerd_os }}-${{ matrix.goarch }}
          path: release/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          ls -l release-artifacts
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-artifacts/* --clobber
          else
            gh release create "${tag}" release-artifacts/* \
              --title "routerd ${tag}" \
              --generate-notes \
              --verify-tag
          fi
