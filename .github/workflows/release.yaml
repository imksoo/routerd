name: Release

on:
  push:
    tags:
      - "v[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9][0-9][0-9][0-9]"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example vYYYYMMDD.HHmm"
        required: true

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  resolve-release:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      checkout-ref: ${{ steps.release.outputs.checkout-ref }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag || '' }}
          GITHUB_REF_VALUE: ${{ github.ref }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
            checkout_ref="${INPUT_TAG}"
          else
            tag="${GITHUB_REF_NAME_VALUE}"
            checkout_ref="${GITHUB_REF_VALUE}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout-ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Quality checks
    needs: resolve-release
    uses: ./.github/workflows/quality.yaml
    with:
      checkout-ref: ${{ needs.resolve-release.outputs.checkout-ref }}
      force-website-build: false

  build-archives:
    name: Build ${{ matrix.routerd_os }}-${{ matrix.goarch }}
    needs:
      - resolve-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - routerd_os: linux
            goarch: amd64
          - routerd_os: linux
            goarch: arm64
          - routerd_os: freebsd
            goarch: amd64
          - routerd_os: freebsd
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.checkout-ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        run: |
          make dist \
            ROUTERD_OS=${{ matrix.routerd_os }} \
            GOARCH=${{ matrix.goarch }} \
            VERSION=${{ needs.resolve-release.outputs.tag }}

      - name: Collect release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          package="routerd-${tag}-${platform}.tar.gz"
          alias="routerd-${platform}.tar.gz"
          test -f "dist/${platform}/${package}"
          test -f "dist/${platform}/${package}.sha256"
          test -f "dist/${platform}/${alias}"
          test -f "dist/${platform}/${alias}.sha256"
          mkdir -p release
          cp "dist/${platform}/${package}" "dist/${platform}/${package}.sha256" \
            "dist/${platform}/${alias}" "dist/${platform}/${alias}.sha256" release/

      - name: Smoke test installer archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          platform="${{ matrix.routerd_os }}-${{ matrix.goarch }}"
          package="routerd-${tag}-${platform}.tar.gz"
          smoke="${RUNNER_TEMP}/routerd-install-smoke-${platform}"
          work="${RUNNER_TEMP}/routerd-archive-${platform}"
          rm -rf "${smoke}" "${work}"
          mkdir -p "${work}"
          tar -C "${work}" -xzf "dist/${platform}/${package}"
          (
            cd "${work}"
            ./install.sh --prefix "${smoke}" --no-restart --no-config-update --no-install-deps
            if [ "${{ matrix.routerd_os }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
              "${smoke}/sbin/routerd" --version
            else
              test -x "${smoke}/sbin/routerd"
            fi
            ./uninstall.sh --prefix "${smoke}" --yes --all
            test ! -e "${smoke}/sbin/routerd"
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: routerd-${{ needs.resolve-release.outputs.tag }}-${{ matrix.routerd_os }}-${{ matrix.goarch }}
          path: release/*
          if-no-files-found: error

  build-ndpi-agent-libndpi:
    name: Build native nDPI agent linux-amd64
    needs:
      - resolve-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.checkout-ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native nDPI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y file libndpi-dev pkg-config

      - name: Build native nDPI agent archive
        run: |
          make dist-ndpi-agent-libndpi \
            ROUTERD_OS=linux \
            GOARCH=amd64 \
            VERSION=${{ needs.resolve-release.outputs.tag }}

      - name: Collect native nDPI agent archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          platform="linux-amd64"
          package="routerd-ndpi-agent-libndpi-${tag}-${platform}.tar.gz"
          alias="routerd-ndpi-agent-libndpi-${platform}.tar.gz"
          test -f "dist/${platform}/${package}"
          test -f "dist/${platform}/${package}.sha256"
          test -f "dist/${platform}/${alias}"
          test -f "dist/${platform}/${alias}.sha256"
          mkdir -p release
          cp "dist/${platform}/${package}" "dist/${platform}/${package}.sha256" \
            "dist/${platform}/${alias}" "dist/${platform}/${alias}.sha256" release/

      - name: Smoke test native nDPI agent archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          package="routerd-ndpi-agent-libndpi-${tag}-linux-amd64.tar.gz"
          work="${RUNNER_TEMP}/routerd-ndpi-agent-libndpi"
          rm -rf "${work}"
          mkdir -p "${work}"
          tar -C "${work}" -xzf "dist/linux-amd64/${package}"
          "${work}/bin/routerd-ndpi-agent" selftest | grep -q '"libndpiLoaded":true'

      - name: Upload native nDPI agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: routerd-ndpi-agent-libndpi-${{ needs.resolve-release.outputs.tag }}-linux-amd64
          path: release/*
          if-no-files-found: error

  build-iso:
    name: Build live ISO
    needs:
      - resolve-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.checkout-ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap grub-pc-bin grub-efi-amd64-bin mtools xorriso squashfs-tools

      - name: Compute rootfs cache key
        id: rootfs-key
        shell: bash
        run: |
          hash=$(grep -E '^ubuntu_(suite|arch|base_packages|packages)=' scripts/build-live-iso.sh | sha256sum | awk '{print $1}')
          echo "hash=${hash}" >> "$GITHUB_OUTPUT"

      - name: Cache debootstrap rootfs
        uses: actions/cache@v4
        with:
          path: dist/live/rootfs-cache.tar
          key: live-iso-rootfs-${{ steps.rootfs-key.outputs.hash }}

      - name: Build live ISO
        run: make live-iso VERSION=${{ needs.resolve-release.outputs.tag }}
        env:
          ROOTFS_CACHE_TAR: dist/live/rootfs-cache.tar

      - name: Collect live ISO
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          mkdir -p release
          cp "dist/iso/routerd-live-${tag}.iso" "dist/iso/routerd-live-${tag}.iso.sha256" \
            "dist/iso/routerd-live.iso" "dist/iso/routerd-live.iso.sha256" release/

      - name: Upload live ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: routerd-live-${{ needs.resolve-release.outputs.tag }}
          path: release/*
          if-no-files-found: error

  publish-binaries:
    name: Publish binaries
    needs:
      - resolve-release
      - quality
      - build-archives
      - build-ndpi-agent-libndpi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.checkout-ref }}
          sparse-checkout: packaging/bootstrap.sh
          sparse-checkout-cone-mode: false

      - name: Download archive artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: "routerd-${{ needs.resolve-release.outputs.tag }}-*"
          path: release-artifacts
          merge-multiple: true

      - name: Download nDPI agent artifact
        uses: actions/download-artifact@v8
        with:
          pattern: "routerd-ndpi-agent-libndpi-${{ needs.resolve-release.outputs.tag }}-*"
          path: release-artifacts
          merge-multiple: true

      - name: Add bootstrap installer to artifacts
        shell: bash
        run: cp packaging/bootstrap.sh release-artifacts/install.sh

      - name: Publish release with binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          ls -l release-artifacts
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-artifacts/* --clobber
          else
            gh release create "${tag}" release-artifacts/* \
              --title "routerd ${tag}" \
              --generate-notes \
              --verify-tag
          fi

  publish-iso:
    name: Publish ISO
    needs:
      - resolve-release
      - build-iso
      - publish-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v8
        with:
          name: "routerd-live-${{ needs.resolve-release.outputs.tag }}"
          path: release-artifacts

      - name: Upload ISO to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-release.outputs.tag }}"
          ls -l release-artifacts
          gh release upload "${tag}" release-artifacts/* --clobber
