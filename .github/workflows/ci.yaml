name: CI

on:
  push:
    branches:
      - "main"
    tags:
      - "v[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9].[0-9][0-9][0-9][0-9]"
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Quality checks
    uses: ./.github/workflows/quality.yaml
    with:
      base-ref: ${{ github.base_ref || '' }}
      head-ref: ${{ github.head_ref || '' }}
