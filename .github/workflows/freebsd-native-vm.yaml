name: FreeBSD native VM smoke

on:
  pull_request:
    branches:
      - freebsd-parity
  push:
    branches:
      - freebsd-parity
  workflow_dispatch:
    inputs:
      ipv6_route_to_console_candidate:
        description: Run the isolated historical IPv6 PF route-to candidate with serial markers
        required: false
        default: false
        type: boolean
      tunnelinterface_runtime:
        description: Run isolated production gif/gre TunnelInterface lifecycle smoke
        required: false
        default: false
        type: boolean
      kernelmodule_persistence_runtime:
        description: Run isolated FreeBSD KernelModule loader persistence and reboot smoke
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  native-smoke:
    name: FreeBSD 14.3 native VM smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      # net0 remains anyvm SLIRP for SSH/rsync.  The pinned-source wrapper
      # adds net1 on this private host bridge for live IPsec data traffic.
      ROUTERD_IPSEC_TOPOLOGY: tap
      ROUTERD_IPSEC_PEER_ADDR: 198.18.200.1
      ROUTERD_IPSEC_GUEST_ADDR: 198.18.200.10
      # Linux interface names are limited to IFNAMSIZ-1 (15 bytes).
      ROUTERD_IPSEC_TAP: rd-ipsec-tap
      ROUTERD_IPSEC_BRIDGE: rd-ipsec-br
      ROUTERD_IPSEC_NETNS: rd-ipsec-ns
      ROUTERD_IPSEC_VETH_HOST: rd-ipsec-vh
      ROUTERD_IPSEC_VETH_PEER: rd-ipsec-vp
      ROUTERD_IPV6_ROUTE_TO_CONSOLE_CANDIDATE: ${{ inputs.ipv6_route_to_console_candidate || 'false' }}
      ROUTERD_FREEBSD_TUNNELINTERFACE_RUNTIME: ${{ inputs.tunnelinterface_runtime || 'false' }}
      ROUTERD_FREEBSD_KERNELMODULE_PERSISTENCE_RUNTIME: ${{ inputs.kernelmodule_persistence_runtime || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Start Linux strongSwan peer
        run: scripts/ci/freebsd-ipsec-linux-peer.sh start

      - name: Run native smoke with TAP IPsec underlay
        run: scripts/ci/freebsd-anyvm-tap.sh

      - name: Stop Linux strongSwan peer
        if: always()
        run: scripts/ci/freebsd-ipsec-linux-peer.sh stop

      - name: Upload native console evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: freebsd-native-console-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/routerd-anyvm-console-*
          if-no-files-found: error
