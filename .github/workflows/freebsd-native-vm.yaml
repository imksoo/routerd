name: FreeBSD native VM smoke

on:
  pull_request:
    branches:
      - freebsd-parity
  push:
    branches:
      - freebsd-parity
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-smoke:
    name: FreeBSD 14.3 native VM smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run native smoke in FreeBSD 14.3 amd64
        uses: vmactions/freebsd-vm@77ed28d336d03fe19a3f4f7266c1d2c4714dd79d # v1.5.2
        with:
          release: "14.3"
          arch: x86_64
          usesh: true
          copyback: false
          prepare: |
            pkg install -y go dnsmasq git hs-ShellCheck curl jq ndpi pkgconf
          run: |
            sh scripts/freebsd-native-vm-smoke.sh
