name: FreeBSD native VM smoke

on:
  pull_request:
    branches:
      - freebsd-parity
  push:
    branches:
      - freebsd-parity
  workflow_dispatch:
    inputs:
      ipv6_route_to_console_candidate:
        description: Run the isolated historical IPv6 PF route-to candidate with serial markers
        required: false
        default: false
        type: boolean
      arm64_runtime:
        description: Run the FreeBSD 14.3 arm64 QEMU/TCG current-binary runtime smoke
        required: false
        default: false
        type: boolean
      tunnelinterface_runtime:
        description: Run isolated production gif/gre TunnelInterface lifecycle smoke
        required: false
        default: false
        type: boolean
      clientpolicy_identity_runtime:
        description: Run isolated FreeBSD ClientPolicy explicit-IP identity smoke
        required: false
        default: false
        type: boolean
      kernelmodule_persistence_runtime:
        description: Run isolated FreeBSD KernelModule loader persistence and reboot smoke
        required: false
        default: false
        type: boolean
      lifecycle_runtime:
        description: Run isolated FreeBSD DHCPv4 BPF and DNS resolver lifecycle smoke
        required: false
        default: false
        type: boolean
      pppoe_runtime:
        description: Run isolated FreeBSD PPPoE client against an mpd5 peer
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  native-smoke:
    if: ${{ inputs.arm64_runtime != true }}
    name: FreeBSD 14.3 native VM smoke
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      # net0 remains anyvm SLIRP for SSH/rsync.  The pinned-source wrapper
      # adds net1 on this private host bridge for live IPsec data traffic.
      ROUTERD_IPSEC_TOPOLOGY: tap
      ROUTERD_IPSEC_PEER_ADDR: 198.18.200.1
      ROUTERD_IPSEC_GUEST_ADDR: 198.18.200.10
      # Linux interface names are limited to IFNAMSIZ-1 (15 bytes).
      ROUTERD_IPSEC_TAP: rd-ipsec-tap
      ROUTERD_IPSEC_BRIDGE: rd-ipsec-br
      ROUTERD_IPSEC_NETNS: rd-ipsec-ns
      ROUTERD_IPSEC_VETH_HOST: rd-ipsec-vh
      ROUTERD_IPSEC_VETH_PEER: rd-ipsec-vp
      ROUTERD_IPV6_ROUTE_TO_CONSOLE_CANDIDATE: ${{ inputs.ipv6_route_to_console_candidate || 'false' }}
      ROUTERD_FREEBSD_TUNNELINTERFACE_RUNTIME: ${{ inputs.tunnelinterface_runtime || 'false' }}
      ROUTERD_FREEBSD_CLIENTPOLICY_IDENTITY_RUNTIME: ${{ inputs.clientpolicy_identity_runtime || 'false' }}
      ROUTERD_FREEBSD_KERNELMODULE_PERSISTENCE_RUNTIME: ${{ inputs.kernelmodule_persistence_runtime || 'false' }}
      ROUTERD_FREEBSD_LIFECYCLE_RUNTIME: ${{ inputs.lifecycle_runtime || 'false' }}
      ROUTERD_FREEBSD_PPPOE_RUNTIME: ${{ inputs.pppoe_runtime || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Start Linux strongSwan peer
        run: scripts/ci/freebsd-ipsec-linux-peer.sh start

      - name: Run native smoke with TAP IPsec underlay
        run: scripts/ci/freebsd-anyvm-tap.sh

      - name: Stop Linux strongSwan peer
        if: always()
        run: scripts/ci/freebsd-ipsec-linux-peer.sh stop

      - name: Upload native console evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: freebsd-native-console-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/routerd-anyvm-console-*
          if-no-files-found: error

  arm64-runtime:
    if: ${{ inputs.arm64_runtime == true }}
    name: FreeBSD 14.3 arm64 emulated runtime smoke
    runs-on: ubuntu-latest
    # GitHub hosted runners provide x86_64 KVM, not arm64 KVM.  This job runs
    # real FreeBSD/aarch64 binaries under explicitly labelled QEMU TCG.
    timeout-minutes: 90
    env:
      ROUTERD_ANYVM_ARCH: aarch64
      ROUTERD_IPSEC_TOPOLOGY: tap
      ROUTERD_IPSEC_PEER_ADDR: 198.18.200.1
      ROUTERD_IPSEC_GUEST_ADDR: 198.18.200.10
      ROUTERD_IPSEC_TAP: rd-ipsec-tap
      ROUTERD_IPSEC_BRIDGE: rd-ipsec-br
      ROUTERD_IPSEC_NETNS: rd-ipsec-ns
      ROUTERD_IPSEC_VETH_HOST: rd-ipsec-vh
      ROUTERD_IPSEC_VETH_PEER: rd-ipsec-vp
      # The peer starts before an emulated guest's package install/full suite;
      # keep the initial phase bounded by this job's 90-minute wall clock.
      ROUTERD_IPSEC_INITIAL_LISTENER_SECONDS: 5400
      ROUTERD_IPV6_ROUTE_TO_CONSOLE_CANDIDATE: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Record arm64 emulation provenance
        run: |
          printf 'runner_arch=%s\n' "$(uname -m)"
          printf 'guest_arch=aarch64 acceleration=tcg anyvm=v0.5.1\n'

      - name: Start Linux strongSwan peer
        run: scripts/ci/freebsd-ipsec-linux-peer.sh start

      - name: Run FreeBSD arm64 runtime smoke
        run: scripts/ci/freebsd-anyvm-tap.sh

      - name: Stop Linux strongSwan peer
        if: always()
        run: scripts/ci/freebsd-ipsec-linux-peer.sh stop

      - name: Upload arm64 console evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: freebsd-arm64-tcg-console-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/routerd-anyvm-console-*
          if-no-files-found: error
