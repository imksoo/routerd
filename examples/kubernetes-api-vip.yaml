# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: kubernetes-edge
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: ens19
        managed: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens20
        managed: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-base
      spec:
        interface: lan
        address: 192.168.70.1/24
    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata:
        name: k8s-api-vip
      spec:
        family: ipv4
        interface: lan
        address: 192.168.70.10/32
        hostname: k8s-api.cluster.example
        mode: vrrp
        vrrp:
          virtualRouterID: 70
          priority: 150
          peers: [192.168.70.3]
        track:
          - resource: IngressService/kubernetes-api
            unhealthyPenalty: 60
          - resource: BGPRouter/lan
            unhealthyPenalty: 40
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: cluster-zone
      spec:
        zone: cluster.example
        records:
          - hostname: k8s-cp-01
            ipv4: 192.168.70.21
          - hostname: k8s-cp-02
            ipv4: 192.168.70.22
          - hostname: k8s-cp-03
            ipv4: 192.168.70.23
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan
      spec:
        listen:
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-base
                field: address
            port: 53
            sources: [cluster, default]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: cluster
      spec:
        resolver: DNSResolver/lan
        match: [cluster.example]
        zoneRefs: [DNSZone/cluster-zone]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/lan
        match: ["."]
        upstreams: [DNSUpstream/cloudflare]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare
      spec:
        protocol: udp
        address: 1.1.1.1
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: IngressService
      metadata:
        name: kubernetes-api
      spec:
        listen:
          interface: lan
          address: 192.168.70.10
          protocol: tcp
          port: 6443
        hostname: k8s-api.cluster.example
        backends:
          - name: cp-01
            address: k8s-cp-01.cluster.example
            port: 6443
          - name: cp-02
            address: k8s-cp-02.cluster.example
            port: 6443
          - name: cp-03
            address: k8s-cp-03.cluster.example
            port: 6443
        healthCheck:
          protocol: https
          path: /readyz
          expectedStatus: [200]
          tlsSkipVerify: true
        policy:
          selection: failover
          onNoHealthyBackends: reject
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata:
        name: lan
      spec:
        asn: 64512
        routerID: 192.168.70.2
        importPolicy:
          allowedPrefixes: [10.96.0.0/12, 192.168.80.0/24]
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata:
        name: k8s-workers
      spec:
        routerRef: BGPRouter/lan
        peerASN: 64513
        peers: [192.168.70.31, 192.168.70.32, 192.168.70.33]
