    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
        ownerRefs:
          - kind: DNSZone
            name: home
          - kind: DHCPv6Information
            name: wan-info
          - kind: IPv6DelegatedAddress
            name: lan-base
      spec:
        listen:
          - name: local
            addresses:
              - 127.0.0.1
            addressFrom:
              - resource: Interface/mgmt
                field: ipv4Addresses
            port: 53
            sources: [local-zone, home-wirednet-jp, lab-wirednet-jp, fab-wirednet-jp, lain-local, ngn-aftr, nextdns-bootstrap-ngn, nextdns-bootstrap-public, default]
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-base
                field: address
              - resource: IPv6DelegatedAddress/lan-base
                field: address
            port: 53
            sources: [local-zone, home-wirednet-jp, lab-wirednet-jp, fab-wirednet-jp, lain-local, ngn-aftr, nextdns-bootstrap-ngn, nextdns-bootstrap-public, default]
        sources:
          - name: local-zone
            kind: zone
            match:
              - home.internal
              - 18.172.in-addr.arpa
            zoneRef:
              - DNSZone/home
          - name: home-wirednet-jp
            kind: forward
            match:
              - home.wirednet.jp
            upstreams:
              - udp://192.168.1.252:53
          - name: lab-wirednet-jp
            kind: forward
            match:
              - lab.wirednet.jp
            upstreams:
              - udp://172.17.0.253:53
          - name: fab-wirednet-jp
            kind: forward
            match:
              - fab.wirednet.jp
            upstreams:
              - udp://192.168.1.26:53
          - name: lain-local
            kind: forward
            match:
              - lain.local
            upstreams:
              - udp://192.168.1.66:53
              - udp://192.168.1.67:53
          - name: ngn-aftr
            kind: forward
            match:
              - transix.jp
            upstreamFrom:
              - resource: DHCPv6Information/wan-info
                field: dnsServers
          - name: nextdns-bootstrap-ngn
            kind: forward
            match:
              - nextdns.io
            upstreamFrom:
              - resource: DHCPv6Information/wan-info
                field: dnsServers
          - name: nextdns-bootstrap-public
            kind: forward
            match:
              - nextdns.io
            upstreams:
              - udp://1.1.1.1:53
              - udp://8.8.8.8:53
          - name: default
            kind: upstream
            match:
              - "."
            upstreams:
              - https://dns.nextdns.io/6ef786/homert02
              - udp://[2a07:a8c0::6e:f786]:53
              - udp://[2a07:a8c1::6e:f786]:53
            healthcheck:
              interval: 15s
              timeout: 3s
              failThreshold: 3
              passThreshold: 2
        cache:
          enabled: true
          maxEntries: 10000
          minTTL: 60s
          maxTTL: 24h
          negativeTTL: 30s
        queryLog:
          enabled: true
          path: /var/lib/routerd/dns-queries.db
          retention: 30d

