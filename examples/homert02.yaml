apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: homert02
spec:
  resources:
  - apiVersion: system.routerd.net/v1alpha1
    kind: Package
    metadata:
      name: router-service-dependencies
    spec:
      state: present
      packages:
      - os: ubuntu
        manager: apt
        names:
        - dnsmasq-base
        - nftables
        - conntrack
        - iproute2
        - iputils-ping
        - iputils-tracepath
        - dnsutils
        - tcpdump
        - traceroute
        - procps
        - ppp
        - wireguard-tools
        - strongswan-swanctl
        - radvd
        - systemd
        - net-tools
        - kmod
      - os: nixos
        manager: nix
        names:
        - dnsmasq
        - nftables
        - conntrack-tools
        - iproute2
        - iputils
        - bind
        - tcpdump
        - traceroute
        - procps
        - ppp
        - wireguard-tools
        - strongswan
        - radvd
        - systemd
        - nettools
        - kmod
        optional: true
      - os: freebsd
        manager: pkg
        names:
        - dnsmasq
        - wireguard-tools
        - strongswan
        - mpd5
        - bind-tools
        optional: true
  - apiVersion: system.routerd.net/v1alpha1
    kind: SysctlProfile
    metadata:
      name: router-runtime
    spec:
      profile: router-linux
      runtime: true
      persistent: true
  - apiVersion: system.routerd.net/v1alpha1
    kind: Sysctl
    metadata:
      name: wan-accept-ra
    spec:
      key: net.ipv6.conf.ens18.accept_ra
      value: "2"
      runtime: true
      persistent: true
  - apiVersion: system.routerd.net/v1alpha1
    kind: NetworkAdoption
    metadata:
      name: wan-networkd-owned-by-routerd
    spec:
      interface: wan
      systemdNetworkd:
        disableDHCPv4: true
        disableDHCPv6: true
      systemdResolved:
        disableDNSStubListener: true
  - apiVersion: system.routerd.net/v1alpha1
    kind: NetworkAdoption
    metadata:
      name: lan-networkd-owned-by-routerd
    spec:
      interface: lan
      systemdNetworkd:
        disableDHCPv4: true
        disableDHCPv6: true
        disableIPv6RA: true
  - apiVersion: system.routerd.net/v1alpha1
    kind: SystemdUnit
    metadata:
      name: routerd.service
    spec:
      description: routerd controller chain for homert02
      execStart:
      - /usr/local/sbin/routerd
      - serve
      - --config
      - /usr/local/etc/routerd/router.yaml
      - --socket
      - /run/routerd/routerd.sock
      - --status-file
      - /run/routerd/status.json
      - --observe-interval
      - "0"
      - --controller-chain
      - --controller-chain-supervise-client-daemons=true
      - --controller-chain-dry-run-network-adoption=false
      - --controller-chain-dry-run-systemd-unit=false
      runtimeDirectory:
      - routerd
      - routerd/dhcpv6-client
      - routerd/dhcpv4-client
      - routerd/pppoe-client
      - routerd/healthcheck
      - routerd/dns-resolver
      stateDirectory:
      - routerd
      logsDirectory:
      - routerd
      ambientCapabilities:
      - CAP_NET_ADMIN
      - CAP_NET_RAW
      - CAP_NET_BIND_SERVICE
      capabilityBoundingSet:
      - CAP_NET_ADMIN
      - CAP_NET_RAW
      - CAP_NET_BIND_SERVICE
      restrictAddressFamilies:
      - AF_UNIX
      - AF_INET
      - AF_INET6
      - AF_NETLINK
      enabled: true
      started: false
  - apiVersion: net.routerd.net/v1alpha1
    kind: Interface
    metadata:
      name: wan
    spec:
      ifname: ens18
      managed: false
  - apiVersion: net.routerd.net/v1alpha1
    kind: Interface
    metadata:
      name: lan
    spec:
      ifname: ens19
      managed: false
  - apiVersion: net.routerd.net/v1alpha1
    kind: Interface
    metadata:
      name: mgmt
    spec:
      ifname: ens20
      managed: false
  - apiVersion: net.routerd.net/v1alpha1
    kind: DSLiteTunnel
    metadata:
      name: ds-lite
    spec:
      interface: wan
      tunnelName: ds-lite
      localAddressSource: static
      localAddress: 2001:db8::1
      aftrFQDN: gw.transix.jp
  - apiVersion: firewall.routerd.net/v1alpha1
    kind: FirewallZone
    metadata:
      name: wan
    spec:
      role: untrust
      interfaces:
      - Interface/wan
      - DSLiteTunnel/ds-lite
  - apiVersion: firewall.routerd.net/v1alpha1
    kind: FirewallZone
    metadata:
      name: lan
    spec:
      role: trust
      interfaces:
      - Interface/lan
  - apiVersion: firewall.routerd.net/v1alpha1
    kind: FirewallZone
    metadata:
      name: management
    spec:
      role: mgmt
      interfaces:
      - Interface/mgmt
  - apiVersion: firewall.routerd.net/v1alpha1
    kind: FirewallPolicy
    metadata:
      name: home
    spec:
      logDeny: true
      sameRoleAccept: true
  - apiVersion: firewall.routerd.net/v1alpha1
    kind: FirewallRule
    metadata:
      name: allow-lan-dns
    spec:
      fromZone: lan
      toZone: self
      protocol: udp
      port: 53
      action: accept
