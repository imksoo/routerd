# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: kubernetes-api-dualstack

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt

  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: ens19
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens20
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-v4
      spec:
        interface: lan
        address: 192.168.70.1/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualIPv4Address
      metadata:
        name: k8s-api-vip-v4
      spec:
        interface: lan
        address: 192.168.70.10/32
        hostname: k8s-api.cluster.example
        mode: vrrp
        vrrp:
          virtualRouterID: 70
          priority: 150
          preempt: true
          preemptDelay: 30s
          advertInterval: 1s
          peers:
            - 192.168.70.3
        track:
          - resource: IngressService/kubernetes-api
            unhealthyPenalty: 60
          - resource: BGPRouter/lan
            unhealthyPenalty: 40

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualIPv6Address
      metadata:
        name: k8s-api-vip-v6
      spec:
        interface: lan
        address: fd00:70::10/128
        hostname: k8s-api.cluster.example
        mode: vrrp
        vrrp:
          virtualRouterID: 71
          priority: 150
          preempt: true
          preemptDelay: 30s
          advertInterval: 1s
          peers:
            - fd00:70::3
        track:
          - resource: IngressService/kubernetes-api
            unhealthyPenalty: 60
          - resource: BGPRouter/lan
            unhealthyPenalty: 40

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: cluster-zone
      spec:
        zone: cluster.example
        ttl: 60
        records:
          - hostname: k8s-cp-01
            ipv4: 192.168.70.21
            ipv6: fd00:70::21
          - hostname: k8s-cp-02
            ipv4: 192.168.70.22
            ipv6: fd00:70::22
          - hostname: k8s-cp-03
            ipv4: 192.168.70.23
            ipv6: fd00:70::23

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
      spec:
        listen:
          - name: lan
            addresses:
              - fd00:70::1
            addressFrom:
              - resource: IPv4StaticAddress/lan-v4
                field: address
            port: 53
            sources:
              - local-zone
              - default
        sources:
          - name: local-zone
            kind: zone
            match:
              - cluster.example
            zoneRef:
              - DNSZone/cluster-zone
          - name: default
            kind: upstream
            match:
              - "."
            upstreams:
              - udp://1.1.1.1:53
              - udp://[2606:4700:4700::1111]:53

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata:
        name: lan
      spec:
        asn: 64512
        routerID: 192.168.70.1
        importPolicy:
          allowedPrefixes:
            - 10.244.0.0/16
            - fd00:244::/48
        gracefulRestart:
          enabled: true
        timers:
          keepalive: 3s
          holdTime: 9s

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata:
        name: k8s-speakers
      spec:
        routerRef: BGPRouter/lan
        peerASN: 64513
        peers:
          - 192.168.70.21
          - 192.168.70.22
          - 192.168.70.23
          - fd00:70::21
          - fd00:70::22
          - fd00:70::23

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: IngressService
      metadata:
        name: kubernetes-api
      spec:
        listen:
          interface: lan
          address: 192.168.70.10
          protocol: tcp
          port: 6443
        hostname: k8s-api.cluster.example
        selection: sourceHash
        backends:
          - name: cp-01
            address: k8s-cp-01.cluster.example
            port: 6443
          - name: cp-02
            address: k8s-cp-02.cluster.example
            port: 6443
          - name: cp-03
            address: k8s-cp-03.cluster.example
            port: 6443
        healthCheck:
          protocol: https
          path: /readyz
          expectedStatus:
            - 200
          tlsSkipVerify: true
          interval: 5s
