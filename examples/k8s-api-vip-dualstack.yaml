# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: kubernetes-api-dualstack
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens20
        managed: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-v4
      spec:
        interface: lan
        address: 192.168.70.1/24
    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata:
        name: api-v4
      spec:
        family: ipv4
        interface: lan
        address: 192.168.70.10/32
        hostname: k8s-api.cluster.example
        mode: vrrp
        vrrp:
          virtualRouterID: 70
          priority: 150
          peers: [192.168.70.3]
    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata:
        name: api-v6
      spec:
        family: ipv6
        interface: lan
        address: fd00:70::10/128
        hostname: k8s-api.cluster.example
        mode: vrrp
        vrrp:
          virtualRouterID: 71
          priority: 150
          peers: [fd00:70::3]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: cluster
      spec:
        zone: cluster.example
        records:
          - hostname: k8s-cp-01
            ipv4: 192.168.70.21
            ipv6: fd00:70::21
          - hostname: k8s-cp-02
            ipv4: 192.168.70.22
            ipv6: fd00:70::22
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan
      spec:
        listen:
          - name: lan
            addresses: [fd00:70::1]
            addressFrom:
              - resource: IPv4StaticAddress/lan-v4
                field: address
            port: 53
            sources: [cluster, default]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: cluster
      spec:
        resolver: DNSResolver/lan
        match: [cluster.example]
        zoneRefs: [DNSZone/cluster]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/lan
        match: ["."]
        upstreams: [DNSUpstream/cloudflare-v4, DNSUpstream/cloudflare-v6]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare-v4
      spec:
        protocol: udp
        address: 1.1.1.1
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare-v6
      spec:
        protocol: udp
        address: 2606:4700:4700::1111
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata:
        name: lan
      spec:
        asn: 64512
        routerID: 192.168.70.1
        convergenceProfile: fast
        importPolicy:
          allowedPrefixes: [10.250.0.0/24, fd00:250::/64]
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata:
        name: k8s-speakers
      spec:
        routerRef: BGPRouter/lan
        peerASN: 64513
        peers: [192.168.70.21, 192.168.70.22, fd00:70::21, fd00:70::22]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: IngressService
      metadata:
        name: kubernetes-api
      spec:
        listen:
          interface: lan
          address: 192.168.70.10
          protocol: tcp
          port: 6443
        hostname: k8s-api.cluster.example
        backends:
          - name: cp-01
            address: k8s-cp-01.cluster.example
            port: 6443
          - name: cp-02
            address: k8s-cp-02.cluster.example
            port: 6443
