apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: "${DEMO_ROUTER_NAME}"
spec:
  resources:
    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventGroup
      metadata: { name: cloudedge }
      spec:
        nodeName: "${DEMO_SELF_NODE}"
        retention:
          maxEvents: 1000
          maxAge: 24h
        auth:
          mode: hmac
          secretFile: "${EVENT_HMAC_SECRET_FILE}"
        listen:
          address: "${DEMO_SELF_IP}"
          port: 9443
        replayWindow: 5m

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: onprem-router }
      spec:
        groupRef: cloudedge
        nodeName: onprem-router
        endpoint: http://10.99.0.1:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: "${DEMO_SAMESITE_PEER_NODE}" }
      spec:
        groupRef: cloudedge
        nodeName: "${DEMO_SAMESITE_PEER_NODE}"
        endpoint: "http://${DEMO_SAMESITE_PEER_IP}:9443"
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-a }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-a
        endpoint: http://10.99.0.2:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-b }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-b
        endpoint: http://10.99.0.5:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router }
      spec:
        groupRef: cloudedge
        nodeName: oci-router
        endpoint: http://10.99.0.4:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router-b }
      spec:
        groupRef: cloudedge
        nodeName: oci-router-b
        endpoint: http://10.99.0.7:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-hybrid }
      spec: { privateKeyFile: /usr/local/etc/routerd/secrets/wg-hybrid.key, listenPort: 51820, mtu: 1420 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-hybrid-ipv4 }
      spec: { interface: wg-hybrid, address: "${DEMO_SELF_IP}/32" }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-onprem-wg-overlay }
      spec: { destination: 10.99.0.1/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-wg-overlay-transit }
      spec: { destination: 10.99.0.2/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-b-wg-overlay-transit }
      spec: { destination: 10.99.0.5/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-oci-wg-overlay-transit }
      spec: { destination: 10.99.0.4/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-oci-b-wg-overlay-transit }
      spec: { destination: 10.99.0.7/32, device: wg-hybrid, metric: 80 }

    # same-site standby overlay /32 (A<->B event push over the hub)
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-samesite-wg-overlay-transit }
      spec: { destination: "${DEMO_SAMESITE_PEER_IP}/32", device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: onprem-main }
      spec:
        interface: wg-hybrid
        publicKey: "${ONPREM_WG_PUBLIC_KEY}"
        endpoint: "${ONPREM_WG_ENDPOINT}"
        allowedIPs: [10.99.0.1/32, 10.99.0.2/32, 10.99.0.4/32, 10.99.0.5/32, "${DEMO_SAMESITE_PEER_IP}/32", 10.99.0.7/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata: { name: mobility-bgp }
      spec:
        asn: 64577
        routerID: "${DEMO_SELF_IP}"
        listen: { address: "${DEMO_SELF_IP}", port: 179 }
        importPolicy: { allowedPrefixes: [10.77.60.0/24, 10.99.0.0/24], nextHopRewrite: unchanged }
        timers: { profile: fast }
        convergenceProfile: fast

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: onprem-rr }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.1], timers: { profile: fast }, bfd: BFD/onprem-rr }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: onprem-rr }
      spec:
        peer: BGPPeer/onprem-rr
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: onprem-main }
      spec:
        role: onprem
        nodeID: onprem-router
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.1 }
        remote: { nodeID: "${DEMO_SELF_NODE}", address: "${DEMO_SELF_IP}" }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: CloudProviderProfile
      metadata: { name: azure-lab }
      spec:
        provider: azure
        subscriptionID: "${AZURE_SUBSCRIPTION_ID}"
        resourceGroup: "${AZURE_RESOURCE_GROUP}"
        region: "${AZURE_REGION}"
        capabilities: [nic-secondary-ip, ip-forwarding]
        auth: { mode: external-command, command: /usr/local/libexec/routerd/plugins/azure-auth }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: MobilityPool
      metadata: { name: cloudedge }
      spec:
        prefix: 10.77.60.0/24
        groupRef: cloudedge
        deliveryPolicy: { mode: bgp }
        members:
          - nodeRef: onprem-router
            site: onprem
            role: onprem
            staticOwnedAddresses:
              - 10.77.60.10/32
            capture:
              type: proxy-arp
              interface: ens21
              gratuitousARP: true
              activeWhen: { type: vrrp-master, virtualAddressRef: onprem-gate-vip }
          - nodeRef: aws-router-a
            site: aws
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens5, providerRef: aws-lab, providerMode: eni-secondary-ip, configureOSAddress: false, target: { region: "${AWS_REGION}" } }
            placement: { group: aws-edge, priority: 10 }
            ownershipDiscovery: { mode: provider-private-ip, providerRef: aws-lab, scope: { includePrimary: false }, subnetRef: "${AWS_SUBNET_REF}", scanInterval: 60s, leaseTTL: 10m }
          - nodeRef: aws-router-b
            site: aws
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens5, providerRef: aws-lab, providerMode: eni-secondary-ip, configureOSAddress: false, target: { region: "${AWS_REGION}" } }
            placement: { group: aws-edge, priority: 20 }
            ownershipDiscovery: { mode: provider-private-ip, providerRef: aws-lab, scope: { includePrimary: false }, subnetRef: "${AWS_SUBNET_REF}", scanInterval: 60s, leaseTTL: 10m }
          - nodeRef: azure-router
            site: azure
            role: cloud
            capture: { type: provider-secondary-ip, interface: eth0, providerRef: azure-lab, providerMode: nic-secondary-ip, configureOSAddress: false, target: { region: "${AZURE_REGION}", resourceGroup: "${AZURE_RESOURCE_GROUP}" } }
            placement: { group: azure-edge, priority: 10 }
            ownershipDiscovery: { mode: provider-private-ip, providerRef: azure-lab, scope: { includePrimary: false }, subnetRef: "${AZURE_SUBNET_REF}", scanInterval: 60s, leaseTTL: 10m }
          - nodeRef: azure-router-b
            site: azure
            role: cloud
            capture: { type: provider-secondary-ip, interface: eth0, providerRef: azure-lab, providerMode: nic-secondary-ip, configureOSAddress: false, target: { region: "${AZURE_REGION}", resourceGroup: "${AZURE_RESOURCE_GROUP}" } }
            placement: { group: azure-edge, priority: 20 }
            ownershipDiscovery: { mode: provider-private-ip, providerRef: azure-lab, scope: { includePrimary: false }, subnetRef: "${AZURE_SUBNET_REF}", scanInterval: 60s, leaseTTL: 10m }
          - nodeRef: oci-router
            site: oci
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens3, providerRef: oci-lab, providerMode: vnic-secondary-ip, configureOSAddress: false, target: { region: "${OCI_REGION}", compartmentId: "${OCI_COMPARTMENT_REF}" } }
            placement: { group: oci-edge, priority: 10 }
            ownershipDiscovery: { mode: provider-private-ip, providerRef: oci-lab, scope: { includePrimary: false }, subnetRef: "${OCI_SUBNET_REF}", scanInterval: 60s, leaseTTL: 10m }
          - nodeRef: oci-router-b
            site: oci
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens3, providerRef: oci-lab, providerMode: vnic-secondary-ip, configureOSAddress: false, target: { region: "${OCI_REGION}", compartmentId: "${OCI_COMPARTMENT_REF}" } }
            placement: { group: oci-edge, priority: 20 }
            ownershipDiscovery: { mode: provider-private-ip, providerRef: oci-lab, scope: { includePrimary: false }, subnetRef: "${OCI_SUBNET_REF}", scanInterval: 60s, leaseTTL: 10m }
        capturePolicy: { mode: all-non-owner-sites }
        ipOwnershipPolicy: { type: centralized, autoFailover: true }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: ProviderActionPolicy
      metadata: { name: azure-live-mutation }
      spec:
        enabled: true
        dryRunOnly: false
        requireApproval: false
        allowedProviders: [azure]
        allowedProviderRefs: [azure-lab]
        allowedActions: [assign-secondary-ip, unassign-secondary-ip, ensure-forwarding-enabled, ensure-forwarding-disabled]
        allowedCIDRs: [10.77.60.0/24]
        maxActionsPerRun: 8
        allowUndo: true

    - apiVersion: plugin.routerd.net/v1alpha1
      kind: Plugin
      metadata: { name: azure-executor }
      spec:
        executable: /usr/local/libexec/routerd/plugins/azure-provider-executor/bin/azure-provider-executor
        timeout: 120s
        # The executor inherits only PATH + this env (least-privilege; the
        # routerd process env is NOT inherited). Point `az` at a service-writable
        # config dir so it never falls back to /root/.azure, which the routerd
        # service user cannot access (and which systemd ProtectHome=yes masks).
        env: { AZURE_CONFIG_DIR: /var/lib/routerd/azure }
        capabilities: [execute.providerAction]

    - apiVersion: plugin.routerd.net/v1alpha1
      kind: Plugin
      metadata: { name: azure-inventory }
      spec:
        executable: /usr/local/libexec/routerd/plugins/provider-private-ip-inventory
        timeout: 60s
        env: { AZURE_CONFIG_DIR: /var/lib/routerd/azure }
        capabilities: [observe.providerPrivateIPs]
