apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: "${DEMO_ROUTER_NAME}"
spec:
  resources:
    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventGroup
      metadata: { name: cloudedge }
      spec:
        nodeName: "${DEMO_SELF_NODE}"
        retention:
          maxEvents: 1000
          maxAge: 24h
        auth:
          mode: hmac
          secretFile: "${EVENT_HMAC_SECRET_FILE}"
        listen:
          address: "${DEMO_SELF_IP}"
          port: 9443
        replayWindow: 5m

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: "${DEMO_SAMESITE_PEER_NODE}" }
      spec:
        groupRef: cloudedge
        nodeName: "${DEMO_SAMESITE_PEER_NODE}"
        endpoint: "http://${DEMO_SAMESITE_PEER_IP}:9443"
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: onprem-router }
      spec:
        groupRef: cloudedge
        nodeName: onprem-router
        endpoint: http://10.99.0.1:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-a }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-a
        endpoint: http://10.99.0.2:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-b }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-b
        endpoint: http://10.99.0.5:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router }
      spec:
        groupRef: cloudedge
        nodeName: azure-router
        endpoint: http://10.99.0.3:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router-b }
      spec:
        groupRef: cloudedge
        nodeName: azure-router-b
        endpoint: http://10.99.0.6:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-hybrid }
      spec: { privateKeyFile: /usr/local/etc/routerd/secrets/wg-hybrid.key, listenPort: 51820, mtu: 1420 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: wg-hybrid }
      spec: { ifname: wg-hybrid, managed: false, mtu: 1420 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-hybrid-ipv4 }
      spec: { interface: wg-hybrid, address: "${DEMO_SELF_IP}/32" }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-wg-overlay-transit }
      spec: { destination: 10.99.0.2/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-b-wg-overlay-transit }
      spec: { destination: 10.99.0.5/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-azure-wg-overlay-transit }
      spec: { destination: 10.99.0.3/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-azure-b-wg-overlay-transit }
      spec: { destination: 10.99.0.6/32, device: wg-hybrid, metric: 80 }

    # same-site standby overlay /32 (A<->B event push over the hub)
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-samesite-wg-overlay-transit }
      spec: { destination: "${DEMO_SAMESITE_PEER_IP}/32", device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: onprem-main }
      spec:
        interface: wg-hybrid
        publicKey: "${ONPREM_WG_PUBLIC_KEY}"
        endpoint: "${ONPREM_WG_ENDPOINT}"
        allowedIPs: [10.99.0.1/32, 10.99.0.2/32, 10.99.0.3/32, 10.99.0.5/32, 10.99.0.6/32, "${DEMO_SAMESITE_PEER_IP}/32"]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata: { name: mobility-bgp }
      spec:
        asn: 64577
        routerID: "${DEMO_SELF_IP}"
        listen: { port: 179 }
        importPolicy: { allowedPrefixes: [10.77.60.0/24, 10.99.0.0/24], nextHopRewrite: unchanged }
        timers: { profile: fast }
        convergenceProfile: fast

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata: { name: cloudedge-transport }
      spec:
        selfNodeRef: "${DEMO_SELF_NODE}"
        mode: ipip
        encryption: wireguard
        innerPrefix: 10.255.0.0/24
        topologyNodeRefs: [onprem-router, aws-router-a, aws-router-b, azure-router, azure-router-b, "${DEMO_SELF_NODE}", "${DEMO_SAMESITE_PEER_NODE}"]
        underlayInterface: wg-hybrid
        localEndpointFrom: { resource: IPv4StaticAddress/wg-hybrid-ipv4, field: address }
        bgp:
          routerRef: BGPRouter/mobility-bgp
          peerASN: 64577
          timersPreset: fast
          importPolicy:
            allowedPrefixes: [10.77.60.0/24]
            nextHopRewrite: peer-address
        peers:
          - { nodeRef: onprem-router, remoteEndpoint: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: CloudProviderProfile
      metadata: { name: oci-lab }
      spec:
        provider: oci
        region: "${OCI_REGION}"
        capabilities: [vnic-secondary-ip, skip-source-dest-check]
        auth: { mode: external-command, command: /usr/local/libexec/routerd/plugins/oci-auth }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: MobilityPool
      metadata: { name: cloudedge }
      spec:
        prefix: 10.77.60.0/24
        groupRef: cloudedge
        values:
          self.region: "${OCI_REGION}"
          self.compartmentId: "${OCI_COMPARTMENT_REF}"
          self.subnetRef: "${OCI_SUBNET_REF}"
        profiles:
          cloudCaptures:
            oci-self:
              capture:
                type: provider-secondary-ip
                interface: ens3
                providerRef: oci-lab
                providerMode: vnic-secondary-ip
                nicRef: "${DEMO_SELF_NIC_REF}"
                configureOSAddress: false
                targetFrom:
                  region: self.region
                  compartmentId: self.compartmentId
              ownershipDiscovery:
                mode: provider-private-ip
                scope: { includePrimary: false }
                subnetRefFrom: self.subnetRef
                scanInterval: 60s
                leaseTTL: 10m
        deliveryPolicy: { mode: bgp }
        members:
          - nodeRef: onprem-router
            site: onprem
            role: onprem
          - nodeRef: aws-router-a
            site: aws
            role: cloud
            placement: { group: aws-edge, priority: 10 }
          - nodeRef: aws-router-b
            site: aws
            role: cloud
            placement: { group: aws-edge, priority: 20 }
          - nodeRef: azure-router
            site: azure
            role: cloud
            placement: { group: azure-edge, priority: 10 }
          - nodeRef: azure-router-b
            site: azure
            role: cloud
            placement: { group: azure-edge, priority: 20 }
          - nodeRef: "${DEMO_SELF_NODE}"
            site: oci
            role: cloud
            profileRef: oci-self
            placement: { group: oci-edge, priority: ${DEMO_SELF_PRIORITY} }
          - nodeRef: "${DEMO_SAMESITE_PEER_NODE}"
            site: oci
            role: cloud
            placement: { group: oci-edge, priority: ${DEMO_SAMESITE_PEER_PRIORITY} }
        capturePolicy: { mode: all-non-owner-sites }
        ipOwnershipPolicy: { type: centralized, autoFailover: true }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: ProviderActionPolicy
      metadata: { name: oci-live-mutation }
      spec:
        enabled: true
        dryRunOnly: false
        requireApproval: false
        allowedProviders: [oci]
        allowedProviderRefs: [oci-lab]
        allowedActions: [assign-secondary-ip, unassign-secondary-ip, ensure-forwarding-enabled, ensure-forwarding-disabled]
        allowedCIDRs: [10.77.60.0/24]
        maxActionsPerRun: 8
        allowUndo: true

    - apiVersion: plugin.routerd.net/v1alpha1
      kind: Plugin
      metadata: { name: oci-executor }
      spec:
        executable: /usr/local/libexec/routerd/plugins/oci-provider-executor/bin/oci-provider-executor
        timeout: 120s
        capabilities: [execute.providerAction]

    - apiVersion: plugin.routerd.net/v1alpha1
      kind: Plugin
      metadata: { name: oci-inventory }
      spec:
        executable: /usr/local/libexec/routerd/plugins/provider-private-ip-inventory
        timeout: 60s
        env:
          OCI_CONFIG_FILE: "${OCI_INVENTORY_CONFIG_FILE}"
          OCI_PROFILE: "${OCI_INVENTORY_PROFILE}"
          OCI_REGION: "${OCI_REGION}"
          OCI_AUTH_MODE: "${OCI_INVENTORY_AUTH_MODE}"
          ROUTERD_PROVIDER_INVENTORY_SELF_NIC_REF: "${DEMO_SELF_NIC_REF}"
        capabilities: [observe.providerPrivateIPs]
