# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: cloudedge-mobility-onprem-demo
spec:
  resources:
    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventGroup
      metadata: { name: cloudedge }
      spec:
        nodeName: onprem-router
        retention:
          maxEvents: 1000
          maxAge: 24h
        auth:
          mode: hmac
          secretFile: "${EVENT_HMAC_SECRET_FILE}"
        listen:
          address: 10.99.0.1
          port: 9443
        replayWindow: 5m

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-a }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-a
        endpoint: http://10.99.0.2:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-b }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-b
        endpoint: http://10.99.0.5:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router }
      spec:
        groupRef: cloudedge
        nodeName: azure-router
        endpoint: http://10.99.0.3:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router-b }
      spec:
        groupRef: cloudedge
        nodeName: azure-router-b
        endpoint: http://10.99.0.6:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router }
      spec:
        groupRef: cloudedge
        nodeName: oci-router
        endpoint: http://10.99.0.4:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router-b }
      spec:
        groupRef: cloudedge
        nodeName: oci-router-b
        endpoint: http://10.99.0.7:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: ens21 }
      spec: { ifname: ens21, adminUp: true, managed: true }

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: lo }
      spec: { ifname: lo, managed: false, owner: external }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: ens21-lan-ipv4 }
      spec: { interface: ens21, address: 10.77.60.1/24 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: onprem-mobility-source-ipv4 }
      spec:
        interface: lo
        address: 10.77.60.10/32
        allowOverlap: true
        allowOverlapReason: "onprem router-originated mobility source address"

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata: { name: onprem-gate-vip }
      spec:
        family: ipv4
        interface: ens21
        address: 10.77.60.254/32
        mode: vrrp
        vrrp:
          virtualRouterID: 77
          priority: 150
          peers: [10.77.60.2]
          preempt: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-hybrid }
      spec:
        privateKeyFile: /usr/local/etc/routerd/secrets/wg-hybrid.key
        listenPort: 51820
        mtu: 1420

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: wg-hybrid }
      spec: { ifname: wg-hybrid, managed: false, mtu: 1420 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-hybrid-ipv4 }
      spec: { interface: wg-hybrid, address: 10.99.0.1/32 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: aws-a-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AWS_ROUTER_A_WG_PUBLIC_KEY}"
        endpoint: "${AWS_ROUTER_A_WG_ENDPOINT}"
        allowedIPs: [10.99.0.2/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: aws-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AWS_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${AWS_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.5/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: azure-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AZURE_WG_PUBLIC_KEY}"
        endpoint: "${AZURE_WG_ENDPOINT}"
        allowedIPs: [10.99.0.3/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: azure-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AZURE_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${AZURE_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.6/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: oci-main }
      spec:
        interface: wg-hybrid
        publicKey: "${OCI_WG_PUBLIC_KEY}"
        endpoint: "${OCI_WG_ENDPOINT}"
        allowedIPs: [10.99.0.4/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: oci-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${OCI_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${OCI_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.7/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata: { name: mobility-bgp }
      spec:
        asn: 64577
        routerID: 10.99.0.1
        listen: { port: 179 }
        importPolicy: { allowedPrefixes: [10.77.60.0/24, 10.99.0.0/24], nextHopRewrite: unchanged }
        timers: { profile: fast }
        convergenceProfile: fast

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata: { name: cloudedge-transport }
      spec:
        selfNodeRef: onprem-router
        mode: ipip
        encryption: wireguard
        innerPrefix: 10.255.0.0/20
        topologyNodeRefs: [onprem-router, aws-router-a, aws-router-b, azure-router, azure-router-b, oci-router, oci-router-b]
        underlayInterface: wg-hybrid
        localEndpointFrom: { resource: IPv4StaticAddress/wg-hybrid-ipv4, field: address }
        bgp:
          routerRef: BGPRouter/mobility-bgp
          peerASN: 64577
          timersPreset: fast
          bfd:
            enabled: true
            profile: fast
          routeReflectorClient: true
          routeReflectorClusterID: 10.99.0.1
        peers:
          - { nodeRef: aws-router-a, remoteEndpoint: 10.99.0.2 }
          - { nodeRef: aws-router-b, remoteEndpoint: 10.99.0.5 }
          - { nodeRef: azure-router, remoteEndpoint: 10.99.0.3 }
          - { nodeRef: azure-router-b, remoteEndpoint: 10.99.0.6 }
          - { nodeRef: oci-router, remoteEndpoint: 10.99.0.4 }
          - { nodeRef: oci-router-b, remoteEndpoint: 10.99.0.7 }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: MobilityPool
      metadata: { name: cloudedge }
      spec:
        prefix: 10.77.60.0/24
        groupRef: cloudedge
        deliveryPolicy: { mode: bgp }
        members:
          - nodeRef: onprem-router
            site: onprem
            role: onprem
            staticOwnedAddresses:
              - 10.77.60.10/32
            ownershipDiscovery:
              mode: onprem-l2
              sources:
                - type: arp-observer
                  interface: ens21
            capture:
              type: proxy-arp
              interface: ens21
              gratuitousARP: true
              activeWhen: { type: vrrp-master, virtualAddressRef: onprem-gate-vip }
          - nodeRef: aws-router-a
            site: aws
            role: cloud
            placement: { group: aws-edge, priority: 10 }
          - nodeRef: aws-router-b
            site: aws
            role: cloud
            placement: { group: aws-edge, priority: 20 }
          - nodeRef: azure-router
            site: azure
            role: cloud
            placement: { group: azure-edge, priority: 10 }
          - nodeRef: azure-router-b
            site: azure
            role: cloud
            placement: { group: azure-edge, priority: 20 }
          - nodeRef: oci-router
            site: oci
            role: cloud
            placement: { group: oci-edge, priority: 10 }
          - nodeRef: oci-router-b
            site: oci
            role: cloud
            placement: { group: oci-edge, priority: 20 }
        capturePolicy: { mode: all-non-owner-sites }
        ipOwnershipPolicy: { type: centralized, autoFailover: true }
