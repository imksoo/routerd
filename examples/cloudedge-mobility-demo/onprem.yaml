apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: cloudedge-mobility-onprem-demo
spec:
  resources:
    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventGroup
      metadata: { name: cloudedge }
      spec:
        nodeName: onprem-router
        retention:
          maxEvents: 1000
          maxAge: 24h
        auth:
          mode: hmac
          secretFile: "${EVENT_HMAC_SECRET_FILE}"
        listen:
          address: 10.99.0.1
          port: 9443
        replayWindow: 5m

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-a }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-a
        endpoint: http://10.99.0.2:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-b }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-b
        endpoint: http://10.99.0.5:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router }
      spec:
        groupRef: cloudedge
        nodeName: azure-router
        endpoint: http://10.99.0.3:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router-b }
      spec:
        groupRef: cloudedge
        nodeName: azure-router-b
        endpoint: http://10.99.0.6:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router }
      spec:
        groupRef: cloudedge
        nodeName: oci-router
        endpoint: http://10.99.0.4:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router-b }
      spec:
        groupRef: cloudedge
        nodeName: oci-router-b
        endpoint: http://10.99.0.7:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: ens21 }
      spec: { ifname: ens21, adminUp: true, managed: true }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: ens21-lan-ipv4 }
      spec: { interface: ens21, address: 10.77.60.1/24 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata: { name: onprem-gate-vip }
      spec:
        family: ipv4
        interface: ens21
        address: 10.77.60.254/32
        mode: vrrp
        vrrp:
          virtualRouterID: 77
          priority: 150
          peers: [10.77.60.2]
          preempt: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-hybrid }
      spec:
        privateKeyFile: /usr/local/etc/routerd/secrets/wg-hybrid.key
        listenPort: 51820
        mtu: 1420

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-hybrid-ipv4 }
      spec: { interface: wg-hybrid, address: 10.99.0.1/32 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-a-wg-overlay }
      spec: { destination: 10.99.0.2/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-b-wg-overlay }
      spec: { destination: 10.99.0.5/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-azure-wg-overlay }
      spec: { destination: 10.99.0.3/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-azure-b-wg-overlay }
      spec: { destination: 10.99.0.6/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-oci-wg-overlay }
      spec: { destination: 10.99.0.4/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-oci-b-wg-overlay }
      spec: { destination: 10.99.0.7/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: aws-a-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AWS_ROUTER_A_WG_PUBLIC_KEY}"
        endpoint: "${AWS_ROUTER_A_WG_ENDPOINT}"
        allowedIPs: [10.99.0.2/32, 10.77.60.11/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: aws-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AWS_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${AWS_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.5/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: azure-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AZURE_WG_PUBLIC_KEY}"
        endpoint: "${AZURE_WG_ENDPOINT}"
        allowedIPs: [10.99.0.3/32, 10.77.60.12/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: azure-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AZURE_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${AZURE_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.6/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: oci-main }
      spec:
        interface: wg-hybrid
        publicKey: "${OCI_WG_PUBLIC_KEY}"
        endpoint: "${OCI_WG_ENDPOINT}"
        allowedIPs: [10.99.0.4/32, 10.77.60.13/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: oci-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${OCI_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${OCI_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.7/32]
        persistentKeepalive: 25

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: aws-a-main }
      spec:
        role: cloud
        nodeID: aws-router-a
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.2 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: aws-b-main }
      spec:
        role: cloud
        nodeID: aws-router-b
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.5 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: azure-main }
      spec:
        role: cloud
        nodeID: azure-router
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.3 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: azure-b-main }
      spec:
        role: cloud
        nodeID: azure-router-b
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.6 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: oci-main }
      spec:
        role: cloud
        nodeID: oci-router
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.4 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: oci-b-main }
      spec:
        role: cloud
        nodeID: oci-router-b
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.7 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: MobilityPool
      metadata: { name: cloudedge }
      spec:
        prefix: 10.77.60.0/24
        groupRef: cloudedge
        members:
          - nodeRef: onprem-router
            site: onprem
            role: onprem
            staticOwnedAddresses:
              - 10.77.60.10/32
            capture:
              type: proxy-arp
              interface: ens21
              gratuitousARP: true
              activeWhen: { type: vrrp-master, virtualAddressRef: onprem-gate-vip }
            deliveryTo:
              - { nodeRef: aws-router-a, peerRef: aws-a-main, mode: route, tunnelInterface: wg-hybrid }
              - { nodeRef: aws-router-b, peerRef: aws-b-main, mode: route, tunnelInterface: wg-hybrid }
              - { nodeRef: azure-router, peerRef: azure-main, mode: route, tunnelInterface: wg-hybrid }
              - { nodeRef: azure-router-b, peerRef: azure-b-main, mode: route, tunnelInterface: wg-hybrid }
              - { nodeRef: oci-router, peerRef: oci-main, mode: route, tunnelInterface: wg-hybrid }
              - { nodeRef: oci-router-b, peerRef: oci-b-main, mode: route, tunnelInterface: wg-hybrid }
          - nodeRef: aws-router-a
            site: aws
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens5, providerRef: aws-lab, providerMode: eni-secondary-ip, nicRef: "${AWS_ROUTER_A_ENI_REF}", configureOSAddress: false, target: { region: "${AWS_REGION}" } }
            delivery: { peerRef: aws-a-main, mode: route, tunnelInterface: wg-hybrid }
            placement: { group: aws-edge, priority: 10 }
          - nodeRef: aws-router-b
            site: aws
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens5, providerRef: aws-lab, providerMode: eni-secondary-ip, nicRef: "${AWS_ROUTER_B_ENI_REF}", configureOSAddress: false, target: { region: "${AWS_REGION}" } }
            delivery: { peerRef: aws-b-main, mode: route, tunnelInterface: wg-hybrid }
            placement: { group: aws-edge, priority: 20 }
          - nodeRef: azure-router
            site: azure
            role: cloud
            capture: { type: provider-secondary-ip, interface: eth0, providerRef: azure-lab, providerMode: nic-secondary-ip, nicRef: "${AZURE_ROUTER_NIC_REF}", configureOSAddress: false, target: { region: "${AZURE_REGION}", resourceGroup: "${AZURE_RESOURCE_GROUP}", nicName: "${AZURE_ROUTER_NIC_NAME}" } }
            delivery: { peerRef: azure-main, mode: route, tunnelInterface: wg-hybrid }
            placement: { group: azure-edge, priority: 10 }
          - nodeRef: azure-router-b
            site: azure
            role: cloud
            capture: { type: provider-secondary-ip, interface: eth0, providerRef: azure-lab, providerMode: nic-secondary-ip, nicRef: "${AZURE_ROUTER_B_NIC_REF}", configureOSAddress: false, target: { region: "${AZURE_REGION}", resourceGroup: "${AZURE_RESOURCE_GROUP}", nicName: "${AZURE_ROUTER_B_NIC_NAME}" } }
            delivery: { peerRef: azure-b-main, mode: route, tunnelInterface: wg-hybrid }
            placement: { group: azure-edge, priority: 20 }
          - nodeRef: oci-router
            site: oci
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens3, providerRef: oci-lab, providerMode: vnic-secondary-ip, nicRef: "${OCI_ROUTER_VNIC_REF}", configureOSAddress: false, target: { region: "${OCI_REGION}", compartmentId: "${OCI_COMPARTMENT_REF}" } }
            delivery: { peerRef: oci-main, mode: route, tunnelInterface: wg-hybrid }
            placement: { group: oci-edge, priority: 10 }
          - nodeRef: oci-router-b
            site: oci
            role: cloud
            capture: { type: provider-secondary-ip, interface: ens3, providerRef: oci-lab, providerMode: vnic-secondary-ip, nicRef: "${OCI_ROUTER_B_VNIC_REF}", configureOSAddress: false, target: { region: "${OCI_REGION}", compartmentId: "${OCI_COMPARTMENT_REF}" } }
            delivery: { peerRef: oci-b-main, mode: route, tunnelInterface: wg-hybrid }
            placement: { group: oci-edge, priority: 20 }
        leasePolicy: { ttl: 30m, holdDuration: 5s }
        capturePolicy: { mode: all-non-owner-sites, deprovisionHoldDuration: 5s }
        ipOwnershipPolicy: { type: centralized, autoFailover: true, heartbeatInterval: 10s, heartbeatTTL: 30s, promotionHoldDuration: 5s }
