apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: cloudedge-mobility-onprem-demo
spec:
  resources:
    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventGroup
      metadata: { name: cloudedge }
      spec:
        nodeName: onprem-router
        retention:
          maxEvents: 1000
          maxAge: 24h
        auth:
          mode: hmac
          secretFile: "${EVENT_HMAC_SECRET_FILE}"
        listen:
          address: 10.99.0.1
          port: 9443
        replayWindow: 5m

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-a }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-a
        endpoint: http://10.99.0.2:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: aws-router-b }
      spec:
        groupRef: cloudedge
        nodeName: aws-router-b
        endpoint: http://10.99.0.5:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router }
      spec:
        groupRef: cloudedge
        nodeName: azure-router
        endpoint: http://10.99.0.3:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: azure-router-b }
      spec:
        groupRef: cloudedge
        nodeName: azure-router-b
        endpoint: http://10.99.0.6:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router }
      spec:
        groupRef: cloudedge
        nodeName: oci-router
        endpoint: http://10.99.0.4:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: federation.routerd.net/v1alpha1
      kind: EventPeer
      metadata: { name: oci-router-b }
      spec:
        groupRef: cloudedge
        nodeName: oci-router-b
        endpoint: http://10.99.0.7:9443
        direction: push
        types: [routerd.client.ipv4.observed, routerd.client.ipv4.expired]
        subjectPrefixes: [10.77.60.]

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: ens21 }
      spec: { ifname: ens21, adminUp: true, managed: true }

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: lo }
      spec: { ifname: lo, managed: false, owner: external }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: ens21-lan-ipv4 }
      spec: { interface: ens21, address: 10.77.60.1/24 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: onprem-mobility-source-ipv4 }
      spec:
        interface: lo
        address: 10.77.60.10/32
        allowOverlap: true
        allowOverlapReason: "onprem router-originated mobility source address"

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata: { name: onprem-gate-vip }
      spec:
        family: ipv4
        interface: ens21
        address: 10.77.60.254/32
        mode: vrrp
        vrrp:
          virtualRouterID: 77
          priority: 150
          peers: [10.77.60.2]
          preempt: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-hybrid }
      spec:
        privateKeyFile: /usr/local/etc/routerd/secrets/wg-hybrid.key
        listenPort: 51820
        mtu: 1420

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-hybrid-ipv4 }
      spec: { interface: wg-hybrid, address: 10.99.0.1/32 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-a-wg-overlay }
      spec: { destination: 10.99.0.2/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-aws-b-wg-overlay }
      spec: { destination: 10.99.0.5/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-azure-wg-overlay }
      spec: { destination: 10.99.0.3/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-azure-b-wg-overlay }
      spec: { destination: 10.99.0.6/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-oci-wg-overlay }
      spec: { destination: 10.99.0.4/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata: { name: route-oci-b-wg-overlay }
      spec: { destination: 10.99.0.7/32, device: wg-hybrid, metric: 80 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: aws-a-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AWS_ROUTER_A_WG_PUBLIC_KEY}"
        endpoint: "${AWS_ROUTER_A_WG_ENDPOINT}"
        allowedIPs: [10.99.0.2/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: aws-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AWS_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${AWS_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.5/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: azure-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AZURE_WG_PUBLIC_KEY}"
        endpoint: "${AZURE_WG_ENDPOINT}"
        allowedIPs: [10.99.0.3/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: azure-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${AZURE_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${AZURE_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.6/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: oci-main }
      spec:
        interface: wg-hybrid
        publicKey: "${OCI_WG_PUBLIC_KEY}"
        endpoint: "${OCI_WG_ENDPOINT}"
        allowedIPs: [10.99.0.4/32]
        persistentKeepalive: 25

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata: { name: oci-b-main }
      spec:
        interface: wg-hybrid
        publicKey: "${OCI_ROUTER_B_WG_PUBLIC_KEY}"
        endpoint: "${OCI_ROUTER_B_WG_ENDPOINT}"
        allowedIPs: [10.99.0.7/32]
        persistentKeepalive: 25

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: aws-a-main }
      spec:
        role: cloud
        nodeID: aws-router-a
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.2 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: aws-b-main }
      spec:
        role: cloud
        nodeID: aws-router-b
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.5 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: azure-main }
      spec:
        role: cloud
        nodeID: azure-router
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.3 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: azure-b-main }
      spec:
        role: cloud
        nodeID: azure-router-b
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.6 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: oci-main }
      spec:
        role: cloud
        nodeID: oci-router
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.4 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata: { name: oci-b-main }
      spec:
        role: cloud
        nodeID: oci-router-b
        underlay: { type: wireguard, interface: wg-hybrid, address: 10.99.0.7 }
        remote: { nodeID: onprem-router, address: 10.99.0.1 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata: { name: mobility-bgp }
      spec:
        asn: 64577
        routerID: 10.99.0.1
        listen: { address: 10.99.0.1, port: 179 }
        importPolicy: { allowedPrefixes: [10.77.60.0/24, 10.99.0.0/24], nextHopRewrite: unchanged }
        timers: { profile: fast }
        convergenceProfile: fast

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: bgp-aws-a-rr-client }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.2], routeReflectorClient: true, routeReflectorClusterID: 10.99.0.1, timers: { profile: fast }, bfd: BFD/bgp-aws-a-rr-client }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: bgp-aws-a-rr-client }
      spec:
        peer: BGPPeer/bgp-aws-a-rr-client
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: bgp-aws-b-rr-client }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.5], routeReflectorClient: true, routeReflectorClusterID: 10.99.0.1, timers: { profile: fast }, bfd: BFD/bgp-aws-b-rr-client }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: bgp-aws-b-rr-client }
      spec:
        peer: BGPPeer/bgp-aws-b-rr-client
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: bgp-azure-rr-client }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.3], routeReflectorClient: true, routeReflectorClusterID: 10.99.0.1, timers: { profile: fast }, bfd: BFD/bgp-azure-rr-client }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: bgp-azure-rr-client }
      spec:
        peer: BGPPeer/bgp-azure-rr-client
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: bgp-azure-b-rr-client }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.6], routeReflectorClient: true, routeReflectorClusterID: 10.99.0.1, timers: { profile: fast }, bfd: BFD/bgp-azure-b-rr-client }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: bgp-azure-b-rr-client }
      spec:
        peer: BGPPeer/bgp-azure-b-rr-client
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: bgp-oci-rr-client }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.4], routeReflectorClient: true, routeReflectorClusterID: 10.99.0.1, timers: { profile: fast }, bfd: BFD/bgp-oci-rr-client }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: bgp-oci-rr-client }
      spec:
        peer: BGPPeer/bgp-oci-rr-client
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata: { name: bgp-oci-b-rr-client }
      spec: { routerRef: BGPRouter/mobility-bgp, peerASN: 64577, peers: [10.99.0.7], routeReflectorClient: true, routeReflectorClusterID: 10.99.0.1, timers: { profile: fast }, bfd: BFD/bgp-oci-b-rr-client }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BFD
      metadata: { name: bgp-oci-b-rr-client }
      spec:
        peer: BGPPeer/bgp-oci-b-rr-client
        profile: fast
        minRx: 1s
        minTx: 1s
        detectMultiplier: 5

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: MobilityPool
      metadata: { name: cloudedge }
      spec:
        prefix: 10.77.60.0/24
        groupRef: cloudedge
        deliveryPolicy: { mode: bgp }
        members:
          - nodeRef: onprem-router
            site: onprem
            role: onprem
            staticOwnedAddresses:
              - 10.77.60.10/32
            capture:
              type: proxy-arp
              interface: ens21
              gratuitousARP: true
              activeWhen: { type: vrrp-master, virtualAddressRef: onprem-gate-vip }
          - nodeRef: aws-router-a
            site: aws
            role: cloud
            placement: { group: aws-edge, priority: 10 }
          - nodeRef: aws-router-b
            site: aws
            role: cloud
            placement: { group: aws-edge, priority: 20 }
          - nodeRef: azure-router
            site: azure
            role: cloud
            placement: { group: azure-edge, priority: 10 }
          - nodeRef: azure-router-b
            site: azure
            role: cloud
            placement: { group: azure-edge, priority: 20 }
          - nodeRef: oci-router
            site: oci
            role: cloud
            placement: { group: oci-edge, priority: 10 }
          - nodeRef: oci-router-b
            site: oci
            role: cloud
            placement: { group: oci-edge, priority: 20 }
        capturePolicy: { mode: all-non-owner-sites }
        ipOwnershipPolicy: { type: centralized, autoFailover: true }
