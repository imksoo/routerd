# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: observability-loki-example

spec:
  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: ObservabilityPipeline
      metadata:
        name: remote-observability
      spec:
        otlp:
          endpoint: http://otel-collector.observability.svc:4317
          insecure: true
          headers:
            x-routerd-site: edge
        serviceNamespace: routerd
        attributes:
          deployment.environment: production
          site: edge
        signals:
          - logs
          - metrics
          - traces
        sampling:
          rate: 1
        logs:
          enabled: true
          sinks:
            - name: local-debug
              type: stdout
              minLevel: warning
            - name: loki
              type: loki
              minLevel: info
              labels:
                site: edge
              loki:
                url: http://loki.observability.svc:3100/loki/api/v1/push
                tenant: routerd
