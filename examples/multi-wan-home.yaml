# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: multi-wan-home
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        managed: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        role: trust
        managed: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-v4
      spec:
        interface: lan
        address: 172.18.0.1/16
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Client
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-v6
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::1"
    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-a
      spec:
        interface: wan
        tunnelName: ds-lite-a
        aftrFQDN: gw.transix.jp
        aftrAddressOrdinal: 1
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-v6
        localAddressSuffix: "::100"
    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-b
      spec:
        interface: wan
        tunnelName: ds-lite-b
        aftrFQDN: gw.transix.jp
        aftrAddressOrdinal: 2
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-v6
        localAddressSuffix: "::101"
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-a
      spec:
        role: internet
        addressFamily: ipv4
        target: 1.1.1.1
        protocol: tcp
        port: 443
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-b
      spec:
        role: internet
        addressFamily: ipv4
        target: 8.8.8.8
        protocol: tcp
        port: 443
    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata:
        name: ipv4-default
      spec:
        family: ipv4
        destinationCIDRs: [0.0.0.0/0]
        selection: highest-weight-ready
        candidates:
          - name: ds-lite-a
            deviceFrom:
              resource: DSLiteTunnel/ds-lite-a
              field: device
            gatewaySource: none
            weight: 100
            healthCheck: internet-a
          - name: ds-lite-b
            deviceFrom:
              resource: DSLiteTunnel/ds-lite-b
              field: device
            gatewaySource: none
            weight: 80
            healthCheck: internet-b
          - name: hgw-direct
            deviceFrom:
              resource: Interface/wan
              field: ifname
            gatewaySource: dhcpv4
            gatewayFrom:
              resource: DHCPv4Client/wan-dhcpv4
              field: gateway
            weight: 40
    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-selected-wan
      spec:
        type: masquerade
        egressPolicyRef: ipv4-default
        sourceRanges: [172.18.0.0/16]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces: [wan, ds-lite-a, ds-lite-b]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces: [lan]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default
      spec:
        logDeny: true
