# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: lab-router

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt
    protectedZones:
      - mgmt

  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: LogSink
      metadata:
        name: local-syslog
      spec:
        type: syslog
        minLevel: info
        syslog:
          facility: local6
          tag: routerd

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: systemd-timesyncd
        managed: true
        source: static
        interface: wan
        servers:
          - pool.ntp.org

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv4-forwarding
      spec:
        key: net.ipv4.ip_forward
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv6-forwarding
      spec:
        key: net.ipv6.conf.all.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-all
      spec:
        target: all
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-default
      spec:
        target: default
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-lan
      spec:
        target: interface
        interface: lan
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-transix
      spec:
        target: interface
        interface: transix
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: Hostname
      metadata:
        name: system-hostname
      spec:
        hostname: router.example
        managed: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan
        client: dhcpcd
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: ens20
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: mgmt-dhcpv4
      spec:
        interface: mgmt
        client: networkd
        required: false
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: wan-dhcpv4-v4
      spec:
        type: ping
        role: next-hop
        targetSource: defaultGateway
        interface: wan

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4DefaultRoutePolicy
      metadata:
        name: default-v4
      spec:
        mode: priority
        sourceCIDRs:
          - 192.168.10.0/24
        destinationCIDRs:
          - 0.0.0.0/0
        candidates:
          - name: wan-dhcpv4
            interface: wan
            gatewaySource: dhcpv4
            priority: 10
            table: 100
            mark: 256
            routeMetric: 50
            healthCheck: wan-dhcpv4-v4

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4SourceNAT
      metadata:
        name: lan-to-wan
      spec:
        outboundInterface: transix
        sourceCIDRs:
          - 192.168.10.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4PolicyRoute
      metadata:
        name: lan-via-transix
      spec:
        outboundInterface: transix
        table: 100
        priority: 10000
        mark: 256
        sourceCIDRs:
          - 192.168.10.0/24
        routeMetric: 50

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
      spec:
        listen:
          - name: lan
            addresses:
              - 127.0.0.1
            port: 53
        sources:
          - name: transix-aftr
            kind: forward
            match:
              - gw.transix.jp
            upstreams:
              - udp://[2404:1a8:7f01:a::3]:53
              - udp://[2404:1a8:7f01:b::3]:53
          - name: default
            kind: upstream
            match:
              - "."
            upstreams:
              - https://cloudflare-dns.com/dns-query

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: transix
      spec:
        interface: wan
        tunnelName: ds-transix
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        aftrAddressOrdinal: 1
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::100"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: PathMTUPolicy
      metadata:
        name: lan-wan-mtu
      spec:
        fromInterface: lan
        toInterfaces:
          - wan
          - transix
        mtu:
          source: minInterface
        ipv6RA:
          enabled: true
          scope: lan-dhcpv6
        tcpMSSClamp:
          enabled: true
          families:
            - ipv4
            - ipv6

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        client: dhcp6c
        profile: ntt-hgw-lan-pd
        required: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.168.10.3/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticRoute
      metadata:
        name: lab-v4
      spec:
        interface: lan
        destination: 198.51.100.0/24
        via: 192.168.10.254
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6StaticRoute
      metadata:
        name: lab-v6
      spec:
        interface: wan
        destination: 2001:db8:100::/64
        via: fe80::1
        metric: 100

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces:
          - lan

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces:
          - wan
          - transix

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: mgmt
      spec:
        role: mgmt
        interfaces:
          - mgmt

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default-home
      spec:
        logDeny: true
        sameRoleAccept: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::3"
        sendRA: false
        announce: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: dhcpv6
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Scope
      metadata:
        name: lan-dhcpv6
      spec:
        server: dhcpv6
        delegatedAddress: lan-ipv6-pd-address
        mode: stateless
        leaseTime: 12h
        defaultRoute: true
        dnsSource: self
        selfAddressPolicy: lan-ipv6-self

    - apiVersion: net.routerd.net/v1alpha1
      kind: SelfAddressPolicy
      metadata:
        name: lan-ipv6-self
      spec:
        addressFamily: ipv6
        candidates:
          - source: delegatedAddress
            delegatedAddress: lan-ipv6-pd-address
            addressSuffix: "::3"
          - source: interfaceAddress
            interface: lan
            matchSuffix: "::3"
          - source: interfaceAddress
            interface: lan
            ordinal: 1

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: dhcpv4
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan
        dns:
          enabled: true
          upstreamSource: dhcpv4
          upstreamInterface: wan
          cacheSize: 1000

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Scope
      metadata:
        name: lan-dhcpv4
      spec:
        server: dhcpv4
        interface: lan
        rangeStart: 192.168.10.100
        rangeEnd: 192.168.10.199
        leaseTime: 12h
        routerSource: interfaceAddress
        dnsSource: self
        authoritative: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: printer
      spec:
        scope: lan-dhcpv4
        macAddress: "02:00:00:00:01:50"
        ipAddress: 192.168.10.150
        hostname: printer
        leaseTime: infinite
