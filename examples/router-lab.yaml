# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: lab-router
spec:
  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: systemd-timesyncd
        managed: true
        source: static
        interface: wan
        servers: [pool.ntp.org]
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        adminUp: true
        managed: false
        owner: external
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Client
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        adminUp: true
        managed: true
        owner: routerd
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: transix
      spec:
        ifname: ds-transix
        managed: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.168.10.3/24
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::3"
        announce: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: wan-dhcpv4-v4
      spec:
        role: next-hop
        targetSource: defaultGateway
        interface: wan
    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata:
        name: default-v4
      spec:
        mode: priority
        sourceCIDRs: [192.168.10.0/24]
        destinationCIDRs: [0.0.0.0/0]
        candidates:
          - name: wan-dhcpv4
            interface: wan
            gatewaySource: dhcpv4
            priority: 10
            table: 100
            mark: 256
            routeMetric: 50
            healthCheck: wan-dhcpv4-v4
    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-wan
      spec:
        outboundInterface: transix
        sourceCIDRs: [192.168.10.0/24]
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticRoute
      metadata:
        name: lab-v4
      spec:
        interface: wan
        destination: 192.0.2.0/24
        via: 192.168.1.1
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6StaticRoute
      metadata:
        name: lab-v6
      spec:
        interface: lan
        destination: 2001:db8:10::/64
        via: fe80::1
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
      spec:
        listen:
          - name: lan
            addresses: [192.168.10.3]
            port: 53
            sources: [default]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/lan-resolver
        match: ["."]
        upstreams: [DNSUpstream/cloudflare]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare
      spec:
        protocol: udp
        address: 1.1.1.1
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4
      spec:
        managed: true
        interface: lan
        rangeStart: 192.168.10.100
        rangeEnd: 192.168.10.199
        leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-ipv4
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces: [wan, transix]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces: [lan]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default
      spec:
        logDeny: true
