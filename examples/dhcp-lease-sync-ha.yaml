# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: dhcp-lease-sync-ha

spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata:
        name: lan-vip
      spec:
        interface: lan
        address: 192.168.30.254/32
        family: ipv4
        mode: vrrp
        vrrp:
          virtualRouterID: 30
          priority: 150
          peers:
            - 192.168.30.3

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4
      spec:
        interface: lan
        leaseFile: /var/lib/routerd/dnsmasq/dnsmasq.leases
        addressPool:
          start: 192.168.30.100
          end: 192.168.30.199
          leaseTime: 12h
        gateway: 192.168.30.254
        dnsServers:
          - 192.168.30.254

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: lan-dhcpv6
      spec:
        interface: lan
        mode: stateful
        leaseFile: /var/lib/routerd/dnsmasq/dnsmasq.leases
        addressPool:
          start: fd00:30::100
          end: fd00:30::1ff
          leaseTime: 12h
        dnsSource: none

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPLeaseSync
      metadata:
        name: lan-leases
      spec:
        leaseFile: /var/lib/routerd/dnsmasq/dnsmasq.leases
        interval: 30s
        targets:
          - name: standby
            host: routerd-standby.lan.example
            user: routerd
            path: /var/lib/routerd/dnsmasq/dnsmasq.leases
        when:
          state:
            VirtualAddress/lan-vip.role:
              equals: master
