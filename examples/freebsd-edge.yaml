# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: freebsd-edge

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt

  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: Package
      metadata:
        name: service-deps
      spec:
        packages:
          - os: freebsd
            manager: pkg
            names:
              - dnsmasq
              - bind-tools
              - wireguard-tools
              - strongswan
              - mpd5

    - apiVersion: net.routerd.net/v1alpha1
      kind: Hostname
      metadata:
        name: system-hostname
      spec:
        hostname: freebsd-edge.example.internal
        managed: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv4-forwarding
      spec:
        key: net.inet.ip.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv6-forwarding
      spec:
        key: net.inet6.ip6.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: vtnet0
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan
        client: dhclient
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: vtnet2
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: mgmt-dhcpv4
      spec:
        interface: mgmt
        client: dhclient
        required: false
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Address
      metadata:
        name: wan-dhcpv6
      spec:
        interface: wan
        client: dhcp6c
        required: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        client: dhcp6c
        profile: ntt-hgw-lan-pd
        prefixLength: 60
        required: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: vtnet1
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.0.2.1/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticRoute
      metadata:
        name: lab-v4
      spec:
        interface: lan
        destination: 198.51.100.0/24
        via: 192.0.2.254
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6StaticRoute
      metadata:
        name: lab-v6
      spec:
        interface: wan
        destination: 2001:db8:100::/64
        via: fe80::1
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: static-dslite-example
      spec:
        interface: wan
        tunnelName: gif0
        localAddress: 2001:db8:1::100
        remoteAddress: 2001:db8:2::200
        mtu: 1454
        defaultRoute: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4SourceNAT
      metadata:
        name: lan-nat
      spec:
        outboundInterface: static-dslite-example
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces:
          - wan
          - static-dslite-example

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces:
          - lan

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: mgmt
      spec:
        role: mgmt
        interfaces:
          - mgmt

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default-home
      spec:
        logDeny: true

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallLog
      metadata:
        name: default
      spec:
        enabled: true
        path: /var/db/routerd/firewall-logs.db

    - apiVersion: system.routerd.net/v1alpha1
      kind: SystemdUnit
      metadata:
        name: routerd-firewall-logger.service
      spec:
        description: routerd firewall logger
        execStart:
          - /usr/local/sbin/routerd-firewall-logger
          - daemon
          - --path
          - /var/db/routerd/firewall-logs.db
          - --pflog-interface
          - pflog0
        runtimeDirectory:
          - routerd
        stateDirectory:
          - routerd
        enabled: true
        started: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4-server
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Scope
      metadata:
        name: lan-dhcpv4
      spec:
        server: lan-dhcpv4-server
        interface: lan
        rangeStart: 192.0.2.110
        rangeEnd: 192.0.2.119
        leaseTime: 12h
        routerSource: interfaceAddress
        dnsSource: self
        authoritative: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: printer
      spec:
        scope: lan-dhcpv4
        macAddress: "02:00:00:00:01:50"
        ipAddress: 192.0.2.115
        hostname: printer
        leaseTime: infinite

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::1"
        sendRA: false
        announce: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: lan-dhcpv6-server
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Scope
      metadata:
        name: lan-dhcpv6
      spec:
        server: lan-dhcpv6-server
        delegatedAddress: lan-ipv6-pd-address
        mode: stateless
        defaultRoute: true
        dnsSource: self
        leaseTime: 12h
