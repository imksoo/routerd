# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: k8s-routerd-vip-alpine

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - lan

  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: eth0
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-base
      spec:
        interface: lan
        address: 192.168.1.38/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualAddress
      metadata:
        name: k8s-api-vip
      spec:
        interface: lan
        address: 192.168.1.248/32
        family: ipv4
        hostname: k8s-api.cluster.example
        mode: vrrp
        vrrp:
          virtualRouterID: 50
          priority: 150
          advertInterval: 1s
          preempt: true
          preemptDelay: 30s
          peers:
            - 192.168.1.53
        track:
          - resource: IngressService/kubernetes-api
            unhealthyPenalty: 60
            confirmConsecutiveUnhealthy: 3
            confirmConsecutiveHealthy: 2

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: cluster-zone
      spec:
        zone: cluster.example
        ttl: 60
        records:
          - hostname: k8s-api
            ipv4From:
              resource: VirtualAddress/k8s-api-vip
              field: address
          - hostname: cp-01
            ipv4: 192.168.1.41
          - hostname: cp-02
            ipv4: 192.168.1.42

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: vip-resolver
      spec:
        listen:
          - name: vip
            addressFrom:
              - resource: VirtualAddress/k8s-api-vip
                field: address
            port: 53
            sources:
              - cluster-zone
              - default

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: cluster-zone
      spec:
        resolver: DNSResolver/vip-resolver
        match:
          - cluster.example
        zoneRefs:
          - DNSZone/cluster-zone

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/vip-resolver
        match:
          - "."
        upstreams:
          - DNSUpstream/cloudflare-udp
          - DNSUpstream/google-udp

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare-udp
      spec:
        protocol: udp
        address: 1.1.1.1

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: google-udp
      spec:
        protocol: udp
        address: 8.8.8.8

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: IngressService
      metadata:
        name: kubernetes-api
      spec:
        listen:
          interface: lan
          address: 192.168.1.248
          protocol: tcp
          port: 6443
        hostname: k8s-api.cluster.example
        backends:
          - name: cp-01
            address: cp-01.cluster.example
            port: 6443
          - name: cp-02
            address: cp-02.cluster.example
            port: 6443
        healthCheck:
          protocol: https
          path: /readyz
          host: k8s-api.cluster.example
          expectedStatus:
            - 200
          tlsSkipVerify: true
          interval: 5s
          timeout: 1s
          healthyThreshold: 2
          unhealthyThreshold: 2
        policy:
          selection: failover
          onNoHealthyBackends: reject
