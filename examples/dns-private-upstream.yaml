# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: dns-private-upstream-example
spec:
  resources:
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSZone
    metadata:
      name: lan
    spec:
      zone: lab.example
      records:
      - hostname: router
        ipv4: 192.0.2.1
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSResolver
    metadata:
      name: lan-resolver
    spec:
      listen:
      - name: lan
        addresses:
        - 127.0.0.1
        port: 53
        sources:
        - local
        - default
      cache:
        enabled: true
        maxEntries: 10000
        minTTL: 60s
        maxTTL: 24h
        negativeTTL: 30s
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSForwarder
    metadata:
      name: local
    spec:
      resolver: DNSResolver/lan-resolver
      match:
      - lab.example
      zoneRefs:
      - DNSZone/lan
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSForwarder
    metadata:
      name: default
    spec:
      resolver: DNSResolver/lan-resolver
      match:
      - "."
      upstreams:
      - DNSUpstream/cloudflare-doh
      - DNSUpstream/google-dot
      - DNSUpstream/google-udp
      healthcheck:
        interval: 15s
        timeout: 3s
        failThreshold: 3
        passThreshold: 2
      dnssecValidate: true
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSUpstream
    metadata:
      name: cloudflare-doh
    spec:
      protocol: doh
      address: cloudflare-dns.com
      path: /dns-query
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSUpstream
    metadata:
      name: google-dot
    spec:
      protocol: dot
      address: dns.google
  - apiVersion: net.routerd.net/v1alpha1
    kind: DNSUpstream
    metadata:
      name: google-udp
    spec:
      protocol: udp
      address: 8.8.8.8
