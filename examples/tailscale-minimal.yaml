# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: tailscale-minimal

spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: TailscaleNode
      metadata:
        name: mesh
      spec:
        hostname: routerd-mesh
        authKeyEnv: TS_AUTHKEY
        acceptRoutes: true
        acceptDNS: false

