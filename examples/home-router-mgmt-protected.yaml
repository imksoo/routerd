# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: home-router-mgmt-protected
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: ManagementAccess
      metadata: {name: mgmt-lockout-guard}
      spec:
        interfaces: [mgmt0]
        allowSourceCIDRs: [192.168.100.0/24]
    - apiVersion: system.routerd.net/v1alpha1
      kind: WebConsole
      metadata: {name: mgmt-console}
      spec:
        enabled: true
        listenAddress: 192.168.100.1
        port: 8080
        title: home-router
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: {name: wan0}
      spec: {ifname: ens18, managed: false, owner: external}
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: {name: lan0}
      spec: {ifname: ens19, adminUp: true, managed: true, owner: routerd}
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: {name: mgmt0}
      spec: {ifname: ens20, adminUp: true, managed: true, owner: routerd}
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: {name: lan-v4}
      spec: {interface: lan0, address: 192.168.10.1/24}
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: {name: mgmt-v4}
      spec: {interface: mgmt0, address: 192.168.100.1/24}
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata: {name: wan-pd}
      spec: {interface: wan0, profile: ntt-hgw-lan-pd}
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata: {name: lan-v6}
      spec:
        prefixDelegation: wan-pd
        interface: lan0
        subnetID: "0"
        addressSuffix: "::1"
        announce: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata: {name: dslite0}
      spec:
        interface: wan0
        tunnelName: ds-lite0
        aftrFQDN: gw.transix.jp
        aftrDNSServers: [2404:1a8:7f01:a::3, 2404:1a8:7f01:b::3]
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-v6
        localAddressSuffix: "::100"
    - apiVersion: net.routerd.net/v1alpha1
      kind: PPPoESession
      metadata: {name: pppoe0}
      spec:
        interface: wan0
        ifname: ppp-home
        username: user@example.jp
        passwordFile: /usr/local/etc/routerd/secrets/pppoe-home.password
        mtu: 1454
        mru: 1454
        usePeerDNS: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata: {name: internet-via-dslite}
      spec: {role: internet, addressFamily: ipv4, target: 1.1.1.1, protocol: tcp, port: 443, interval: 30s}
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata: {name: internet-via-pppoe}
      spec: {role: internet, addressFamily: ipv4, target: 8.8.8.8, protocol: tcp, port: 443, interval: 30s}
    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata: {name: ipv4-default}
      spec:
        family: ipv4
        destinationCIDRs: [0.0.0.0/0]
        selection: highest-weight-ready
        candidates:
          - name: dslite
            deviceFrom: {resource: DSLiteTunnel/dslite0, field: device}
            gatewaySource: none
            weight: 100
            healthCheck: internet-via-dslite
          - name: pppoe
            deviceFrom: {resource: PPPoESession/pppoe0, field: device}
            gatewaySource: none
            weight: 50
            healthCheck: internet-via-pppoe
    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata: {name: lan-to-internet}
      spec: {type: masquerade, egressPolicyRef: ipv4-default, sourceRanges: [192.168.10.0/24]}
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata: {name: lan}
      spec:
        listen:
          - name: lan
            addressFrom:
              - {resource: IPv4StaticAddress/lan-v4, field: address}
              - {resource: IPv6DelegatedAddress/lan-v6, field: address}
            port: 53
            sources: [default]
        cache: {enabled: true}
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata: {name: default}
      spec:
        resolver: DNSResolver/lan
        match: ["."]
        upstreams: [DNSUpstream/cloudflare]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata: {name: cloudflare}
      spec: {protocol: doh, address: cloudflare-dns.com, path: /dns-query}
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata: {name: lan}
      spec:
        interface: lan0
        addressPool: {start: 192.168.10.100, end: 192.168.10.199, leaseTime: 12h}
        gatewayFrom: {resource: IPv4StaticAddress/lan-v4, field: address}
        dnsServerFrom:
          - {resource: IPv4StaticAddress/lan-v4, field: address}
        domain: home.arpa
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata: {name: lan}
      spec:
        interface: lan0
        prefixFrom: {resource: IPv6DelegatedAddress/lan-v6, field: address}
        rdnssFrom:
          - {resource: IPv6DelegatedAddress/lan-v6, field: address}
        oFlag: true
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata: {name: wan}
      spec: {role: untrust, interfaces: [wan0, dslite0, pppoe0]}
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata: {name: lan}
      spec: {role: trust, interfaces: [lan0]}
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata: {name: mgmt}
      spec: {role: mgmt, interfaces: [mgmt0]}
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata: {name: default}
      spec: {logDeny: true}
