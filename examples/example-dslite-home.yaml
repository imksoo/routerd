# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: example-dslite-home
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        managed: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        role: trust
        managed: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-v4
      spec:
        interface: lan
        address: 192.168.10.1/24
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-v6
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::1"
        announce: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan
      spec:
        listen:
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-v4
                field: address
              - resource: IPv6DelegatedAddress/lan-v6
                field: address
            port: 53
            sources: [home, aftr, default]
        cache:
          enabled: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: home
      spec:
        zone: home.example
        records:
          - hostname: router
            ipv4From:
              resource: IPv4StaticAddress/lan-v4
              field: address
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: home
      spec:
        resolver: DNSResolver/lan
        match: [home.example]
        zoneRefs: [DNSZone/home]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: aftr
      spec:
        resolver: DNSResolver/lan
        match: [gw.transix.jp]
        upstreams: [DNSUpstream/transix-a, DNSUpstream/transix-b]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: transix-a
      spec:
        protocol: udp
        address: 2404:1a8:7f01:a::3
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: transix-b
      spec:
        protocol: udp
        address: 2404:1a8:7f01:b::3
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/lan
        match: ["."]
        upstreams: [DNSUpstream/cloudflare]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare
      spec:
        protocol: doh
        address: cloudflare-dns.com
        path: /dns-query
    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: transix
      spec:
        interface: wan
        tunnelName: ds-transix
        aftrFQDN: gw.transix.jp
        aftrDNSServers: [2404:1a8:7f01:a::3, 2404:1a8:7f01:b::3]
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-v6
        localAddressSuffix: "::100"
        defaultRoute: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan
      spec:
        interface: lan
        addressPool:
          start: 192.168.10.100
          end: 192.168.10.199
          leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-v4
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-v4
            field: address
        domainFrom:
          resource: DNSZone/home
          field: zone
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata:
        name: lan
      spec:
        interface: lan
        prefixFrom:
          resource: IPv6DelegatedAddress/lan-v6
          field: address
        rdnssFrom:
          - resource: IPv6DelegatedAddress/lan-v6
            field: address
        dnsslFrom:
          - resource: DNSZone/home
            field: zone
        oFlag: true
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces: [wan, transix]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces: [lan]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default
      spec:
        logDeny: true
