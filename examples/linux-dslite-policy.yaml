# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: linux-dslite-policy
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        managed: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        role: trust
        managed: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-v4
      spec:
        interface: lan
        address: 192.168.160.5/24
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-v6
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::5"
        announce: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite
      spec:
        interface: wan
        tunnelName: ds-lite
        aftrFQDN: gw.transix.jp
        aftrDNSServers: [2404:1a8:7f01:a::3, 2404:1a8:7f01:b::3]
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-v6
        localAddressSuffix: "::100"
        defaultRoute: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet
      spec:
        role: internet
        addressFamily: ipv4
        target: 1.1.1.1
        protocol: tcp
        port: 443
    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata:
        name: ipv4-default
      spec:
        family: ipv4
        destinationCIDRs: [0.0.0.0/0]
        candidates:
          - name: ds-lite
            deviceFrom:
              resource: DSLiteTunnel/ds-lite
              field: device
            gatewaySource: none
            healthCheck: internet
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan
      spec:
        listen:
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-v4
                field: address
              - resource: IPv6DelegatedAddress/lan-v6
                field: address
            port: 53
            sources: [default]
        cache:
          enabled: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/lan
        match: ["."]
        upstreams: [DNSUpstream/cloudflare]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare
      spec:
        protocol: udp
        address: 1.1.1.1
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4
      spec:
        interface: lan
        rangeStart: 192.168.160.100
        rangeEnd: 192.168.160.200
        leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-v4
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-v4
            field: address
        domain: lab.example
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata:
        name: lan
      spec:
        interface: lan
        prefixFrom:
          resource: IPv6DelegatedAddress/lan-v6
          field: address
        rdnssFrom:
          - resource: IPv6DelegatedAddress/lan-v6
            field: address
        oFlag: true
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces: [wan, ds-lite]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces: [lan]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default
      spec:
        logDeny: true
