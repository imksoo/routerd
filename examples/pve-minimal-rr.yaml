# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: pve-rr
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: private-wan }
      spec: { ifname: vmbr0, managed: false, mtu: 1500 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: private-wan-ipv4 }
      spec: { interface: private-wan, address: 10.30.0.10/24 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-pve }
      spec:
        selfNodeRef: pve-rr
        privateKeyFile: /usr/local/etc/routerd/secrets/wg-pve.key
        listenPort: 51820
        mtu: 1420
        peersFrom:
          - resource: SAMEnrollmentPolicy/pve-wg-leaves

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: wg-pve }
      spec: { ifname: wg-pve, managed: false, mtu: 1420 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-pve-ipv4 }
      spec: { interface: wg-pve, address: 10.31.0.10/32 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata: { name: mobility-bgp }
      spec:
        asn: 64577
        routerID: 10.255.10.1
        listen: { port: 179 }
        importPolicy:
          allowedPrefixes: [10.77.70.0/24]
          allowedPrefixLengthMin: 32
          allowedPrefixLengthMax: 32
          nextHopRewrite: unchanged
        exportPolicy:
          allowedPrefixes: [10.77.70.0/24]
        timers: { profile: fast }
        convergenceProfile: fast

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPDynamicPeer
      metadata: { name: pve-leaves }
      spec:
        routerRef: BGPRouter/mobility-bgp
        peerASN: 64577
        listen:
          sourcePrefixes: [10.255.10.0/24]
        routeReflectorClient: true
        routeReflectorClusterID: 10.255.10.1
        importPolicy:
          allowedPrefixes: [10.77.70.0/24]
          allowedPrefixLengthMin: 32
          allowedPrefixLengthMax: 32
          nextHopRewrite: peer-address
        exportPolicy:
          allowedPrefixes: [10.77.70.0/24]
        timers: { profile: fast }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMRRSet
      metadata: { name: pve-rrs }
      spec:
        enrollmentPolicyRef: SAMEnrollmentPolicy/pve-fou-leaves
        mobilityPoolRefs: [MobilityPool/pve-mobility]
        routeAdmission:
          allowedPrefixes: [10.77.70.0/24]
          allowedPrefixLengthMin: 32
          allowedPrefixLengthMax: 32
          nextHopRewrite: peer-address
        members:
          - nodeRef: pve-rr
            endpoint: 10.30.0.10
            tunnelAddress: 10.255.10.1/32
            wireGuard:
              publicKey: PVE_RR_WIREGUARD_PUBLIC_KEY
              endpoint: 10.30.0.10:51820
              allowedIPs: [10.31.0.10/32]
              persistentKeepalive: 25
            bgp: { asn: 64577, routerID: 10.255.10.1 }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata: { name: pve-rr-wg }
      spec:
        selfNodeRef: pve-rr
        mode: ipip
        encryption: wireguard
        addressingMode: pair-stable
        innerPrefix: 10.255.10.0/24
        underlayInterface: wg-pve
        localEndpoint: 10.31.0.10
        peersFrom:
          - resource: SAMEnrollmentPolicy/pve-wg-leaves
        bgp:
          routerRef: BGPRouter/mobility-bgp
          peerASN: 64577
          generatePeers: false
          timersPreset: fast

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata: { name: pve-rr-fou }
      spec:
        selfNodeRef: pve-rr
        mode: fou
        encryption: none
        addressingMode: pair-stable
        innerPrefix: 10.255.10.0/24
        underlayInterface: private-wan
        localEndpoint: 10.30.0.10
        encapSport: 5555
        encapDport: 5555
        peersFrom:
          - resource: SAMEnrollmentPolicy/pve-fou-leaves
        bgp:
          routerRef: BGPRouter/mobility-bgp
          peerASN: 64577
          generatePeers: false
          timersPreset: fast

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: MobilityPool
      metadata: { name: pve-mobility }
      spec:
        prefix: 10.77.70.0/24
        groupRef: pve-lab
        mode: selective-address
        members:
          - nodeRef: pve-rr
            site: pve-lab
            role: cloud

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMEnrollmentPolicy
      metadata: { name: pve-wg-leaves }
      spec:
        transportProfileRef: SAMTransportProfile/pve-rr-wg
        rrSetRef: SAMRRSet/pve-rrs
        joinTokenFrom:
          file: /usr/local/etc/routerd/secrets/pve-join-token
        joinAudience: pve-wg-underlay
        allowedLeafIDs:
          pattern: ^pve-leaf-[a-z0-9-]+$
        tunnelAddressPrefixes: [10.255.10.0/24]
        endpointPrefixes: [10.31.0.0/24]
        wireGuard:
          interface: wg-pve
          endpointPrefixes: [10.30.0.0/24]
          allowedExtraIPPrefixes: [10.31.0.0/24]
          persistentKeepalive: 25
        mobilityPoolRefs: [MobilityPool/pve-mobility]

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMEnrollmentClaim
      metadata: { name: pve-leaf-a }
      spec:
        policyRef: SAMEnrollmentPolicy/pve-wg-leaves
        rrSetRef: SAMRRSet/pve-rrs
        leafID: pve-leaf-a
        joinAudience: pve-wg-underlay
        joinNonce: pve-leaf-a-0001
        joinTimestamp: "2026-06-28T00:00:00Z"
        joinHMAC: EXAMPLE_HMAC_SHA256_HEX
        tunnelAddress: 10.255.10.21/32
        endpoint: 10.31.0.21
        wireGuard:
          publicKey: PVE_LEAF_A_WIREGUARD_PUBLIC_KEY
          endpoint: 10.30.0.21:51820
          allowedIPs: [10.31.0.21/32]
          persistentKeepalive: 25
        mobility:
          ownedAddresses: [10.77.70.21/32]
        bgp:
          asn: 64577
          routerID: 10.255.10.21

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMEnrollmentPolicy
      metadata: { name: pve-fou-leaves }
      spec:
        transportProfileRef: SAMTransportProfile/pve-rr-fou
        rrSetRef: SAMRRSet/pve-rrs
        joinTokenFrom:
          file: /usr/local/etc/routerd/secrets/pve-join-token
        joinAudience: pve-private-underlay
        allowedLeafIDs:
          pattern: ^pve-leaf-[a-z0-9-]+$
        tunnelAddressPrefixes: [10.255.10.0/24]
        endpointPrefixes: [10.30.0.0/24]
        mobilityPoolRefs: [MobilityPool/pve-mobility]

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMEnrollmentClaim
      metadata: { name: pve-leaf-b }
      spec:
        policyRef: SAMEnrollmentPolicy/pve-fou-leaves
        rrSetRef: SAMRRSet/pve-rrs
        leafID: pve-leaf-b
        joinAudience: pve-private-underlay
        joinNonce: pve-leaf-b-0001
        joinTimestamp: "2026-06-28T00:00:00Z"
        joinHMAC: EXAMPLE_HMAC_SHA256_HEX
        tunnelAddress: 10.255.10.22/32
        endpoint: 10.30.0.22
        mobility:
          ownedAddresses: [10.77.70.22/32]
        bgp:
          asn: 64577
          routerID: 10.255.10.22
