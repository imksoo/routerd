# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: nixos-edge

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt
    protectedZones:
      - mgmt

  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: LogSink
      metadata:
        name: local-syslog
      spec:
        type: syslog
        minLevel: info
        syslog:
          facility: local6
          tag: routerd

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: systemd-timesyncd
        managed: true
        source: static
        interface: wan
        servers:
          - pool.ntp.org

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Client
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: ens20
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Client
      metadata:
        name: mgmt-dhcpv4
      spec:
        interface: mgmt
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: wan-dhcpv4-v4
      spec:
        type: ping
        role: next-hop
        targetSource: defaultGateway
        interface: wan

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
        prefixLength: 60

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
      spec:
        listen:
          - name: lan
            addresses:
              - 127.0.0.1
            port: 53
        sources:
          - name: transix-aftr
            kind: forward
            match:
              - gw.transix.jp
            upstreams:
              - udp://[2404:1a8:7f01:a::3]:53
              - udp://[2404:1a8:7f01:b::3]:53

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: guest
      spec:
        ifname: ens21
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: VRF
      metadata:
        name: guest-vrf
      spec:
        ifname: vrf-guest
        routeTable: 1001
        members:
          - guest

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata:
        name: wg-lab
      spec:
        listenPort: 51820
        mtu: 1420

    - apiVersion: net.routerd.net/v1alpha1
      kind: TailscaleNode
      metadata:
        name: home
      spec:
        hostname: nixos-edge
        advertiseRoutes:
          - 192.0.2.0/24
        acceptDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPsecConnection
      metadata:
        name: cloud-vpn-example
      spec:
        localAddress: 198.51.100.10
        remoteAddress: 203.0.113.10
        preSharedKey: change-me
        leftSubnet: 192.0.2.0/24
        rightSubnet: 10.10.0.0/16
        cloudProviderHint: aws

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.0.2.2/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticRoute
      metadata:
        name: lab-v4
      spec:
        interface: lan
        destination: 198.51.100.0/24
        via: 192.0.2.254
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6StaticRoute
      metadata:
        name: lab-v6
      spec:
        interface: wan
        destination: 2001:db8:100::/64
        via: fe80::1
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::2"
        sendRA: false
        announce: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: SelfAddressPolicy
      metadata:
        name: lan-ipv6-self
      spec:
        addressFamily: ipv6
        candidates:
          - source: delegatedAddress
            delegatedAddress: lan-ipv6-pd-address
            addressSuffix: "::2"
          - source: interfaceAddress
            interface: lan
            matchSuffix: "::2"
          - source: interfaceAddress
            interface: lan
            ordinal: 1

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-a
      spec:
        interface: wan
        tunnelName: ds-lite-a
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:100
        aftrAddressOrdinal: 1
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::100"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-b
      spec:
        interface: wan
        tunnelName: ds-lite-b
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:101
        aftrAddressOrdinal: 2
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::101"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-c
      spec:
        interface: wan
        tunnelName: ds-lite-c
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:102
        aftrAddressOrdinal: 3
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::102"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4PolicyRouteSet
      metadata:
        name: lan-dslite-ecmp
      spec:
        mode: hash
        hashFields:
          - sourceAddress
          - destinationAddress
        sourceCIDRs:
          - 192.0.2.0/24
        destinationCIDRs:
          - 0.0.0.0/0
        targets:
          - name: ds-lite-a
            outboundInterface: ds-lite-a
            table: 100
            priority: 10000
            mark: 256
            routeMetric: 50
          - name: ds-lite-b
            outboundInterface: ds-lite-b
            table: 101
            priority: 10001
            mark: 257
            routeMetric: 50
          - name: ds-lite-c
            outboundInterface: ds-lite-c
            table: 102
            priority: 10002
            mark: 258
            routeMetric: 50

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4DefaultRoutePolicy
      metadata:
        name: default-v4
      spec:
        mode: priority
        sourceCIDRs:
          - 192.0.2.0/24
        destinationCIDRs:
          - 0.0.0.0/0
        candidates:
          - name: dslite-ecmp
            routeSet: lan-dslite-ecmp
            priority: 10
          - name: wan-dhcpv4
            interface: wan
            gatewaySource: dhcpv4
            priority: 30
            table: 112
            mark: 274
            routeMetric: 100
            healthCheck: wan-dhcpv4-v4

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite-a
      spec:
        outboundInterface: ds-lite-a
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite-b
      spec:
        outboundInterface: ds-lite-b
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite-c
      spec:
        outboundInterface: ds-lite-c
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces:
          - lan

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces:
          - wan
          - ds-lite-a
          - ds-lite-b
          - ds-lite-c

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: mgmt
      spec:
        role: mgmt
        interfaces:
          - mgmt

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default-home
      spec:
        logDeny: true
        sameRoleAccept: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan
        dns:
          enabled: true
          upstreamSource: dhcpv4
          upstreamInterface: wan
          cacheSize: 1000
        interface: lan
        rangeStart: 192.0.2.120
        rangeEnd: 192.0.2.129
        leaseTime: 12h
        routerSource: interfaceAddress
        dnsSource: self
        authoritative: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: printer
      spec:
        server: lan-dhcpv4
        macAddress: "02:00:00:00:01:50"
        ipAddress: 192.0.2.125
        hostname: printer
        leaseTime: infinite

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: lan-dhcpv6
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan
        delegatedAddress: lan-ipv6-pd-address
        mode: stateless
        leaseTime: 12h
        defaultRoute: true
        dnsSource: self
        selfAddressPolicy: lan-ipv6-self
