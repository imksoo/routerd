# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: nixos-edge

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt
    protectedZones:
      - mgmt

  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: NixOSHost
      metadata:
        name: host
      spec:
        hostname: nixos-edge
        domain: example.internal
        stateVersion: "25.11"
        boot:
          loader: grub
          grubDevice: /dev/sda
        routerdService:
          enabled: true
          binaryPath: /usr/local/sbin/routerd
          configFile: /usr/local/etc/routerd/router.yaml
          socket: /run/routerd/routerd.sock
          applyInterval: 60s
          extraFlags:
            - --status-file
            - /run/routerd/status.json
        additionalPackages:
          - dnsutils
          - iputils
          - tcpdump
          - traceroute
        debugSystemPackages: true
        ssh:
          enabled: true
          passwordAuthentication: true
          permitRootLogin: "no"
        sudo:
          wheelNeedsPassword: false
        users:
          - name: admin
            description: Network administrator
            groups:
              - wheel
            initialPassword: change-me
            sshAuthorizedKeys:
              - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIexampleexampleexampleexampleexampleexample lab-admin@example

    - apiVersion: system.routerd.net/v1alpha1
      kind: LogSink
      metadata:
        name: local-syslog
      spec:
        type: syslog
        minLevel: info
        syslog:
          facility: local6
          tag: routerd

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: systemd-timesyncd
        managed: true
        source: static
        interface: wan
        servers:
          - pool.ntp.org

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv4-forwarding
      spec:
        key: net.ipv4.ip_forward
        value: "1"
        runtime: true
        persistent: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv6-forwarding
      spec:
        key: net.ipv6.conf.all.forwarding
        value: "1"
        runtime: true
        persistent: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: wan-ipv6-accept-ra
      spec:
        key: net.ipv6.conf.ens18.accept_ra
        value: "2"
        runtime: true
        persistent: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-all
      spec:
        target: all
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-default
      spec:
        target: default
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan
        client: networkd
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: ens20
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: mgmt-dhcpv4
      spec:
        interface: mgmt
        client: networkd
        required: false
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: wan-dhcpv4-v4
      spec:
        type: ping
        role: next-hop
        targetSource: defaultGateway
        interface: wan

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
        prefixLength: 60
        required: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
      spec:
        listen:
          - name: lan
            addresses:
              - 127.0.0.1
            port: 53
        sources:
          - name: transix-aftr
            kind: forward
            match:
              - gw.transix.jp
            upstreams:
              - udp://[2404:1a8:7f01:a::3]:53
              - udp://[2404:1a8:7f01:b::3]:53

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.0.2.2/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticRoute
      metadata:
        name: lab-v4
      spec:
        interface: lan
        destination: 198.51.100.0/24
        via: 192.0.2.254
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6StaticRoute
      metadata:
        name: lab-v6
      spec:
        interface: wan
        destination: 2001:db8:100::/64
        via: fe80::1
        metric: 100

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::2"
        sendRA: false
        announce: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: SelfAddressPolicy
      metadata:
        name: lan-ipv6-self
      spec:
        addressFamily: ipv6
        candidates:
          - source: delegatedAddress
            delegatedAddress: lan-ipv6-pd-address
            addressSuffix: "::2"
          - source: interfaceAddress
            interface: lan
            matchSuffix: "::2"
          - source: interfaceAddress
            interface: lan
            ordinal: 1

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-a
      spec:
        interface: wan
        tunnelName: ds-lite-a
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:100
        aftrAddressOrdinal: 1
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::100"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-b
      spec:
        interface: wan
        tunnelName: ds-lite-b
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:101
        aftrAddressOrdinal: 2
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::101"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-c
      spec:
        interface: wan
        tunnelName: ds-lite-c
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:102
        aftrAddressOrdinal: 3
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-ipv6-pd-address
        localAddressSuffix: "::102"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4PolicyRouteSet
      metadata:
        name: lan-dslite-ecmp
      spec:
        mode: hash
        hashFields:
          - sourceAddress
          - destinationAddress
        sourceCIDRs:
          - 192.0.2.0/24
        destinationCIDRs:
          - 0.0.0.0/0
        targets:
          - name: ds-lite-a
            outboundInterface: ds-lite-a
            table: 100
            priority: 10000
            mark: 256
            routeMetric: 50
          - name: ds-lite-b
            outboundInterface: ds-lite-b
            table: 101
            priority: 10001
            mark: 257
            routeMetric: 50
          - name: ds-lite-c
            outboundInterface: ds-lite-c
            table: 102
            priority: 10002
            mark: 258
            routeMetric: 50

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4DefaultRoutePolicy
      metadata:
        name: default-v4
      spec:
        mode: priority
        sourceCIDRs:
          - 192.0.2.0/24
        destinationCIDRs:
          - 0.0.0.0/0
        candidates:
          - name: dslite-ecmp
            routeSet: lan-dslite-ecmp
            priority: 10
          - name: wan-dhcpv4
            interface: wan
            gatewaySource: dhcpv4
            priority: 30
            table: 112
            mark: 274
            routeMetric: 100
            healthCheck: wan-dhcpv4-v4

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4SourceNAT
      metadata:
        name: lan-to-dslite-a
      spec:
        outboundInterface: ds-lite-a
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4SourceNAT
      metadata:
        name: lan-to-dslite-b
      spec:
        outboundInterface: ds-lite-b
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4SourceNAT
      metadata:
        name: lan-to-dslite-c
      spec:
        outboundInterface: ds-lite-c
        sourceCIDRs:
          - 192.0.2.0/24
        translation:
          type: interfaceAddress
          portMapping:
            type: range
            start: 1024
            end: 65535

    - apiVersion: net.routerd.net/v1alpha1
      kind: PathMTUPolicy
      metadata:
        name: lan-wan-mtu
      spec:
        fromInterface: lan
        toInterfaces:
          - wan
          - ds-lite-a
          - ds-lite-b
          - ds-lite-c
        mtu:
          source: minInterface
        ipv6RA:
          enabled: true
          scope: lan-dhcpv6
        tcpMSSClamp:
          enabled: true
          families:
            - ipv4
            - ipv6

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-lan
      spec:
        target: interface
        interface: lan
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-ds-lite-a
      spec:
        target: interface
        interface: ds-lite-a
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-ds-lite-b
      spec:
        target: interface
        interface: ds-lite-b
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-ds-lite-c
      spec:
        target: interface
        interface: ds-lite-c
        mode: disabled

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: Zone
      metadata:
        name: lan
      spec:
        interfaces:
          - lan

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: Zone
      metadata:
        name: wan
      spec:
        interfaces:
          - wan
          - ds-lite-a
          - ds-lite-b
          - ds-lite-c

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: Zone
      metadata:
        name: mgmt
      spec:
        interfaces:
          - mgmt

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default-home
      spec:
        preset: home-router
        input:
          default: drop
        forward:
          default: drop
        routerAccess:
          ssh:
            fromZones:
              - lan
            wan:
              enabled: true
          dns:
            fromZones:
              - lan
          dhcp:
            fromZones:
              - lan

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: dhcpv4
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan
        dns:
          enabled: true
          upstreamSource: dhcpv4
          upstreamInterface: wan
          cacheSize: 1000

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Scope
      metadata:
        name: lan-dhcpv4
      spec:
        server: dhcpv4
        interface: lan
        rangeStart: 192.0.2.120
        rangeEnd: 192.0.2.129
        leaseTime: 12h
        routerSource: interfaceAddress
        dnsSource: self
        authoritative: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: printer
      spec:
        scope: lan-dhcpv4
        macAddress: "02:00:00:00:01:50"
        ipAddress: 192.0.2.125
        hostname: printer
        leaseTime: infinite

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: dhcpv6
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Scope
      metadata:
        name: lan-dhcpv6
      spec:
        server: dhcpv6
        delegatedAddress: lan-ipv6-pd-address
        mode: stateless
        leaseTime: 12h
        defaultRoute: true
        dnsSource: self
        selfAddressPolicy: lan-ipv6-self
