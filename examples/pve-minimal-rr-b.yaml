# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: pve-rr-b
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: private-wan }
      spec: { ifname: vmbr0, managed: false, mtu: 1500 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: private-wan-ipv4 }
      spec: { interface: private-wan, address: 10.30.0.11/24 }

    - apiVersion: system.routerd.net/v1alpha1
      kind: ControlAPI
      metadata: { name: default }
      spec:
        listenAddress: 0.0.0.0
        port: 65432
        allowCIDRs: [10.30.0.0/24]

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata: { name: wg-pve }
      spec:
        selfNodeRef: pve-rr-b
        privateKeyFile: /usr/local/etc/routerd/secrets/wg-pve.key
        listenPort: 51820
        mtu: 1420
        peersFrom:
          - resource: SAMEnrollmentPolicy/pve-wg-leaves

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata: { name: wg-pve }
      spec: { ifname: wg-pve, managed: false, mtu: 1420 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata: { name: wg-pve-ipv4 }
      spec: { interface: wg-pve, address: 10.31.0.11/32 }

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata: { name: mobility-bgp }
      spec:
        asn: 64577
        routerID: 10.255.10.2
        listen: { port: 179 }
        importPolicy:
          allowedPrefixes: [10.77.70.0/24]
          allowedPrefixLengthMin: 32
          allowedPrefixLengthMax: 32
          nextHopRewrite: unchanged
        exportPolicy:
          allowedPrefixes: [10.77.70.0/24]
        timers: { profile: fast }
        convergenceProfile: fast

    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPDynamicPeer
      metadata: { name: pve-leaves }
      spec:
        routerRef: BGPRouter/mobility-bgp
        peerASN: 64577
        listen:
          sourcePrefixes: [10.255.10.0/24]
        routeReflectorClient: true
        routeReflectorClusterID: 10.255.10.1
        importPolicy:
          allowedPrefixes: [10.77.70.0/24]
          allowedPrefixLengthMin: 32
          allowedPrefixLengthMax: 32
          nextHopRewrite: peer-address
        exportPolicy:
          allowedPrefixes: [10.77.70.0/24]
        timers: { profile: fast }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMRRSet
      metadata: { name: pve-rrs }
      spec:
        enrollmentPolicyRef: SAMEnrollmentPolicy/pve-fou-leaves
        mobilityPrefixes: [10.77.70.0/24]
        routeAdmission:
          allowedPrefixes: [10.77.70.0/24]
          allowedPrefixLengthMin: 32
          allowedPrefixLengthMax: 32
          nextHopRewrite: peer-address
        members:
          - nodeRef: pve-rr-a
            endpoint: 10.30.0.10
            tunnelAddress: 10.255.10.1/32
            wireGuard:
              publicKey: PVE_RR_WIREGUARD_PUBLIC_KEY
              endpoint: 10.30.0.10:51820
              allowedIPs: [10.31.0.10/32]
              persistentKeepalive: 25
            bgp: { asn: 64577, routerID: 10.255.10.1 }
          - nodeRef: pve-rr-b
            endpoint: 10.30.0.11
            tunnelAddress: 10.255.10.2/32
            wireGuard:
              publicKey: PVE_RR_B_WIREGUARD_PUBLIC_KEY
              endpoint: 10.30.0.11:51820
              allowedIPs: [10.31.0.11/32]
              persistentKeepalive: 25
            bgp: { asn: 64577, routerID: 10.255.10.2 }

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata: { name: pve-rr-b-wg }
      spec:
        selfNodeRef: pve-rr-b
        mode: ipip
        encryption: wireguard
        addressingMode: pair-stable
        innerPrefix: 10.255.10.0/24
        underlayInterface: wg-pve
        localEndpoint: 10.31.0.11
        peersFrom:
          - resource: SAMEnrollmentPolicy/pve-wg-leaves
        bgp:
          routerRef: BGPRouter/mobility-bgp
          peerASN: 64577
          generatePeers: false
          timersPreset: fast

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata: { name: pve-rr-b-fou }
      spec:
        selfNodeRef: pve-rr-b
        mode: fou
        encryption: none
        addressingMode: pair-stable
        innerPrefix: 10.255.10.0/24
        underlayInterface: private-wan
        localEndpoint: 10.30.0.11
        encapSport: 5555
        encapDport: 5555
        peersFrom:
          - resource: SAMEnrollmentPolicy/pve-fou-leaves
        bgp:
          routerRef: BGPRouter/mobility-bgp
          peerASN: 64577
          generatePeers: false
          timersPreset: fast

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMEnrollmentPolicy
      metadata: { name: pve-wg-leaves }
      spec:
        transportProfileRef: SAMTransportProfile/pve-rr-b-wg
        rrSetRef: SAMRRSet/pve-rrs
        joinTokenFrom:
          file: /usr/local/etc/routerd/secrets/pve-join-token
        joinAudience: pve-wg-underlay
        allowedLeafIDs:
          pattern: ^pve-leaf-[a-z0-9-]+$
        tunnelAddressPrefixes: [10.255.10.0/24]
        endpointPrefixes: [10.31.0.0/24]
        ttl: 8760h
        wireGuard:
          interface: wg-pve
          endpointPrefixes: [10.30.0.0/24]
          allowedExtraIPPrefixes: [10.31.0.0/24]
          persistentKeepalive: 25
        mobilityPrefixes: [10.77.70.0/24]

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMEnrollmentPolicy
      metadata: { name: pve-fou-leaves }
      spec:
        transportProfileRef: SAMTransportProfile/pve-rr-b-fou
        rrSetRef: SAMRRSet/pve-rrs
        joinTokenFrom:
          file: /usr/local/etc/routerd/secrets/pve-join-token
        joinAudience: pve-private-underlay
        allowedLeafIDs:
          pattern: ^pve-leaf-[a-z0-9-]+$
        tunnelAddressPrefixes: [10.255.10.0/24]
        endpointPrefixes: [10.30.0.0/24]
        ttl: 8760h
        mobilityPrefixes: [10.77.70.0/24]
