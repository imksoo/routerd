apiVersion: plugin.routerd.net/v1alpha1
kind: Plugin
metadata:
  name: aws-address-claim
spec:
  executable: /usr/local/libexec/routerd/plugins/aws-address-claim/bin/aws-address-claim
  timeout: 10s
  capabilities:
    - observe.cloud
    - propose.dynamicConfig
  # Least-privilege, secret-redacted context the plugin may read (Phase 4.0).
  context:
    resources:
      - apiVersion: hybrid.routerd.net/v1alpha1
        kind: CloudProviderProfile
      - apiVersion: hybrid.routerd.net/v1alpha1
        kind: AddressMobilityDomain
      - apiVersion: hybrid.routerd.net/v1alpha1
        kind: OverlayPeer
  # Invoked by the EventSubscriptionController for matched federation events
  # (ADR 0006, Phase 3/4); no interval trigger is needed.
  triggers:
    - type: event
      topic: routerd.federation.subscription
