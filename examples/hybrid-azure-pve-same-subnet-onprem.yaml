# Selective Address Mobility — on-prem side of the Azure↔PVE same-subnet lab.
# Capture on the cloud side is manual/pre-provisioned (Azure NIC secondary IP).
# On Linux, routerd installs the local forwarding route (and, for proxy-arp claims,
# the proxy-ARP capture) for the RemoteAddressClaim resources in THIS config.
# Azure + PVE lab smoke validation is still pending.
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: hybrid-azure-pve-same-subnet-onprem
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata:
        name: wg-hybrid
      spec:
        privateKeyFile: /usr/local/etc/routerd/secrets/wg-hybrid.key
        listenPort: 51820
        mtu: 1420

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardPeer
      metadata:
        name: cloud-main
      spec:
        interface: wg-hybrid
        publicKey: CLOUD_PEER_PUBLIC_KEY_REPLACE_ME
        endpoint: 203.0.113.20:51820
        allowedIPs:
          - 169.254.110.1/32
          - 10.0.0.7/32
          - 10.0.0.9/32
        persistentKeepalive: 25

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: OverlayPeer
      metadata:
        name: cloud-main
      spec:
        role: cloud
        nodeID: azure-router
        underlay:
          type: wireguard
          interface: wg-hybrid
          address: 169.254.110.1
        remote:
          nodeID: pve-router
          address: 169.254.110.2

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: AddressMobilityDomain
      metadata:
        name: lab-same-subnet
      spec:
        prefix: 10.0.0.0/24
        mode: selective-address
        peerRef: cloud-main

    - apiVersion: hybrid.routerd.net/v1alpha1
      kind: RemoteAddressClaim
      metadata:
        name: cloud-vm-10-0-0-7
      spec:
        domainRef: lab-same-subnet
        address: 10.0.0.7/32
        ownerSide: cloud
        capture:
          type: proxy-arp
          interface: br-lan
          gratuitousARP: true
        delivery:
          peerRef: cloud-main
          mode: route
          tunnelInterface: wg-hybrid
