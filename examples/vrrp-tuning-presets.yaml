# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: vrrp-tuning-presets

spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        managed: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualIPv4Address
      metadata:
        name: k8s-api-vip
      spec:
        interface: lan
        address: 192.0.2.10/32
        mode: vrrp
        vrrp:
          virtualRouterID: 60
          priority: 150
          peers:
            - 192.0.2.11
          advertInterval: 1s
          preempt: true
          preemptDelay: 30s

    - apiVersion: net.routerd.net/v1alpha1
      kind: VirtualIPv4Address
      metadata:
        name: home-lan-vip
      spec:
        interface: lan
        address: 192.0.2.1/32
        mode: vrrp
        vrrp:
          virtualRouterID: 61
          priority: 120
          peers:
            - 192.0.2.12
          advertInterval: 3s
          preempt: false
