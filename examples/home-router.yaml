    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: home
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: lan-base
      spec:
        zone: home.internal
        ttl: 300
        records:
          - hostname: router
            ipv4From:
              resource: IPv4StaticAddress/lan-base
              field: address
            ipv6From:
              resource: IPv6DelegatedAddress/lan-base
              field: address
        dhcpDerived:
          sources:
            - DHCPv4Server/lan-dhcpv4
            - DHCPv6Server/lan-dhcpv6
          ddns: true
          ttl: 60
        reverseZones:
          - name: 18.172.in-addr.arpa

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4
      spec:
        logDHCP: true
        interface: lan
        addressPool:
          start: 172.18.1.64
          end: 172.18.1.191
          leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-base
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-base
            field: address
        ntpServerFrom:
          - resource: IPv4StaticAddress/lan-base
            field: address
        domainFrom:
          resource: DNSZone/home
          field: zone

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: panasonic-aiseg2
      spec:
        server: lan-dhcpv4
        macAddress: "18:ec:e7:33:12:6c"
        hostname: aiseg2
        ipAddress: 172.18.0.150

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata:
        name: lan-ra
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: lan-base
      spec:
        interface: lan
        prefixFrom:
          resource: IPv6DelegatedAddress/lan-base
          field: address
        rdnssFrom:
          - resource: IPv6DelegatedAddress/lan-base
            field: address
        dnsslFrom:
          - resource: DNSZone/home
            field: zone
        mFlag: false
        oFlag: true
        mtu: 1500
        prfPreference: high
        preferredLifetime: "3600"
        validLifetime: "7200"
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-base
            phase: Applied

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: lan-dhcpv6
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: lan-base
      spec:
        logDHCP: true
        interface: lan
        mode: stateless
        dnsServerFrom:
          - resource: IPv6DelegatedAddress/lan-base
            field: address
        sntpServerFrom:
          - resource: IPv6DelegatedAddress/lan-base
            field: address
        domainSearchFrom:
          - resource: DNSZone/home
            field: zone
        leaseTime: 12h
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-base
            phase: Applied

