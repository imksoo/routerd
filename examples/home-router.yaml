    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
        ownerRefs:
          - kind: DNSZone
            name: home
          - kind: DHCPv6Information
            name: wan-info
          - kind: IPv6DelegatedAddress
            name: lan-base
      spec:
        listen:
          - name: local
            addresses:
              - 127.0.0.1
            addressFrom:
              - resource: Interface/mgmt
                field: ipv4Addresses
            port: 53
            sources: [local-zone, home-example, lab-example, fab-example, home-zone, ngn-aftr, nextdns-bootstrap-ngn, nextdns-bootstrap-public, default]
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-base
                field: address
              - resource: IPv6DelegatedAddress/lan-base
                field: address
            port: 53
            sources: [local-zone, home-example, lab-example, fab-example, home-zone, ngn-aftr, nextdns-bootstrap-ngn, nextdns-bootstrap-public, default]
        cache:
          enabled: true
          maxEntries: 10000
          minTTL: 60s
          maxTTL: 24h
          negativeTTL: 30s
        queryLog:
          enabled: true
          path: /var/lib/routerd/dns-queries.db
          retention: 30d

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: local-zone
      spec:
        resolver: DNSResolver/lan-resolver
        match:
          - home.internal
          - 18.172.in-addr.arpa
        zoneRefs:
          - DNSZone/home

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: home-example
      spec:
        resolver: DNSResolver/lan-resolver
        match:
          - home.example
        upstreams:
          - DNSUpstream/home-example-dns

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: home-example-dns
