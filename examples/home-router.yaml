# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: home-router
spec:
  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: WebConsole
      metadata:
        name: lan-console
      spec:
        enabled: true
        listenAddressFrom:
          resource: IPv4StaticAddress/lan-v4
          field: address
        port: 8080
        title: home-router
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        managed: false
    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        role: trust
        managed: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-v4
      spec:
        interface: lan
        address: 192.168.1.1/24
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-v6
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::1"
        announce: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: dslite
      spec:
        interface: wan
        tunnelName: ds-lite0
        aftrFQDN: gw.transix.jp
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-v6
        localAddressSuffix: "::100"
        defaultRoute: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-v4
      spec:
        role: internet
        addressFamily: ipv4
        target: 1.1.1.1
        protocol: tcp
        port: 443
        interval: 30s
    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata:
        name: ipv4-default
      spec:
        family: ipv4
        destinationCIDRs: [0.0.0.0/0]
        selection: highest-weight-ready
        candidates:
          - name: dslite
            deviceFrom:
              resource: DSLiteTunnel/dslite
              field: device
            gatewaySource: none
            healthCheck: internet-v4
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan
      spec:
        listen:
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-v4
                field: address
              - resource: IPv6DelegatedAddress/lan-v6
                field: address
            port: 53
            sources: [default]
        cache:
          enabled: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSForwarder
      metadata:
        name: default
      spec:
        resolver: DNSResolver/lan
        match: ["."]
        upstreams: [DNSUpstream/cloudflare]
    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSUpstream
      metadata:
        name: cloudflare
      spec:
        protocol: udp
        address: 1.1.1.1
    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan
      spec:
        interface: lan
        addressPool:
          start: 192.168.1.100
          end: 192.168.1.199
          leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-v4
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-v4
            field: address
        domain: home.arpa
    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata:
        name: lan
      spec:
        interface: lan
        prefixFrom:
          resource: IPv6DelegatedAddress/lan-v6
          field: address
        rdnssFrom:
          - resource: IPv6DelegatedAddress/lan-v6
            field: address
        oFlag: true
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata:
        name: k8s-edge
      spec:
        asn: 64500
        routerID: 192.168.1.249
        convergenceProfile: fast
        importPolicy:
          allowedPrefixes: [10.250.0.0/24]
        redistribute:
          connected:
            allowedPrefixes: [192.168.1.0/24]
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPPeer
      metadata:
        name: k8s-rt
      spec:
        routerRef: BGPRouter/k8s-edge
        peerASN: 64512
        peers: [192.168.1.38, 192.168.1.53]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces: [wan, dslite]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces: [lan]
    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default
      spec:
        logDeny: true
