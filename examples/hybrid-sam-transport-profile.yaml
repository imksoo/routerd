# yaml-language-server: $schema=https://routerd.net/schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: hybrid-sam-transport-profile
spec:
  resources:
    - apiVersion: net.routerd.net/v1alpha1
      kind: BGPRouter
      metadata:
        name: main
      spec:
        asn: 64520
        routerID: 10.255.1.1
        importPolicy:
          allowedPrefixes:
            - 192.168.123.0/24
        exportPolicy:
          allowedPrefixes:
            - 192.168.123.0/24

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wg-hybrid
      spec:
        ifname: wg-hybrid
        managed: false

    - apiVersion: mobility.routerd.net/v1alpha1
      kind: SAMTransportProfile
      metadata:
        name: pve08-core
      spec:
        selfNodeRef: pve-rt08
        mode: ipip
        innerPrefix: 10.255.1.0/24
        underlayInterface: wg-hybrid
        localEndpointFrom:
          resource: Interface/wg-hybrid
          field: primaryIPv4
        bgp:
          routerRef: BGPRouter/main
          peerASN: 64512
          timersPreset: fast
        peers:
          - nodeRef: k8s-rt02
            remoteEndpoint: 10.99.0.2
