release:
  version: v20260629.1224
  commit: 7c23a8720fe066645aa8d4c0dc6f1d7fd2d04d22
  baseline: v20260627.1533
  status: release-candidate
  recommended: false
  artifact:
    path: pending-release-artifact
    sha256: pending-release-artifact
  changes:
    - Stable RR/hub base configs no longer require static per-leaf
      SAMEnrollmentClaim resources or per-leaf BGPPeer resources.
    - SAMEnrollmentClient submits local claims, fetches authorized SAMRRSet
      data, and refreshes leaf-side dynamic state before expiry.
    - Live SAM enrollment submit verifies join-token/HMAC material strictly
      when the RR admits a claim.
    - BGPDynamicPeer keeps BGP listen/admission policy separate from SAM
      enrollment identity and MobilityPool ownership.
    - Dynamic SAM route admission binds accepted MobilityPool /32s to the BGP
      neighbor identity and enforces exact /32 import bounds.
    - SAMTransportProfile composes existing TunnelInterface/BGPPeer resources;
      WireGuard materialization remains optional and transport-specific.
    - FOU private-underlay and public-underlay WireGuard paths were both
      exercised during review.
    - routerd serve --http-listen is documented as a protected management API,
      not an Internet-safe listener.
