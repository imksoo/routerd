  knownResiduals:
    - >-
      Broad representative failover/rejoin and BFD restart-safe coverage remain
      useful nightly/full-qualification scenarios, but are not treated as
      blockers for this stable promotion because the 2350 delta does not alter
      SAM ownership, provider execution, or dataplane behavior.
    - >-
      The faster live ISO plus qnap config media path remains the intended PVE
      qualification path. The first 2026-06-27 4VM run is discarded as release
      qualification evidence because it used static ens18 management addresses.
      The later p2350-dhcpmgmt run corrected that by keeping ens18 on DHCP and
      copying QGA-discovered addresses into the E2E tofu output. The obsolete
      PVE template-clone lab path remains deprecated.
    - >-
      The 2026-06-27 p2350-dhcpmgmt post-release full-topology baseline failed
      on an OCI duplicate same-site secondary private IP assignment attempt.
      This is a SAM planner/provider-action issue, not a PVE provisioning
      issue, and should be fixed and released before treating the fresh
      full-topology 2350 lineage as fully re-qualified.
