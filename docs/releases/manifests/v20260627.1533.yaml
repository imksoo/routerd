  releaseDecision:
    stablePromotion: true
    reason: >-
      v20260627.1533 is a small operator-surface hardening tag on top of the
      post-1107 SAM behavior. Local CLI tests passed, the PVE-only substrate
      preflight passed on qnap-backed live ISO/config media, and the accepted
      cost-bounded cloud/PVE single-topology baseline converged in 136s with
      matrix 12/12, all leaf MobilityPools Ready, BGP delivery Established,
      no ownership conflicts, no stale capture evidence, and provider action
      pending/failed counts at 0. Cleanup completed with OpenTofu
      plan-destroy exit code 0 and the disposable PVE leaf absent. Promote
      v20260627.1533 as the production-recommended stable baseline while
      leaving representative failover/rejoin and BFD restart-safe cloud runs as
      follow-up validation rather than blockers for this small operator-surface
      release.
