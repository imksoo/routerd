  releaseDecision:
    stablePromotion: false
    reason: >-
      v20260627.1533 is a small operator-surface hardening tag and its local
      CLI tests passed. The cost-bounded single-topology smoke did not expose a
      cloud leaf routerd/SAM regression: AWS, Azure, and OCI leaves were Ready,
      BGP Established, and had no stale capture evidence. However, the full
      smoke baseline did not complete because the PVE leaf live ISO path was
      not yet a clean test substrate. A later PVE-only run fixed and verified
      the PVE leaf/client substrate, but cloud/PVE baseline was intentionally
      not rerun until that substrate was clean. Treat this as a
      release-candidate/operator-surface tag, not a production-recommended
      stable baseline.
