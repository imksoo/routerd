  notes:
    - >-
      v20260625.0932 is a release checkpoint after the SAM claim, provider
      observation, action failure aggregation, on-prem discovery, and BFD reset
      recovery work from issues #655 through #662.
    - >-
      #654 remains open. The current evidence proves repeated fresh-deploy
      reachability, RR failover/rejoin, and representative OCI leaf
      failover/rejoin, but does not yet prove the full 3-5-run acceptance with
      all leaf failover scenarios.
    - >-
      Legacy protocol and performance matrices were intentionally skipped during
      run2 to control cloud cost. They should be rerun when cutting a new
      release tag or when specifically qualifying protocol/performance changes.
    - >-
      Run5 is negative qualification evidence: provisioning and cleanup passed,
      but baseline failed because AWS provider capture did not materialize.
      Investigate the AWS-only capture gap before using this release as a
      stronger rollback baseline.
    - >-
      Run6 and run7 isolated the AWS-only failure to the lab bootstrap/deploy
      path rather than SAM core behavior: AWS leaf cloud-init can leave aws CLI
      absent, which prevents provider inventory/executor capture. A private
      run7 harness repair made aws CLI an explicit AWS-router prerequisite,
      after which AWS secondary-IP capture materialized and a representative
      AWS-to-Azure ping passed. This evidence is focused and does not replace
      the remaining #654 full qualification work.
