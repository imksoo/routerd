title: Cloud-SAM Dynamic RR/Leaf Enrollment live validation

summary:
  Cloud-SAM dynamic RR/leaf enrollment was merged to main and validated in a
  PVE live redundant topology with dual RRs, four leaves, dynamic BGP
  admission, FOU transport, and bidirectional client connectivity.

features:
  - BGPDynamicPeer dynamic RR BGP admission
  - SAMEnrollmentPolicy and SAMEnrollmentClaim admission boundary
  - SAMEnrollmentClient leaf-side claim submit and RRSet fetch
  - SAMRRSet dynamic state consumption by SAMTransportProfile
  - Claim-owned /32 route admission
  - ControlAPI TCP listener with CIDR admission and documented local trust boundary

live_validation:
  topology: PVE cloud-SAM redundancy
  status: PASS
  rrs:
    - rr-1
    - rr-2
  leaves:
    - leaf-a
    - leaf-b
    - leaf-c
    - leaf-d
  transport: FOU
  bgp:
    rr_admission: BGPDynamicPeer/samred-leaves
    rr_1_dynamic_peers: 4
    rr_2_dynamic_peers: 4
  clients:
    - name: client-999
      address: 10.99.9.10
    - name: client-998
      address: 10.99.8.10
  assertions:
    - RR base configs contain no static leaf claims
    - RR base configs contain no per-leaf BGPPeer resources
    - each leaf submitted claims to both RRs
    - each leaf established FOU tunnel and BGP sessions to both RRs
    - bidirectional ping passed between client-999 and client-998
    - bidirectional SSH passed between client-999 and client-998 using temporary test key

