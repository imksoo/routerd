<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Inter, Arial, Helvetica, sans-serif">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5.5" orient="auto">
    <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#2f4f6f"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#10233f" flood-opacity="0.14"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#f7fafc"/>
<rect x="28" y="28" width="1544" height="844" rx="30" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="74" y="92" font-size="42" font-weight="850" fill="#10233f">High availability</text>
<text x="76" y="130" font-size="23" font-weight="600" fill="#63758d">RouterdCluster elects the applier with a file lease while VIP ownership remains external to routerd.</text>
<g filter="url(#shadow)">
<g>
  <rect x="72" y="176" width="430" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="100" y="218" font-size="25" font-weight="800" fill="#45556f">Cluster intent</text>
</g>
<g>
  <rect x="112" y="245" width="340" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="282" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">RouterdCluster</tspan><tspan x="282" dy="28">peers leaseTTL leasePath</tspan></text>
</g>
<g>
  <rect x="112" y="410" width="340" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="282" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">identity from config</tspan><tspan x="282" dy="28">or hostname</tspan></text>
</g>
<g>
  <rect x="112" y="575" width="340" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="282" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">local or shared</tspan><tspan x="282" dy="28">advisory lock path</tspan></text>
</g>
<g>
  <rect x="540" y="176" width="470" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="568" y="218" font-size="25" font-weight="800" fill="#45556f">Runtime state</text>
</g>
<g>
  <rect x="580" y="245" width="390" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="775" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">leader refreshes</tspan><tspan x="775" dy="28">exclusive lease</tspan></text>
</g>
<g>
  <rect x="580" y="410" width="390" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="775" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">standby observes</tspan><tspan x="775" dy="28">but dry-runs mutation</tspan></text>
</g>
<g>
  <rect x="580" y="575" width="390" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="775" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">one-shot standby</tspan><tspan x="775" dy="28">records status skips apply</tspan></text>
</g>
<g>
  <rect x="1048" y="176" width="480" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="1076" y="218" font-size="25" font-weight="800" fill="#45556f">VIP plane</text>
</g>
<g>
  <rect x="1088" y="245" width="390" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="1283" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">keepalived or CARP</tspan><tspan x="1283" dy="28">owns VIP</tspan></text>
</g>
<g>
  <rect x="1088" y="410" width="390" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="1283" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">routerd lease does not</tspan><tspan x="1283" dy="28">replace VRRP/CARP</tspan></text>
</g>
<g>
  <rect x="1088" y="575" width="390" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="1283" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">status shows</tspan><tspan x="1283" dy="28">Leader or Standby</tspan></text>
</g>
<line x1="452" y1="476" x2="580" y2="476" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/><text x="516" y="464" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">intent</text>
<line x1="970" y1="476" x2="1088" y2="476" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/><text x="1029" y="464" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">runtime</text>
<g>
  <rect x="310" y="705" width="980" height="55" rx="14" fill="#fff8df" stroke="#d7a725" stroke-width="3"/>
  <text x="800" y="727.5" font-size="20" font-weight="650" fill="#5b4400" text-anchor="middle" dominant-baseline="middle"><tspan x="800" dy="0">Use RouterdCluster to gate host mutation; use VRRP/CARP or platform mechanisms for</tspan><tspan x="800" dy="24">address ownership.</tspan></text>
</g>
</g>
</svg>
