<line x1="970" y1="291" x2="1088" y2="291" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="970" y1="291" x2="1088" y2="456" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="970" y1="291" x2="1088" y2="621" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/>
<path d="M 580 456 C 640 456, 392 621, 452 621" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)" stroke-dasharray="9 8"/><text x="516" y="526.5" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">no writes</text>
</g>
