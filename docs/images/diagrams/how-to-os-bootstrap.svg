<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Inter, Arial, Helvetica, sans-serif">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5.5" orient="auto">
    <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#2f4f6f"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#10233f" flood-opacity="0.14"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#f7fafc"/>
<rect x="28" y="28" width="1544" height="844" rx="30" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="74" y="92" font-size="42" font-weight="850" fill="#10233f">declarative OS bootstrap</text>
<text x="76" y="130" font-size="23" font-weight="600" fill="#63758d">router-specific host preparation is derived from resources, while Package and SysctlProfile remain narrow escape hatches.</text>
<g filter="url(#shadow)">
<g>
  <rect x="72" y="176" width="430" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="100" y="218" font-size="25" font-weight="800" fill="#45556f">Host prerequisites</text>
</g>
<g>
  <rect x="112" y="245" width="340" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="282" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">OS packages</tspan><tspan x="282" dy="28">dnsmasq nft conntrack WG</tspan></text>
</g>
<g>
  <rect x="112" y="410" width="340" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="282" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">kernel modules</tspan><tspan x="282" dy="28">derived from resources</tspan></text>
</g>
<g>
  <rect x="112" y="575" width="340" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="282" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">installer networking</tspan><tspan x="282" dy="28">kept minimal</tspan></text>
</g>
<g>
  <rect x="540" y="176" width="470" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="568" y="218" font-size="25" font-weight="800" fill="#45556f">routerd config</text>
</g>
<g>
  <rect x="580" y="245" width="390" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="775" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">Package override</tspan><tspan x="775" dy="28">when dependency not derived</tspan></text>
</g>
<g>
  <rect x="580" y="410" width="390" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="775" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">derived sysctls</tspan><tspan x="775" dy="28">forwarding rp_filter conntrack</tspan></text>
</g>
<g>
  <rect x="580" y="575" width="390" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="775" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">Interface/DHCP/DNS</tspan><tspan x="775" dy="28">adoption drop-ins</tspan></text>
</g>
<g>
  <rect x="1048" y="176" width="480" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="1076" y="218" font-size="25" font-weight="800" fill="#45556f">Runtime target</text>
</g>
<g>
  <rect x="1088" y="245" width="390" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="1283" y="299.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">clean first boot</tspan></text>
</g>
<g>
  <rect x="1088" y="410" width="390" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="1283" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">no competing DHCPv6 client</tspan><tspan x="1283" dy="28">on router-owned WAN</tspan></text>
</g>
<g>
  <rect x="1088" y="575" width="390" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="1283" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">router-specific drift stays in</tspan><tspan x="1283" dy="28">YAML</tspan></text>
</g>
<line x1="452" y1="476" x2="580" y2="476" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/><text x="516" y="464" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">intent</text>
<line x1="970" y1="476" x2="1088" y2="476" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/><text x="1029" y="464" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">runtime</text>
<g>
  <rect x="310" y="705" width="980" height="55" rx="14" fill="#fff8df" stroke="#d7a725" stroke-width="3"/>
  <text x="800" y="727.5" font-size="20" font-weight="650" fill="#5b4400" text-anchor="middle" dominant-baseline="middle"><tspan x="800" dy="0">The goal is not to replace an installer; it is to keep router-specific drift out</tspan><tspan x="800" dy="24">of shell history.</tspan></text>
</g>
</g>
</svg>
