  <rect x="112" y="225" width="340" height="82" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="282" y="260.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">DS-Lite A</tspan><tspan x="282" dy="28">weight 120</tspan></text>
</g>
<g>
  <rect x="112" y="345" width="340" height="82" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="282" y="380.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">DS-Lite B</tspan><tspan x="282" dy="28">additional tunnel</tspan></text>
</g>
<g>
  <rect x="112" y="465" width="340" height="82" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="282" y="500.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">PPPoE backup</tspan><tspan x="282" dy="28">weight 60</tspan></text>
</g>
<g>
  <rect x="112" y="585" width="340" height="82" rx="18" fill="#fff4e6" stroke="#c57a1c" stroke-width="3"/>
  <text x="282" y="620.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">HGW direct IPv4</tspan><tspan x="282" dy="28">weight 40</tspan></text>
</g>
<g>
  <rect x="540" y="176" width="470" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
