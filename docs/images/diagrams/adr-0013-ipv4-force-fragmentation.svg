<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Inter, Arial, Helvetica, sans-serif">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5.5" orient="auto">
    <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#2f4f6f"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#10233f" flood-opacity="0.14"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#f7fafc"/>
<rect x="28" y="28" width="1544" height="844" rx="30" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="74" y="92" font-size="42" font-weight="850" fill="#10233f">ADR 0013: IPv4 Force Fragmentation</text>
<text x="76" y="130" font-size="23" font-weight="600" fill="#63758d">Explicit path-scoped DF clearing handles trusted overlay PMTU black holes when MSS clamp is not enough.</text>
<g filter="url(#shadow)">
<g>
  <rect x="72" y="176" width="430" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="100" y="218" font-size="25" font-weight="800" fill="#45556f">Normal path</text>
</g>
<g>
  <rect x="112" y="245" width="340" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="282" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">derive effective</tspan><tspan x="282" dy="28">path MTU</tspan></text>
</g>
<g>
  <rect x="112" y="410" width="340" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="282" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">TCP MSS clamp</tspan><tspan x="282" dy="28">routerd_mss table</tspan></text>
</g>
<g>
  <rect x="112" y="575" width="340" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="282" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">PMTUD preferred</tspan><tspan x="282" dy="28">when feedback works</tspan></text>
</g>
<g>
  <rect x="540" y="176" width="470" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="568" y="218" font-size="25" font-weight="800" fill="#45556f">Problem traffic</text>
</g>
<g>
  <rect x="580" y="245" width="390" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="775" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">non-TCP oversized</tspan><tspan x="775" dy="28">UDP QUIC ICMP</tspan></text>
</g>
<g>
  <rect x="580" y="410" width="390" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="775" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">DF set and PMTUD</tspan><tspan x="775" dy="28">blocked or ignored</tspan></text>
</g>
<g>
  <rect x="580" y="575" width="390" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="775" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">overlay underlay MTU</tspan><tspan x="775" dy="28">lower than sender expects</tspan></text>
</g>
<g>
  <rect x="1048" y="176" width="480" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="1076" y="218" font-size="25" font-weight="800" fill="#45556f">Decision</text>
</g>
<g>
  <rect x="1088" y="245" width="390" height="92" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="1283" y="285.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">forceFragmentIPv4</tspan><tspan x="1283" dy="28">explicit default off</tspan></text>
</g>
<g>
  <rect x="1088" y="410" width="390" height="92" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="1283" y="450.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">trusted overlay only</tspan><tspan x="1283" dy="28">wireguard ipip gre fou gue</tspan></text>
</g>
<g>
  <rect x="1088" y="575" width="390" height="92" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="1283" y="615.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">routerd_forcefrag</tspan><tspan x="1283" dy="28">clear DF on matched path</tspan></text>
</g>
<line x1="452" y1="476" x2="580" y2="476" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/><text x="516" y="464" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">intent</text>
<line x1="970" y1="476" x2="1088" y2="476" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/><text x="1029" y="464" font-size="22" font-weight="700" fill="#2f4f6f" text-anchor="middle">runtime</text>
<g>
  <rect x="310" y="705" width="980" height="55" rx="14" fill="#fff8df" stroke="#d7a725" stroke-width="3"/>
  <text x="800" y="739.5" font-size="20" font-weight="650" fill="#5b4400" text-anchor="middle" dominant-baseline="middle"><tspan x="800" dy="0">This is a last-resort Linux path-MTU workaround, not a general Internet default.</tspan></text>
</g>
</g>
</svg>
