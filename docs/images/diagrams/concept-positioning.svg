<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" font-family="Inter, Arial, Helvetica, sans-serif">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5.5" orient="auto">
    <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#2f4f6f"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#10233f" flood-opacity="0.14"/>
  </filter>
</defs>
<rect width="1600" height="900" fill="#f7fafc"/>
<rect x="28" y="28" width="1544" height="844" rx="30" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="74" y="92" font-size="42" font-weight="850" fill="#10233f">where routerd fits</text>
<text x="76" y="130" font-size="23" font-weight="600" fill="#63758d">routerd is a local declarative router control plane for small and medium networks, not a hosted network OS.</text>
<g filter="url(#shadow)">
<g>
  <rect x="72" y="176" width="430" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="100" y="218" font-size="25" font-weight="800" fill="#45556f">Best fit</text>
</g>
<g>
  <rect x="540" y="176" width="470" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="568" y="218" font-size="25" font-weight="800" fill="#45556f">Local control plane</text>
</g>
<g>
  <rect x="1048" y="176" width="480" height="600" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="1076" y="218" font-size="25" font-weight="800" fill="#45556f">Boundaries</text>
</g>
<g>
  <rect x="112" y="235" width="340" height="86" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="282" y="272.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">home lab and SOHO</tspan><tspan x="282" dy="28">routers</tspan></text>
</g>
<g>
  <rect x="112" y="385" width="340" height="86" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="282" y="436.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">Proxmox KVM cloud edge demos</tspan></text>
</g>
<g>
  <rect x="112" y="535" width="340" height="86" rx="18" fill="#fff4e6" stroke="#c57a1c" stroke-width="3"/>
  <text x="282" y="586.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="282" dy="0">git-reviewed YAML changes</tspan></text>
</g>
<g>
  <rect x="580" y="235" width="390" height="86" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="775" y="272.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">router.yaml</tspan><tspan x="775" dy="28">single host intent</tspan></text>
</g>
<g>
  <rect x="580" y="385" width="390" height="86" rx="18" fill="#eef8f9" stroke="#2b8a92" stroke-width="3"/>
  <text x="775" y="422.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">routerd serve/apply</tspan><tspan x="775" dy="28">local kernel and daemons</tspan></text>
</g>
<g>
  <rect x="580" y="535" width="390" height="86" rx="18" fill="#e9f8ef" stroke="#2e7d55" stroke-width="3"/>
  <text x="775" y="572.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="775" dy="0">routerctl + Web Console</tspan><tspan x="775" dy="28">observe local state</tspan></text>
</g>
<g>
  <rect x="1088" y="235" width="390" height="86" rx="18" fill="#fcefee" stroke="#b64e4a" stroke-width="3"/>
  <text x="1283" y="286.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">not a Linux distribution</tspan></text>
</g>
<g>
  <rect x="1088" y="385" width="390" height="86" rx="18" fill="#fff8df" stroke="#d7a725" stroke-width="3"/>
  <text x="1283" y="422.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">not a hosted controller</tspan><tspan x="1283" dy="28">for many routers</tspan></text>
</g>
<g>
  <rect x="1088" y="535" width="390" height="86" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="1283" y="572.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1283" dy="0">second-tier NixOS FreeBSD</tspan><tspan x="1283" dy="28">groundwork, not parity</tspan></text>
</g>
