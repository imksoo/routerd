<line x1="970" y1="428" x2="1088" y2="428" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="970" y1="578" x2="1088" y2="578" fill="none" stroke="#2f4f6f" stroke-width="4" marker-end="url(#arrow)"/>
