  <rect x="112" y="495" width="302" height="100" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="263" y="539.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="263" dy="0">DynamicOverridePolicy</tspan><tspan x="263" dy="28">exact masks only</tspan></text>
</g>
<g>
  <rect x="535" y="238" width="382" height="96" rx="18" fill="#eaf2ff" stroke="#3267b1" stroke-width="3"/>
  <text x="726" y="266.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="726" dy="0">trusted local plugin</tspan><tspan x="726" dy="28">observe cloud or local</tspan><tspan x="726" dy="28">facts</tspan></text>
</g>
