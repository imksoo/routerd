  <rect x="1038" y="388" width="420" height="96" rx="18" fill="#f5f3ff" stroke="#6d5bd0" stroke-width="3"/>
  <text x="1248" y="430.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1248" dy="0">action journal</tspan><tspan x="1248" dy="28">import approve audit</tspan></text>
</g>
<g>
  <rect x="1038" y="548" width="420" height="96" rx="18" fill="#fcefee" stroke="#b64e4a" stroke-width="3"/>
  <text x="1248" y="590.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="1248" dy="0">executor plugin</tspan><tspan x="1248" dy="28">no routerd-held credentials</tspan></text>
</g>
<g>
  <rect x="1015" y="680" width="465" height="62" rx="14" fill="#fff8df" stroke="#d7a725" stroke-width="3"/>
  <text x="1247.5" y="706" font-size="20" font-weight="650" fill="#5b4400" text-anchor="middle" dominant-baseline="middle"><tspan x="1247.5" dy="0">Live execution requires ProviderActionPolicy,</tspan><tspan x="1247.5" dy="24">approval, allowlists, and dryRunOnly=false.</tspan></text>
</g>
