<rect width="1600" height="900" fill="#f7fafc"/>
<rect x="28" y="28" width="1544" height="844" rx="30" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
<text x="74" y="92" font-size="42" font-weight="850" fill="#10233f">dynamic config and provider actions</text>
<text x="76" y="130" font-size="23" font-weight="600" fill="#63758d">Trusted plugins can contribute runtime intent; provider mutations stay journaled and gated.</text>
<g filter="url(#shadow)">
<g>
  <rect x="72" y="178" width="390" height="592" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="100" y="220" font-size="25" font-weight="800" fill="#45556f">Startup owned by operator</text>
</g>
<g>
  <rect x="500" y="178" width="465" height="592" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
  <text x="528" y="220" font-size="25" font-weight="800" fill="#45556f">Dynamic intent</text>
</g>
<g>
  <rect x="1003" y="178" width="525" height="592" rx="24" fill="#f6f8fb" stroke="#d9e2ef" stroke-width="2"/>
