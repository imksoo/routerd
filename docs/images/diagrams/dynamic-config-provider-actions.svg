</g>
<g>
  <rect x="535" y="548" width="382" height="96" rx="18" fill="#eef8f9" stroke="#2b8a92" stroke-width="3"/>
  <text x="726" y="590.05" font-size="23" font-weight="700" fill="#13233a" text-anchor="middle" dominant-baseline="middle"><tspan x="726" dy="0">effective config</tspan><tspan x="726" dy="28">reconcile target</tspan></text>
</g>
<g>
  <rect x="1038" y="238" width="420" height="96" rx="18" fill="#fff8df" stroke="#d7a725" stroke-width="3"/>
