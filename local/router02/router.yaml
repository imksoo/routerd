# yaml-language-server: $schema=../../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: router02

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt
    protectedZones:
      - mgmt

  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: NixOSHost
      metadata:
        name: host
      spec:
        hostname: router02
        domain: lain.local
        stateVersion: "25.11"
        boot:
          loader: grub
          grubDevice: /dev/sda
        routerdService:
          enabled: true
          binaryPath: /usr/local/sbin/routerd
          configFile: /usr/local/etc/routerd/router.yaml
          socket: /run/routerd/routerd.sock
          applyInterval: 60s
          extraFlags:
            - --status-file
            - /run/routerd/status.json
            - --observe-interval
            - "0"
            - --controller-chain
            - --controller-chain-daemon-sockets
            - wan-pd=/run/routerd/dhcpv6-client/wan-pd.sock
            - --controller-chain-dry-run-address=false
            - --controller-chain-dry-run-dslite=false
            - --controller-chain-dry-run-route=false
            - --controller-chain-dry-run-dhcpv6=false
            - --controller-chain-dry-run-dhcpv4lease=false
            - --controller-chain-dry-run-pppoesession=false
            - --controller-chain-dry-run-dns-resolver=false
            - --controller-chain-dry-run-nat=false
            - --controller-chain-dry-run-firewall=false
            - --controller-chain-dry-run-package=false
            - --controller-chain-dry-run-network-adoption=false
            - --controller-chain-dry-run-systemd-unit=true
            - --controller-chain-dnsmasq-command
            - dnsmasq
            - --controller-chain-dnsmasq-config
            - /usr/local/etc/routerd/dnsmasq.conf
            - --controller-chain-dnsmasq-pid
            - /run/routerd/dnsmasq.pid
            - --controller-chain-dnsmasq-port
            - "53"
            - --controller-chain-dnsmasq-listen-addresses
            - 127.0.0.1
            - --controller-chain-nftables-file
            - /run/routerd/nat44.nft
            - --controller-chain-firewall-file
            - /run/routerd/firewall.nft
            - --controller-chain-conntrack-interval
            - 30s
        additionalPackages:
          - jq
        additionalServicePath:
          - dnsmasq
          - nftables
          - conntrack-tools
          - iproute2
          - iputils
          - bind
          - tcpdump
          - traceroute
          - procps
          - ppp
          - wireguard-tools
          - strongswan
          - kmod
          - nettools
          - ndpi
        debugSystemPackages: true
        ssh:
          enabled: true
          passwordAuthentication: true
          permitRootLogin: "no"
        sudo:
          wheelNeedsPassword: false
        users:
          - name: nwadmin
            description: Network administrator
            groups:
              - wheel
            initialPassword: nwadmin
            sshAuthorizedKeys:
              - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIIVN47JvcsD+o8a07RLfICFbhj2NKsjGKu1AEcUzOR8E imksoo@nwadmin03

    - apiVersion: observability.routerd.net/v1alpha1
      kind: Telemetry
      metadata:
        name: otlp
      spec:
        otlp:
          endpoint: http://192.168.123.119:4317
          insecure: true
        serviceNamespace: routerd
        attributes:
          deployment.environment: lab
          routerd.node: router02
        signals:
          - logs
          - metrics
          - traces

    - apiVersion: system.routerd.net/v1alpha1
      kind: LogSink
      metadata:
        name: local-syslog
      spec:
        type: syslog
        minLevel: info
        syslog:
          facility: local6
          tag: routerd-router02

    - apiVersion: system.routerd.net/v1alpha1
      kind: Package
      metadata:
        name: router-service-dependencies
      spec:
        state: present
        packages:
          - os: ubuntu
            manager: apt
            names:
              - dnsmasq-base
              - nftables
              - conntrack
              - iproute2
              - iputils-ping
              - iputils-tracepath
              - dnsutils
              - tcpdump
              - traceroute
              - procps
              - ppp
              - wireguard-tools
              - strongswan-swanctl
              - systemd
              - net-tools
              - kmod
              - libnetfilter-log1
          - os: nixos
            manager: nix
            names:
              - dnsmasq
              - nftables
              - conntrack-tools
              - iproute2
              - iputils
              - bind
              - tcpdump
              - traceroute
              - procps
              - ppp
              - wireguard-tools
              - strongswan
              - systemd
              - chrony
              - nettools
              - kmod
              - libnetfilter_log
              - ndpi
            optional: true
          - os: freebsd
            manager: pkg
            names:
              - dnsmasq
              - wireguard-tools
              - strongswan
              - mpd5
              - bind-tools
            optional: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: SysctlProfile
      metadata:
        name: router-runtime
      spec:
        profile: router-linux
        runtime: true
        persistent: true
        overrides:
          net.netfilter.nf_conntrack_acct: "1"

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: wan-ipv6-accept-ra
      spec:
        key: net.ipv6.conf.ens18.accept_ra
        value: "2"
        runtime: true
        persistent: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: rp-filter-ds-lite-a
      spec:
        key: net.ipv4.conf.ds-lite-a.rp_filter
        value: "0"
        runtime: true
        optional: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: rp-filter-ds-lite-b
      spec:
        key: net.ipv4.conf.ds-lite-b.rp_filter
        value: "0"
        runtime: true
        optional: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: rp-filter-ds-lite-c
      spec:
        key: net.ipv4.conf.ds-lite-c.rp_filter
        value: "0"
        runtime: true
        optional: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: LogRetention
      metadata:
        name: default
      spec:
        schedule: daily
        incrementalVacuum: true
        targets:
          - file: /var/lib/routerd/routerd.db
            retention: 30d
          - file: /var/lib/routerd/dns-queries.db
            retention: 30d
          - file: /var/lib/routerd/traffic-flows.db
            retention: 30d
          - file: /var/lib/routerd/firewall-logs.db
            retention: 90d

    - apiVersion: system.routerd.net/v1alpha1
      kind: NetworkAdoption
      metadata:
        name: wan-network-owned-by-routerd
      spec:
        interface: wan
        systemdNetworkd:
          disableDHCPv4: true
          disableDHCPv6: true
        systemdResolved:
          disableDNSStubListener: true
          dnsServers:
            - 127.0.0.1

    - apiVersion: system.routerd.net/v1alpha1
      kind: NetworkAdoption
      metadata:
        name: lan-network-owned-by-routerd
      spec:
        interface: lan
        systemdNetworkd:
          disableDHCPv4: true
          disableDHCPv6: true
          disableIPv6RA: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: chrony
        managed: true
        source: auto
        serverFrom:
          - resource: DHCPv6Information/wan-info
            field: sntpServers
          - resource: DHCPv4Lease/wan-v4
            field: ntpServers
        fallbackServers:
          - ntp.jst.mfeed.ad.jp
          - ntp.nict.jp

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPServer
      metadata:
        name: lan-time
      spec:
        provider: chrony
        managed: true
        source: auto
        serverFrom:
          - resource: DHCPv6Information/wan-info
            field: sntpServers
          - resource: DHCPv4Lease/wan-v4
            field: ntpServers
        fallbackServers:
          - ntp.jst.mfeed.ad.jp
          - ntp.nict.jp
        listenAddressFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address
          - resource: IPv6DelegatedAddress/lan-base
            field: address
        allowCIDRs:
          - 192.168.160.0/24
          - 2409:10:3d60:1230::/64

    - apiVersion: system.routerd.net/v1alpha1
      kind: WebConsole
      metadata:
        name: mgmt-console
      spec:
        enabled: true
        listenAddressFrom:
          resource: Interface/mgmt
          field: ipv4Addresses
        listenAddress: 127.0.0.1
        port: 8080
        title: router02

    - apiVersion: system.routerd.net/v1alpha1
      kind: SystemdUnit
      metadata:
        name: routerd-dpi-classifier.service
      spec:
        description: routerd DPI classifier
        execStart:
          - /usr/local/sbin/routerd-dpi-classifier
          - daemon
          - --socket
          - /run/routerd/dpi-classifier/default.sock
          - --ndpi-reader
          - /run/current-system/sw/bin/ndpiReader
        after:
          - network-online.target
        wantedBy:
          - multi-user.target
        restart: on-failure
        runtimeDirectory:
          - routerd/dpi-classifier
        restrictAddressFamilies:
          - AF_UNIX
        noNewPrivileges: true
        enabled: true
        started: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: ens18
        adminUp: true
        managed: false
        owner: external

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: ens19
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: ens20
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Lease
      metadata:
        name: wan-dhcpv4
      spec:
        interface: wan
        hostname: router02
        routeMetric: 1024

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Lease
      metadata:
        name: mgmt-dhcpv4
      spec:
        interface: mgmt
        hostname: router02-mgmt
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
        prefixLength: 60
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Information
      metadata:
        name: wan-info
      spec:
        interface: wan
        request:
          - dns
          - sntp
          - domain-search
          - aftr
        dependsOn:
          - resource: DHCPv6PrefixDelegation/wan-pd
            phase: Bound

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-base
      spec:
        interface: lan
        address: 192.168.160.2/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-base
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::2"
        sendRA: false
        announce: true
        dependsOn:
          - resource: DHCPv6PrefixDelegation/wan-pd
            phase: Bound

    - apiVersion: net.routerd.net/v1alpha1
      kind: SelfAddressPolicy
      metadata:
        name: lan-ipv6-self
      spec:
        addressFamily: ipv6
        candidates:
          - source: delegatedAddress
            delegatedAddress: lan-base
            addressSuffix: "::2"
          - source: interfaceAddress
            interface: lan
            matchSuffix: "::2"
          - source: interfaceAddress
            interface: lan
            ordinal: 1

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: router02-lan
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: lan-base
      spec:
        zone: router02.internal
        ttl: 300
        records:
          - hostname: router
            ipv4From:
              resource: IPv4StaticAddress/lan-base
              field: address
            ipv6From:
              resource: IPv6DelegatedAddress/lan-base
              field: address
        dhcpDerived:
          sources:
            - DHCPv4Server/lan-dhcpv4
            - DHCPv6Server/lan-dhcpv6
          hostnameSuffix: router02.internal
          ddns: true
          ttl: 60
        reverseZones:
          - name: 160.168.192.in-addr.arpa

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
        ownerRefs:
          - kind: DNSZone
            name: router02-lan
          - kind: DHCPv6Information
            name: wan-info
      spec:
        listen:
          - name: local
            addresses:
              - 127.0.0.1
            port: 53
            sources:
              - local-zone
              - ngn-aftr
              - default
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-base
                field: address
              - resource: IPv6DelegatedAddress/lan-base
                field: address
            port: 53
            sources:
              - local-zone
              - ngn-aftr
              - default
        sources:
          - name: local-zone
            kind: zone
            match:
              - router02.internal
              - 160.168.192.in-addr.arpa
            zoneRef:
              - DNSZone/router02-lan
          - name: ngn-aftr
            kind: forward
            match:
              - transix.jp
            upstreamFrom:
              - resource: DHCPv6Information/wan-info
                field: dnsServers
            upstreams:
              - udp://[2404:1a8:7f01:a::3]:53
              - udp://[2404:1a8:7f01:b::3]:53
          - name: default
            kind: upstream
            match:
              - "."
            upstreams:
              - udp://1.1.1.1:53
              - udp://8.8.8.8:53
            healthcheck:
              interval: 15s
              timeout: 3s
              failThreshold: 3
              passThreshold: 2
        cache:
          enabled: true
          maxEntries: 10000
          minTTL: 60s
          maxTTL: 24h
          negativeTTL: 30s
        queryLog:
          enabled: true
          path: /var/lib/routerd/dns-queries.db
          retention: 30d

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-a
      spec:
        interface: wan
        tunnelName: ds-lite-a
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:100
        aftrAddressOrdinal: 1
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-base
        localAddressSuffix: "::100"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-base
            phase: Applied
          - resource: DNSResolver/lan-resolver
            phase: Running

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-b
      spec:
        interface: wan
        tunnelName: ds-lite-b
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:101
        aftrAddressOrdinal: 2
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-base
        localAddressSuffix: "::101"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-base
            phase: Applied
          - resource: DNSResolver/lan-resolver
            phase: Running

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-c
      spec:
        interface: wan
        tunnelName: ds-lite-c
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        remoteAddress: 2404:8e00::feed:102
        aftrAddressOrdinal: 3
        aftrAddressSelection: ordinalModulo
        localAddressSource: delegatedAddress
        localDelegatedAddress: lan-base
        localAddressSuffix: "::102"
        defaultRoute: true
        routeMetric: 50
        mtu: 1454
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-base
            phase: Applied
          - resource: DNSResolver/lan-resolver
            phase: Running

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-a
      spec:
        daemon: routerd-healthcheck
        socketSource: /run/routerd/healthcheck/internet-via-dslite-a.sock
        targetSource: static
        target: 1.1.1.1
        protocol: tcp
        port: 443
        sourceInterface: ds-lite-a
        sourceAddressFrom:
          resource: IPv4StaticAddress/lan-base
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-b
      spec:
        daemon: routerd-healthcheck
        socketSource: /run/routerd/healthcheck/internet-via-dslite-b.sock
        targetSource: static
        target: 1.1.1.1
        protocol: tcp
        port: 443
        sourceInterface: ds-lite-b
        sourceAddressFrom:
          resource: IPv4StaticAddress/lan-base
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-c
      spec:
        daemon: routerd-healthcheck
        socketSource: /run/routerd/healthcheck/internet-via-dslite-c.sock
        targetSource: static
        target: 1.1.1.1
        protocol: tcp
        port: 443
        sourceInterface: ds-lite-c
        sourceAddressFrom:
          resource: IPv4StaticAddress/lan-base
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4PolicyRouteSet
      metadata:
        name: lan-dslite-ecmp
      spec:
        mode: hash
        hashFields:
          - sourceAddress
          - destinationAddress
        sourceCIDRs:
          - 192.168.160.0/24
        destinationCIDRs:
          - 0.0.0.0/0
        targets:
          - name: ds-lite-a
            outboundInterface: ds-lite-a
            table: 100
            priority: 10000
            mark: 256
            routeMetric: 50
            healthCheck: internet-via-dslite-a
          - name: ds-lite-b
            outboundInterface: ds-lite-b
            table: 101
            priority: 10001
            mark: 257
            routeMetric: 50
            healthCheck: internet-via-dslite-b
          - name: ds-lite-c
            outboundInterface: ds-lite-c
            table: 102
            priority: 10002
            mark: 258
            routeMetric: 50
            healthCheck: internet-via-dslite-c

    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata:
        name: default-v4
      spec:
        family: ipv4
        destinationCIDRs:
          - 0.0.0.0/0
        selection: highest-weight-ready
        hysteresis: 30s
        candidates:
          - name: dslite-ecmp
            source: IPv4PolicyRouteSet/lan-dslite-ecmp
            device: lan-dslite-ecmp
            gatewaySource: none
            routeTable: 100
            metric: 50
            weight: 100
            dependsOn:
              - resource: IPv4PolicyRouteSet/lan-dslite-ecmp
                phase: Applied
          - name: wan-dhcpv4
            source: DHCPv4Lease/wan-dhcpv4
            device: wan
            gatewaySource: dhcpv4
            routeTable: 112
            metric: 100
            weight: 10

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite-a
      spec:
        type: masquerade
        egressInterface: ds-lite-a
        sourceRanges:
          - 192.168.160.0/24
        destinationCIDRs:
          - 0.0.0.0/0

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite-b
      spec:
        type: masquerade
        egressInterface: ds-lite-b
        sourceRanges:
          - 192.168.160.0/24
        destinationCIDRs:
          - 0.0.0.0/0

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite-c
      spec:
        type: masquerade
        egressInterface: ds-lite-c
        sourceRanges:
          - 192.168.160.0/24
        destinationCIDRs:
          - 0.0.0.0/0

    - apiVersion: net.routerd.net/v1alpha1
      kind: PathMTUPolicy
      metadata:
        name: lan-wan-mtu
      spec:
        fromInterface: lan
        toInterfaces:
          - wan
          - ds-lite-a
          - ds-lite-b
          - ds-lite-c
        mtu:
          source: static
          value: 1454
        interfaceMTU:
          enabled: true
        ipv6RA:
          enabled: true
          scope: lan-dhcpv6
        tcpMSSClamp:
          enabled: true
          families:
            - ipv4
            - ipv6

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-all
      spec:
        target: all
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-default
      spec:
        target: default
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-lan
      spec:
        target: interface
        interface: lan
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-ds-lite-a
      spec:
        target: interface
        interface: ds-lite-a
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-ds-lite-b
      spec:
        target: interface
        interface: ds-lite-b
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4ReversePathFilter
      metadata:
        name: rp-filter-ds-lite-c
      spec:
        target: interface
        interface: ds-lite-c
        mode: disabled

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4
      spec:
        server: dnsmasq
        managed: true
        role: server
        interface: lan
        addressPool:
          start: 192.168.160.120
          end: 192.168.160.129
          leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-base
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-base
            field: address
        ntpServerFrom:
          - resource: IPv4StaticAddress/lan-base
            field: address
        domain: router02.internal
        options:
