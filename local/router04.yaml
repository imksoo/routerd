# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: router04

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt

  resources:
    - apiVersion: observability.routerd.net/v1alpha1
      kind: Telemetry
      metadata:
        name: otlp
      spec:
        otlp:
          endpoint: http://192.168.123.119:4317
          insecure: true
        serviceNamespace: routerd
        attributes:
          deployment.environment: lab
          routerd.node: router04
        signals:
          - logs
          - metrics
          - traces

    - apiVersion: system.routerd.net/v1alpha1
      kind: Package
      metadata:
        name: service-deps
      spec:
        packages:
          - os: freebsd
            manager: pkg
            names:
              - dnsmasq
              - bind-tools
              - wireguard-tools
              - tailscale
              - strongswan
              - mpd5

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: ntpd
        managed: true
        source: auto
        serverFrom:
          - resource: DHCPv6Information/wan-info
            field: sntpServers
        fallbackServers:
          - ntp.jst.mfeed.ad.jp
          - ntp.nict.jp

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPServer
      metadata:
        name: lan-time
      spec:
        provider: ntpd
        managed: true
        source: auto
        serverFrom:
          - resource: DHCPv6Information/wan-info
            field: sntpServers
        listenAddressFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
        fallbackServers:
          - ntp.jst.mfeed.ad.jp
          - ntp.nict.jp

    - apiVersion: net.routerd.net/v1alpha1
      kind: Hostname
      metadata:
        name: system-hostname
      spec:
        hostname: router04.lain.local
        managed: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv4-forwarding
      spec:
        key: net.inet.ip.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv6-forwarding
      spec:
        key: net.inet6.ip6.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: system.routerd.net/v1alpha1
      kind: SystemdUnit
      metadata:
        name: routerd.service
      spec:
        description: routerd control plane for router04
        execStartPre:
          - /usr/local/sbin/routerd
          - apply
          - --config
          - /usr/local/etc/routerd/router.yaml
          - --once
          - --skip-service-manager
        execStart:
          - /usr/local/sbin/routerd
          - serve
          - --config
          - /usr/local/etc/routerd/router.yaml
          - --socket
          - /var/run/routerd/routerd.sock
          - --status-file
          - /var/run/routerd/status.json
          - --observe-interval
          - 30s
          - --controller-chain
          - --controller-chain-daemon-sockets
          - wan-pd=/var/run/routerd/dhcpv6-client/wan-pd.sock
          - --controller-chain-dry-run-address=false
          - --controller-chain-dry-run-dslite=false
          - --controller-chain-dry-run-route=false
          - --controller-chain-dry-run-dhcpv6=false
          - --controller-chain-dry-run-dhcpv4lease=false
          - --controller-chain-dry-run-pppoesession=false
          - --controller-chain-dry-run-dns-resolver=false
          - --controller-chain-dry-run-nat=false
          - --controller-chain-dry-run-firewall=false
          - --controller-chain-dry-run-package=false
          - --controller-chain-dry-run-network-adoption=true
          - --controller-chain-dry-run-systemd-unit=true
          - --controller-chain-dnsmasq-command
          - /usr/local/sbin/dnsmasq
          - --controller-chain-dnsmasq-config
          - /usr/local/etc/routerd/dnsmasq.conf
          - --controller-chain-dnsmasq-pid
          - /var/run/routerd/dnsmasq.pid
          - --controller-chain-dnsmasq-port
          - "53"
          - --controller-chain-dnsmasq-listen-addresses
          - 127.0.0.1
        runtimeDirectory:
          - routerd
        runtimeDirectoryPreserve: "yes"
        stateDirectory:
          - routerd
        logsDirectory:
          - routerd
        enabled: true
        started: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: WebConsole
      metadata:
        name: mgmt
      spec:
        enabled: true
        listenAddressFrom:
          resource: Interface/mgmt
          field: ipv4Addresses
        port: 8080
        title: router04

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: vtnet0
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Lease
      metadata:
        name: wan-dhcp4
      spec:
        interface: wan
        hostname: router04
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: PPPoEInterface
      metadata:
        name: pppoe-flets
      spec:
        interface: wan
        ifname: ppp-flets
        username: open@open.ad.jp
        password: open
        managed: true
        defaultRoute: false
        usePeerDNS: false
        mtu: 1454
        mru: 1454

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: vtnet2
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: mgmt-ipv4
      spec:
        interface: mgmt
        address: 192.168.123.126/24

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
        prefixLength: 60
        required: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Information
      metadata:
        name: wan-info
        ownerRefs:
          - kind: DHCPv6PrefixDelegation
            name: wan-pd
      spec:
        interface: wan
        request:
          - aftr-name
          - dns-servers
          - sntp-servers
          - domain-search
        dependsOn:
          - resource: DHCPv6PrefixDelegation/wan-pd
            phase: Bound

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: vtnet1
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.168.160.4/24
        exclusive: false
        allowOverlap: true
        allowOverlapReason: DS-Lite tunnel inner source addresses are carved out of the LAN range.

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4-server
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan
        interface: lan
        addressPool:
          start: 192.168.160.180
          end: 192.168.160.189
          leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-ipv4
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address
        ntpServerFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: lab-client
      spec:
        server: lan-dhcpv4-server
        macAddress: "02:00:00:00:04:10"
        ipAddress: 192.168.160.184
        hostname: router04-lab-client
        leaseTime: infinite

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::4"
        sendRA: false
        announce: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata:
        name: lan-ra
      spec:
        interface: lan
        prefixFrom:
          resource: IPv6DelegatedAddress/lan-ipv6-pd-address
          field: address
        rdnssFrom:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            optional: true
        dnssl:
          - router04.lab.local
        mFlag: true
        oFlag: true
        mtu: 1500
        prfPreference: high
        preferredLifetime: "3600"
        validLifetime: "7200"
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: lan-dhcpv6
      spec:
        interface: lan
        mode: both
        addressPool:
          start: "::100"
          end: "::1ff"
          leaseTime: 12h
        dnsServerFrom:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            optional: true
        sntpServerFrom:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
        domainSearch:
          - router04.lab.local
        leaseTime: 12h
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: router04-lan
        ownerRefs:
          - kind: IPv4StaticAddress
            name: lan-ipv4
          - kind: IPv6DelegatedAddress
            name: lan-ipv6-pd-address
      spec:
        zone: router04.lab.local
        ttl: 300
        records:
          - hostname: router
            ipv4From:
              resource: IPv4StaticAddress/lan-ipv4
              field: address
            ipv6From:
              resource: IPv6DelegatedAddress/lan-ipv6-pd-address
              field: address
          - hostname: router04
            ipv4From:
              resource: IPv4StaticAddress/lan-ipv4
              field: address
            ipv6From:
              resource: IPv6DelegatedAddress/lan-ipv6-pd-address
              field: address
        dhcpDerived:
          sources:
            - DHCPv4Server/lan-dhcpv4-server
            - DHCPv6Server/lan-dhcpv6
          hostnameSuffix: router04.lab.local
          ddns: true
          ttl: 60
          leaseFile: /var/db/routerd/dnsmasq/dnsmasq.leases

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
        ownerRefs:
          - kind: DNSZone
            name: router04-lan
          - kind: IPv4StaticAddress
            name: lan-ipv4
          - kind: IPv6DelegatedAddress
            name: lan-ipv6-pd-address
      spec:
        listen:
          - name: local
            addresses:
              - 127.0.0.1
            port: 53
            sources:
              - local-zone
              - transix-aftr
              - default-upstream
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-ipv4
                field: address
              - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
                field: address
            port: 53
            sources:
              - local-zone
              - transix-aftr
              - default-upstream
        sources:
          - name: local-zone
            kind: zone
            match:
              - router04.lab.local
            zoneRef:
              - DNSZone/router04-lan
          - name: transix-aftr
            kind: forward
            match:
              - transix.jp
            upstreams:
              - udp://[2404:1a8:7f01:a::3]:53
              - udp://[2404:1a8:7f01:b::3]:53
            upstreamFrom:
              - resource: DHCPv6Information/wan-info
                field: dnsServers
                optional: true
          - name: default-upstream
            kind: upstream
            match:
              - "."
            upstreams:
              - https://cloudflare-dns.com/dns-query
              - udp://1.1.1.1:53
              - udp://8.8.8.8:53
        cache:
          enabled: true
          maxEntries: 1000
          minTTL: 30s
          maxTTL: 1h
          negativeTTL: 30s
        queryLog:
          enabled: true
          path: /var/db/routerd/dns-queries.db

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: homert02-lan-via-mgmt
      spec:
        destination: 172.18.0.0/16
        deviceFrom:
          resource: Interface/mgmt
          field: ifname
        gateway: 192.168.123.129

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: ds-lite-a
      spec:
        ifname: gif41
        role: untrust
        managed: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: ds-lite-b
      spec:
        ifname: gif42
        role: untrust
        managed: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: ds-lite-c
      spec:
        ifname: gif43
        role: untrust
        managed: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: ds-lite-ra
      spec:
        ifname: gif44
        role: untrust
        managed: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: ds-lite-a-source
      spec:
        interface: ds-lite-a
        address: 192.0.0.2/29
        allowOverlap: true
        allowOverlapReason: RFC 6333 B4-AFTR link prefix is shared by parallel DS-Lite tunnels.

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: ds-lite-b-source
      spec:
        interface: ds-lite-b
        address: 192.0.0.3/29
        allowOverlap: true
        allowOverlapReason: RFC 6333 B4-AFTR link prefix is shared by parallel DS-Lite tunnels.

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: ds-lite-c-source
      spec:
        interface: ds-lite-c
        address: 192.0.0.4/29
        allowOverlap: true
        allowOverlapReason: RFC 6333 B4-AFTR link prefix is shared by parallel DS-Lite tunnels.

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: ds-lite-ra-source
      spec:
        interface: ds-lite-ra
        address: 192.0.0.5/29
        allowOverlap: true
        allowOverlapReason: RFC 6333 B4-AFTR link prefix is shared by parallel DS-Lite tunnels.

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-a-source-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::11"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-b-source-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::12"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-c-source-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::13"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-a
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: dslite-a-source-address
      spec:
        interface: wan
        tunnelName: gif41
        localAddressSource: delegatedAddress
        localDelegatedAddress: dslite-a-source-address
        localAddressSuffix: "::11"
        localAddressFrom:
          resource: IPv4StaticAddress/ds-lite-a-source
          field: address
        aftrIPv6: 2404:8e00::feed:100
        mtu: 1454
        defaultRoute: false
        dependsOn:
          - resource: IPv6DelegatedAddress/dslite-a-source-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-b
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: dslite-b-source-address
      spec:
        interface: wan
        tunnelName: gif42
        localAddressSource: delegatedAddress
        localDelegatedAddress: dslite-b-source-address
        localAddressSuffix: "::12"
        localAddressFrom:
          resource: IPv4StaticAddress/ds-lite-b-source
          field: address
        aftrIPv6: 2404:8e00::feed:101
        mtu: 1454
        defaultRoute: false
        dependsOn:
          - resource: IPv6DelegatedAddress/dslite-b-source-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-c
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: dslite-c-source-address
      spec:
        interface: wan
        tunnelName: gif43
        localAddressSource: delegatedAddress
        localDelegatedAddress: dslite-c-source-address
        localAddressSuffix: "::13"
        localAddressFrom:
          resource: IPv4StaticAddress/ds-lite-c-source
          field: address
        aftrIPv6: 2404:8e00::feed:102
        mtu: 1454
        defaultRoute: false
        dependsOn:
          - resource: IPv6DelegatedAddress/dslite-c-source-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-ra
        ownerRefs:
          - kind: IPv6RAAddress
            name: wan-ra
      spec:
        interface: wan
        tunnelName: gif44
        localAddressSource: interface
        localAddressFrom:
          resource: IPv4StaticAddress/ds-lite-ra-source
          field: address
        aftrIPv6: 2404:8e00::feed:100
        mtu: 1454
        defaultRoute: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-a
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-a
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-a.sock
        targetSource: static
        target: 1.1.1.1
        protocol: dns
        port: 53
        sourceInterface: ds-lite-a
        sourceAddressFrom:
          resource: IPv4StaticAddress/ds-lite-a-source
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-b
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-b
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-b.sock
        targetSource: static
        target: 8.8.8.8
        protocol: dns
        port: 53
        sourceInterface: ds-lite-b
        sourceAddressFrom:
          resource: IPv4StaticAddress/ds-lite-b-source
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-c
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-c
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-c.sock
        targetSource: static
        target: 9.9.9.9
        protocol: dns
        port: 53
        sourceInterface: ds-lite-c
        sourceAddressFrom:
          resource: IPv4StaticAddress/ds-lite-c-source
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-ra
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-ra
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-ra.sock
        targetSource: static
        target: 149.112.112.112
        protocol: dns
        port: 53
        sourceInterface: ds-lite-ra
        sourceAddressFrom:
          resource: IPv4StaticAddress/ds-lite-ra-source
          field: address
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-pppoe
        ownerRefs:
          - kind: PPPoEInterface
            name: pppoe-flets
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-pppoe.sock
        targetSource: static
        target: 208.67.222.222
        protocol: dns
        port: 53
        sourceInterface: pppoe-flets
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-hgw-direct
        ownerRefs:
          - kind: DHCPv4Lease
            name: wan-dhcp4
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-hgw-direct.sock
        targetSource: static
        target: 1.0.0.1
        protocol: dns
        port: 53
        sourceInterface: wan
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-a-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-a
      spec:
        destination: 1.1.1.1/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite-a
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite-a
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-b-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-b
      spec:
        destination: 8.8.8.8/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite-b
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite-b
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-c-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-c
      spec:
        destination: 9.9.9.9/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite-c
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite-c
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-ra-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-ra
      spec:
