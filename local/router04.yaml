# yaml-language-server: $schema=../schemas/routerd-config-v1alpha1.schema.json
apiVersion: routerd.net/v1alpha1
kind: Router
metadata:
  name: router04

spec:
  reconcile:
    mode: progressive
    protectedInterfaces:
      - mgmt

  resources:
    - apiVersion: system.routerd.net/v1alpha1
      kind: Package
      metadata:
        name: service-deps
      spec:
        packages:
          - os: freebsd
            manager: pkg
            names:
              - dnsmasq
              - bind-tools
              - wireguard-tools
              - tailscale
              - strongswan
              - mpd5

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPClient
      metadata:
        name: system-time
      spec:
        provider: ntpd
        managed: true
        source: auto
        serverFrom:
          - resource: DHCPv6Information/wan-info
            field: sntpServers
        fallbackServers:
          - ntp.jst.mfeed.ad.jp
          - ntp.nict.jp

    - apiVersion: system.routerd.net/v1alpha1
      kind: NTPServer
      metadata:
        name: lan-time
      spec:
        provider: ntpd
        managed: true
        source: auto
        serverFrom:
          - resource: DHCPv6Information/wan-info
            field: sntpServers
        listenAddressFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
        fallbackServers:
          - ntp.jst.mfeed.ad.jp
          - ntp.nict.jp

    - apiVersion: net.routerd.net/v1alpha1
      kind: Hostname
      metadata:
        name: system-hostname
      spec:
        hostname: router04.lain.local
        managed: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv4-forwarding
      spec:
        key: net.inet.ip.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: system.routerd.net/v1alpha1
      kind: Sysctl
      metadata:
        name: ipv6-forwarding
      spec:
        key: net.inet6.ip6.forwarding
        value: "1"
        runtime: true
        persistent: false

    - apiVersion: system.routerd.net/v1alpha1
      kind: SystemdUnit
      metadata:
        name: routerd.service
      spec:
        description: routerd control plane for router04
        execStartPre:
          - /usr/local/sbin/routerd
          - apply
          - --config
          - /usr/local/etc/routerd/router.yaml
          - --once
          - --skip-service-manager
        execStart:
          - /usr/local/sbin/routerd
          - serve
          - --config
          - /usr/local/etc/routerd/router.yaml
          - --socket
          - /var/run/routerd/routerd.sock
          - --status-file
          - /var/run/routerd/status.json
          - --observe-interval
          - 30s
          - --controller-chain
          - --controller-chain-daemon-sockets
          - wan-pd=/var/run/routerd/dhcpv6-client/wan-pd.sock
          - --controller-chain-dry-run-address=false
          - --controller-chain-dry-run-dslite=false
          - --controller-chain-dry-run-route=false
          - --controller-chain-dry-run-ra=false
          - --controller-chain-dry-run-dhcpv6=false
          - --controller-chain-dry-run-dns-resolver=false
          - --controller-chain-dnsmasq-command
          - /usr/local/sbin/dnsmasq
          - --controller-chain-dnsmasq-config
          - /usr/local/etc/routerd/dnsmasq.conf
          - --controller-chain-dnsmasq-pid
          - /var/run/routerd/dnsmasq.pid
          - --controller-chain-dnsmasq-port
          - "53"
          - --controller-chain-dnsmasq-listen-addresses
          - 127.0.0.1
        runtimeDirectory:
          - routerd
        runtimeDirectoryPreserve: "yes"
        stateDirectory:
          - routerd
        logsDirectory:
          - routerd
        enabled: true
        started: true

    - apiVersion: system.routerd.net/v1alpha1
      kind: WebConsole
      metadata:
        name: mgmt
      spec:
        enabled: true
        listenAddressFrom:
          resource: Interface/mgmt
          field: ipv4Addresses
        port: 8080
        title: router04

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: wan
      spec:
        ifname: vtnet0
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: wan-dhcp4
      spec:
        interface: wan
        client: dhclient
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: mgmt
      spec:
        ifname: vtnet2
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Address
      metadata:
        name: mgmt-dhcp4
      spec:
        interface: mgmt
        client: dhclient
        required: false
        useRoutes: false
        useDNS: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RAAddress
      metadata:
        name: wan-ra
      spec:
        interface: wan
        required: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6PrefixDelegation
      metadata:
        name: wan-pd
      spec:
        interface: wan
        profile: ntt-hgw-lan-pd
        prefixLength: 60
        required: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Information
      metadata:
        name: wan-info
        ownerRefs:
          - kind: DHCPv6PrefixDelegation
            name: wan-pd
      spec:
        interface: wan
        request:
          - aftr-name
          - dns-servers
          - sntp-servers
          - domain-search
        dependsOn:
          - resource: DHCPv6PrefixDelegation/wan-pd
            phase: Bound

    - apiVersion: net.routerd.net/v1alpha1
      kind: Interface
      metadata:
        name: lan
      spec:
        ifname: vtnet1
        adminUp: true
        managed: true
        owner: routerd

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4StaticAddress
      metadata:
        name: lan-ipv4
      spec:
        interface: lan
        address: 192.168.160.4/24
        exclusive: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Server
      metadata:
        name: lan-dhcpv4-server
      spec:
        server: dnsmasq
        managed: true
        listenInterfaces:
          - lan
        interface: lan
        addressPool:
          start: 192.168.160.180
          end: 192.168.160.189
          leaseTime: 12h
        gatewayFrom:
          resource: IPv4StaticAddress/lan-ipv4
          field: address
        dnsServerFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address
        ntpServerFrom:
          - resource: IPv4StaticAddress/lan-ipv4
            field: address

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv4Reservation
      metadata:
        name: lab-client
      spec:
        server: lan-dhcpv4-server
        macAddress: "02:00:00:00:04:10"
        ipAddress: 192.168.160.184
        hostname: router04-lab-client
        leaseTime: infinite

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: lan-ipv6-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::4"
        sendRA: false
        announce: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-source-pd-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::40"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6RouterAdvertisement
      metadata:
        name: lan-ra
      spec:
        interface: lan
        prefixFrom:
          resource: IPv6DelegatedAddress/lan-ipv6-pd-address
          field: address
        rdnssFrom:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            optional: true
        dnssl:
          - router04.lab.local
        mFlag: true
        oFlag: true
        mtu: 1500
        prfPreference: high
        preferredLifetime: "3600"
        validLifetime: "7200"
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DHCPv6Server
      metadata:
        name: lan-dhcpv6
      spec:
        interface: lan
        mode: both
        addressPool:
          start: "::100"
          end: "::1ff"
          leaseTime: 12h
        dnsServerFrom:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            optional: true
        sntpServerFrom:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
        domainSearch:
          - router04.lab.local
        leaseTime: 12h
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSZone
      metadata:
        name: router04-lan
        ownerRefs:
          - kind: IPv4StaticAddress
            name: lan-ipv4
          - kind: IPv6DelegatedAddress
            name: lan-ipv6-pd-address
      spec:
        zone: router04.lab.local
        ttl: 300
        records:
          - hostname: router
            ipv4From:
              resource: IPv4StaticAddress/lan-ipv4
              field: address
            ipv6From:
              resource: IPv6DelegatedAddress/lan-ipv6-pd-address
              field: address
          - hostname: router04
            ipv4From:
              resource: IPv4StaticAddress/lan-ipv4
              field: address
            ipv6From:
              resource: IPv6DelegatedAddress/lan-ipv6-pd-address
              field: address
        dhcpDerived:
          sources:
            - DHCPv4Server/lan-dhcpv4-server
            - DHCPv6Server/lan-dhcpv6
          hostnameSuffix: router04.lab.local
          ddns: true
          ttl: 60
          leaseFile: /var/db/routerd/dnsmasq/dnsmasq.leases

    - apiVersion: net.routerd.net/v1alpha1
      kind: DNSResolver
      metadata:
        name: lan-resolver
        ownerRefs:
          - kind: DNSZone
            name: router04-lan
          - kind: IPv4StaticAddress
            name: lan-ipv4
          - kind: IPv6DelegatedAddress
            name: lan-ipv6-pd-address
      spec:
        listen:
          - name: local
            addresses:
              - 127.0.0.1
            port: 53
            sources:
              - local-zone
              - transix-aftr
              - default-upstream
          - name: lan
            addressFrom:
              - resource: IPv4StaticAddress/lan-ipv4
                field: address
              - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
                field: address
            port: 53
            sources:
              - local-zone
              - transix-aftr
              - default-upstream
        sources:
          - name: local-zone
            kind: zone
            match:
              - router04.lab.local
            zoneRef:
              - DNSZone/router04-lan
          - name: transix-aftr
            kind: forward
            match:
              - transix.jp
            upstreams:
              - udp://[2404:1a8:7f01:a::3]:53
              - udp://[2404:1a8:7f01:b::3]:53
            upstreamFrom:
              - resource: DHCPv6Information/wan-info
                field: dnsServers
                optional: true
          - name: default-upstream
            kind: upstream
            match:
              - "."
            upstreams:
              - https://cloudflare-dns.com/dns-query
              - udp://1.1.1.1:53
              - udp://8.8.8.8:53
        cache:
          enabled: true
          maxEntries: 1000
          minTTL: 30s
          maxTTL: 1h
          negativeTTL: 30s
        queryLog:
          enabled: true
          path: /var/db/routerd/dns-queries.db

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: lan-ipv6-pd-address
          - kind: DNSResolver
            name: lan-resolver
      spec:
        interface: wan
        tunnelName: gif40
        localAddressSource: interface
        aftrFQDN: gw.transix.jp
        aftrDNSServers:
          - 2404:1a8:7f01:a::3
          - 2404:1a8:7f01:b::3
        aftrAddressOrdinal: 1
        mtu: 1454
        defaultRoute: false
        routeMetric: 50
        dependsOn:
          - resource: IPv6DelegatedAddress/lan-ipv6-pd-address
            field: address
            notEmpty: true
          - resource: DNSResolver/lan-resolver
            phase: Applied

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: default-via-wan
        ownerRefs:
          - kind: DHCPv4Address
            name: wan-dhcp4
      spec:
        destination: 0.0.0.0/0
        device: vtnet0
        gateway: 192.168.1.1

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: homert02-lan-via-mgmt
      spec:
        destination: 172.18.0.0/16
        deviceFrom:
          resource: Interface/mgmt
          field: ifname
        gateway: 192.168.123.129

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-a-source-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::11"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-b-source-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::12"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv6DelegatedAddress
      metadata:
        name: dslite-c-source-address
      spec:
        prefixDelegation: wan-pd
        interface: lan
        subnetID: "0"
        addressSuffix: "::13"
        sendRA: false
        announce: false

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-a
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: dslite-a-source-address
      spec:
        interface: wan
        tunnelName: gif41
        localAddressSource: delegatedAddress
        localDelegatedAddress: dslite-a-source-address
        localAddressSuffix: "::11"
        aftrIPv6: 2404:8e00::feed:100
        mtu: 1454
        defaultRoute: false
        dependsOn:
          - resource: IPv6DelegatedAddress/dslite-a-source-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-b
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: dslite-b-source-address
      spec:
        interface: wan
        tunnelName: gif42
        localAddressSource: delegatedAddress
        localDelegatedAddress: dslite-b-source-address
        localAddressSuffix: "::12"
        aftrIPv6: 2404:8e00::feed:101
        mtu: 1454
        defaultRoute: false
        dependsOn:
          - resource: IPv6DelegatedAddress/dslite-b-source-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: DSLiteTunnel
      metadata:
        name: ds-lite-c
        ownerRefs:
          - kind: IPv6DelegatedAddress
            name: dslite-c-source-address
      spec:
        interface: wan
        tunnelName: gif43
        localAddressSource: delegatedAddress
        localDelegatedAddress: dslite-c-source-address
        localAddressSuffix: "::13"
        aftrIPv6: 2404:8e00::feed:102
        mtu: 1454
        defaultRoute: false
        dependsOn:
          - resource: IPv6DelegatedAddress/dslite-c-source-address
            field: address
            notEmpty: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite.sock
        targetSource: static
        target: 1.0.0.1
        protocol: dns
        port: 53
        sourceInterface: ds-lite
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-a
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-a
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-a.sock
        targetSource: static
        target: 1.1.1.1
        protocol: dns
        port: 53
        sourceInterface: ds-lite-a
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-b
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-b
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-b.sock
        targetSource: static
        target: 8.8.8.8
        protocol: dns
        port: 53
        sourceInterface: ds-lite-b
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: HealthCheck
      metadata:
        name: internet-via-dslite-c
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-c
      spec:
        daemon: routerd-healthcheck
        socketSource: /var/run/routerd/healthcheck/internet-via-dslite-c.sock
        targetSource: static
        target: 9.9.9.9
        protocol: dns
        port: 53
        sourceInterface: ds-lite-c
        interval: 30s
        timeout: 3s
        healthyThreshold: 1
        unhealthyThreshold: 3

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite
      spec:
        destination: 1.0.0.1/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-a-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-a
      spec:
        destination: 1.1.1.1/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite-a
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite-a
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-b-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-b
      spec:
        destination: 8.8.8.8/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite-b
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite-b
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: IPv4Route
      metadata:
        name: dslite-c-healthcheck
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite-c
      spec:
        destination: 9.9.9.9/32
        deviceFrom:
          resource: DSLiteTunnel/ds-lite-c
          field: interface
        dependsOn:
          - resource: DSLiteTunnel/ds-lite-c
            phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: EgressRoutePolicy
      metadata:
        name: ipv4-default
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite
      spec:
        family: ipv4
        destinationCIDRs:
          - 0.0.0.0/0
        selection: highest-weight-ready
        hysteresis: 30s
        candidates:
          - name: ds-lite
            source: DSLiteTunnel/ds-lite
            deviceFrom:
              resource: DSLiteTunnel/ds-lite
              field: interface
            gatewaySource: none
            metric: 50
            weight: 100
            healthCheck: internet-via-dslite
            dependsOn:
              - resource: DSLiteTunnel/ds-lite
                phase: Up
          - name: ds-lite-a
            source: DSLiteTunnel/ds-lite-a
            deviceFrom:
              resource: DSLiteTunnel/ds-lite-a
              field: interface
            gatewaySource: none
            metric: 60
            weight: 120
            healthCheck: internet-via-dslite-a
            dependsOn:
              - resource: DSLiteTunnel/ds-lite-a
                phase: Up
          - name: ds-lite-b
            source: DSLiteTunnel/ds-lite-b
            deviceFrom:
              resource: DSLiteTunnel/ds-lite-b
              field: interface
            gatewaySource: none
            metric: 60
            weight: 120
            healthCheck: internet-via-dslite-b
            dependsOn:
              - resource: DSLiteTunnel/ds-lite-b
                phase: Up
          - name: ds-lite-c
            source: DSLiteTunnel/ds-lite-c
            deviceFrom:
              resource: DSLiteTunnel/ds-lite-c
              field: interface
            gatewaySource: none
            metric: 60
            weight: 120
            healthCheck: internet-via-dslite-c
            dependsOn:
              - resource: DSLiteTunnel/ds-lite-c
                phase: Up

    - apiVersion: net.routerd.net/v1alpha1
      kind: NAT44Rule
      metadata:
        name: lan-to-dslite
        ownerRefs:
          - kind: DSLiteTunnel
            name: ds-lite
      spec:
        type: masquerade
        egressInterface: ds-lite
        sourceRanges:
          - 192.168.160.0/24
        excludeDestinationCIDRs:
          - 192.168.0.0/16
          - 172.16.0.0/12
          - 10.0.0.0/8

    - apiVersion: net.routerd.net/v1alpha1
      kind: PathMTUPolicy
      metadata:
        name: lan-to-dslite-mtu
      spec:
        fromInterface: lan
        toInterfaces:
          - ds-lite
          - ds-lite-a
          - ds-lite-b
          - ds-lite-c
        mtu:
          source: static
          value: 1454
        ipv6RA:
          enabled: true
          scope: lan-ra
        tcpMSSClamp:
          enabled: true
          families:
            - ipv4

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: wan
      spec:
        role: untrust
        interfaces:
          - Interface/wan
          - DSLiteTunnel/ds-lite
          - DSLiteTunnel/ds-lite-a
          - DSLiteTunnel/ds-lite-b
          - DSLiteTunnel/ds-lite-c

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: lan
      spec:
        role: trust
        interfaces:
          - Interface/lan
          - WireGuardInterface/wg0

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallZone
      metadata:
        name: mgmt
      spec:
        role: mgmt
        interfaces:
          - Interface/mgmt

    - apiVersion: firewall.routerd.net/v1alpha1
      kind: FirewallPolicy
      metadata:
        name: default
      spec:
        logDeny: true

    - apiVersion: net.routerd.net/v1alpha1
      kind: WireGuardInterface
      metadata:
        name: wg0
      spec:
        privateKeyFile: /usr/local/etc/routerd/secrets/router04-wg0.key
        listenPort: 51824
